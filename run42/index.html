    <section class="panel">
      <div class="panel-header-row">
        <h2>Objectif ${modeLabel}</h2>
        <button class="btn-chip" id="btn-edit-goal">Modifier</button>
      </div>
      <div class="goal-dial ${progress.reached ? "is-reached" : ""}">
        <div class="goal-ring-wrap">
          <svg class="goal-ring-svg" viewBox="0 0 120 120">
            <circle class="goal-ring-track" cx="60" cy="60" r="50" />
            ${goalDialTicks(progress.pct)}
          </svg>
          <div class="goal-dial-center">
            <svg class="goal-footprint-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <ellipse cx="12.8" cy="6.7" rx="3.4" ry="4.3" />
              <ellipse cx="11.2" cy="16.6" rx="4.4" ry="5.6" />
            </svg>
            <span class="goal-dial-pct">${Math.round(progress.pct)}%</span>
          </div>
        </div>
        <div class="goal-dial-footer">
          <span class="goal-dial-current">${currentLabel} / ${targetLabel}</span>
          <span class="goal-dial-days">
            ${progress.reached ? "Objectif atteint 🎉" : `${progress.daysLeft} jour${progress.daysLeft > 1 ? "s" : ""} restant${progress.daysLeft > 1 ? "s" : ""}`}
          </span>
        </div>
      </div>
    </section>
  `;
}

function goalForm(goal) {
  const metric = goal?.metric || "distance";
  return `
    <form id="goal-form" class="activity-form">
      <p class="muted">Fixe-toi un objectif de distance ou de durée sur la semaine ou le mois, et suis ta progression au fil de tes activités.</p>
      <label>Fréquence
        <select id="f-goal-mode" required>
          <option value="hebdo" ${goal?.mode === "hebdo" ? "selected" : ""}>Hebdomadaire</option>
          <option value="mensuel" ${goal?.mode === "mensuel" ? "selected" : ""}>Mensuel</option>
        </select>
      </label>
      <label>Type d'objectif
        <select id="f-goal-metric" required>
          <option value="distance" ${metric === "distance" ? "selected" : ""}>Distance</option>
          <option value="duree" ${metric === "duree" ? "selected" : ""}>Durée</option>
        </select>
      </label>
      <label id="f-goal-target-label">
        ${metric === "duree" ? "Durée cible (minutes)" : "Distance cible (km)"}
        <input type="number" id="f-goal-target" min="0.1" step="0.1" value="${goal?.target ?? ""}" required />
      </label>
      <button type="submit" class="btn-primary" ${state.goalSaving ? "disabled" : ""}>
        ${state.goalSaving ? "Enregistrement…" : "Enregistrer mon objectif"}
      </button>
      ${goal ? `<button type="button" class="btn-secondary" id="btn-delete-goal">Supprimer l'objectif</button>` : ""}
    </form>
  `;
}

function profilForm(profil) {
  const niveauOptions = NIVEAUX.map((n) => `<option value="${n.id}" ${profil?.niveau === n.id ? "selected" : ""}>${n.label}</option>`).join("");
  const objectifOptions = OBJECTIFS.map((o) => `<option value="${o.id}" ${profil?.objectif === o.id ? "selected" : ""}>${o.label}</option>`).join("");
  const disposOptions = DISPOS.map((d) => `<option value="${d.id}" ${profil?.joursDispo === d.id ? "selected" : ""}>${d.label}</option>`).join("");

  return `
    <form id="profil-form" class="activity-form">
      <p class="muted">Indique ton niveau et ton objectif : on te propose un programme d'entraînement adapté dans l'onglet Programme.</p>
      <label>Niveau
        <select id="f-niveau" required>${niveauOptions}</select>
      </label>
      <label>Objectif
        <select id="f-objectif" required>${objectifOptions}</select>
      </label>
      <label>Disponibilités
        <select id="f-dispo" required>${disposOptions}</select>
      </label>
      <button type="submit" class="btn-primary" ${state.profilSaving ? "disabled" : ""}>
        ${state.profilSaving ? "Enregistrement…" : "Enregistrer mon profil"}
      </button>
    </form>
  `;
}

const TAB_TITLES = { activities: "Accueil", records: "Records", programme: "Programme", account: "Mon compte" };
const TAB_RENDERERS = { activities: tabActivities, records: tabRecords, programme: tabProgramme, account: tabAccount };

function viewShell() {
  const navItem = (tab, icon) => `
    <button class="nav-item ${state.tab === tab ? "is-active" : ""}" data-tab="${tab}">
      ${icon}
      <span>${TAB_TITLES[tab]}</span>
    </button>
  `;

  return `
    <header class="mobile-topbar">
      <span class="mobile-logo"><img src="icons/icon-192.png" alt="" /></span>
      <span class="mobile-title">${TAB_TITLES[state.tab]}</span>
    </header>

    <main class="mobile-content">
      ${state.error ? `<p class="error-msg">${state.error}</p>` : ""}
      ${TAB_RENDERERS[state.tab]()}
    </main>

    <nav class="bottom-nav">
      ${navItem("activities", ICONS.activities)}
      ${navItem("records", ICONS.records)}
      <button class="nav-add" id="btn-add-activity">${ICONS.add}</button>
      ${navItem("programme", ICONS.programme)}
      ${navItem("account", ICONS.account)}
    </nav>

    ${state.activityDetailId ? activityDetailModal() : ""}
  `;
}

function viewAddActivity() {
  const editing = state.editingActivityId
    ? (state.allActivities.find((x) => x.id === state.editingActivityId) || state.activities.find((x) => x.id === state.editingActivityId))
    : null;

  const splitsHtml = Array.from({ length: state.splitInputsCount }, (_, i) => {
    const prefill = editing && editing.km_splits && editing.km_splits[i] != null
      ? formatDureeInput(editing.km_splits[i])
      : "";
    return `
      <label class="split-input-label">
        Km ${i + 1}
        <input type="text" class="km-split-input" data-index="${i}" placeholder="mm:ss" value="${prefill}" />
      </label>
    `;
  }).join("");

  return `
    <header class="mobile-topbar">
      <span class="mobile-title">${editing ? "Modifier la course" : "Nouvelle course"}</span>
      <button class="topbar-cancel" id="btn-cancel">Annuler</button>
    </header>

    <main class="mobile-content">
      <section class="panel">
        ${state.error ? `<p class="error-msg">${state.error}</p>` : ""}

        <form id="activity-form" class="activity-form">
          <label>Date
            <input type="date" id="f-date" value="${editing ? editing.date : new Date().toISOString().slice(0, 10)}" required />
          </label>

          <label>Distance (km)
            <input type="number" id="f-distance" step="0.01" min="0" placeholder="10.00" value="${editing ? (editing.distance_m / 1000) : ""}" required />
          </label>

          <label>Durée de déplacement (mm:ss ou hh:mm:ss)
            <input type="text" id="f-duree" placeholder="47:30" value="${editing ? formatDureeInput(editing.duree_s) : ""}" required />
          </label>

          <label>Dénivelé positif (m)
            <input type="number" id="f-denivele" step="1" min="0" placeholder="120" value="${editing ? (editing.denivele_m || 0) : ""}" />
          </label>

          <div class="splits-section">
            <p class="muted">Temps intermédiaires au kilomètre (optionnel, améliore la détection de PR)</p>
            <div class="splits-grid">${splitsHtml}</div>
          </div>

          <button type="submit" class="btn-primary" ${state.loading ? "disabled" : ""}>
            ${state.loading ? "Enregistrement…" : editing ? "Enregistrer les modifications" : "Enregistrer la course"}
          </button>
        </form>
      </section>
    </main>
  `;
}

// ============================================================
// Router / render
// ============================================================

function viewToasts() {
  if (!state.notifications.length) return "";
  return `
    <div class="toast-stack">
      ${state.notifications.map((n) => `
        <div class="toast">
          <span class="toast-icon">${n.icon}</span>
          <span class="toast-text">${n.text}</span>
          <button class="toast-close" data-id="${n.id}" aria-label="Fermer la notification">✕</button>
        </div>
      `).join("")}
    </div>
  `;
}

function render() {
  let html;
  if (state.route === "dashboard") html = viewShell();
  else if (state.route === "add-activity") html = viewAddActivity();
  else html = viewLogin();

  root.innerHTML = html + viewToasts();
  attachHandlers();
}

function attachHandlers() {
  const passwordForm = document.getElementById("password-form");
  if (passwordForm) {
    passwordForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("pw-email").value;
      const password = document.getElementById("pw-password").value;
      if (state.authAction === "signup") signUpPassword(email, password);
      else signInPassword(email, password);
    });
  }

  const toggleAction = document.getElementById("toggle-auth-action");
  if (toggleAction) {
    toggleAction.addEventListener("click", (e) => {
      e.preventDefault();
      setState({
        authAction: state.authAction === "signup" ? "signin" : "signup",
        error: null,
        info: null,
      });
    });
  }

  const logoutBtn = document.getElementById("btn-logout");
  if (logoutBtn) logoutBtn.addEventListener("click", logout);

  const chartToggleBtn = document.getElementById("btn-toggle-chart-range");
  if (chartToggleBtn) {
    chartToggleBtn.addEventListener("click", () => setState({ chartFullYear: !state.chartFullYear }));
  }

  const calPrevBtn = document.getElementById("btn-cal-prev");
  if (calPrevBtn) {
    calPrevBtn.addEventListener("click", () => {
      let { calendarYear, calendarMonth } = state;
      calendarMonth -= 1;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear -= 1;
      }
      setState({ calendarYear, calendarMonth });
    });
  }

  const calNextBtn = document.getElementById("btn-cal-next");
  if (calNextBtn) {
    calNextBtn.addEventListener("click", () => {
      const now = new Date();
      let { calendarYear, calendarMonth } = state;
      calendarMonth += 1;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear += 1;
      }
      if (calendarYear > now.getFullYear() || (calendarYear === now.getFullYear() && calendarMonth > now.getMonth())) {
        return;
      }
      setState({ calendarYear, calendarMonth });
    });
  }

  document.querySelectorAll(".nav-item").forEach((btn) => {
    btn.addEventListener("click", () => setState({ tab: btn.dataset.tab, error: null }));
  });

  const addBtn = document.getElementById("btn-add-activity");
  if (addBtn) addBtn.addEventListener("click", () => setState({ route: "add-activity", error: null, editingActivityId: null, splitInputsCount: 0 }));

  const cancelBtn = document.getElementById("btn-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => setState({ route: "dashboard", error: null, editingActivityId: null }));

  document.querySelectorAll(".account-subnav-btn").forEach((btn) => {
    btn.addEventListener("click", () => setState({ accountView: btn.dataset.view }));
  });

  const toggleRecordFormBtn = document.getElementById("btn-toggle-record-form");
  if (toggleRecordFormBtn) {
    toggleRecordFormBtn.addEventListener("click", () =>
      setState({ recordFormOpen: !state.recordFormOpen, error: null })
    );
  }

  const recordFormEl = document.getElementById("record-form");
  if (recordFormEl) {
    recordFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const dureeS = parseDuree(document.getElementById("f-record-temps").value);
      if (!dureeS) {
        setState({ error: "Format de temps invalide. Utilise mm:ss ou hh:mm:ss." });
        return;
      }
      saveRecordManual({
        distanceLabel: document.getElementById("f-record-distance").value,
        dureeS,
        dateObtenu: document.getElementById("f-record-date").value,
      });
    });
  }

  document.querySelectorAll(".podium-step.is-linked").forEach((step) => {
    const goToActivity = () => setState({ activityDetailId: step.dataset.activityId });
    step.addEventListener("click", goToActivity);
    step.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goToActivity();
      }
    });
  });

  const editPseudoBtn = document.getElementById("btn-edit-pseudo");
  if (editPseudoBtn) editPseudoBtn.addEventListener("click", () => setState({ pseudoEditing: true, error: null }));

  const cancelPseudoBtn = document.getElementById("btn-cancel-pseudo");
  if (cancelPseudoBtn) cancelPseudoBtn.addEventListener("click", () => setState({ pseudoEditing: false, error: null }));

  const pseudoForm = document.getElementById("pseudo-form");
  if (pseudoForm) {
    pseudoForm.addEventListener("submit", (e) => {
      e.preventDefault();
      savePseudo(document.getElementById("f-pseudo").value);
    });
  }

  const editProfilBtn = document.getElementById("btn-edit-profil");
  if (editProfilBtn) editProfilBtn.addEventListener("click", () => setState({ profilEditing: true, error: null }));

  const profilFormEl = document.getElementById("profil-form");
  if (profilFormEl) {
    profilFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      saveProfil({
        niveau: document.getElementById("f-niveau").value,
        objectif: document.getElementById("f-objectif").value,
        joursDispo: document.getElementById("f-dispo").value,
      });
    });
  }

  const gotoAccountProfilBtn = document.getElementById("btn-goto-account-profil");
  if (gotoAccountProfilBtn) {
    gotoAccountProfilBtn.addEventListener("click", () =>
      setState({ tab: "account", profilEditing: true, error: null })
    );
  }

  const editGoalBtn = document.getElementById("btn-edit-goal");
  if (editGoalBtn) editGoalBtn.addEventListener("click", () => setState({ goalEditing: true, error: null }));

  const cancelGoalBtn = document.getElementById("btn-cancel-goal");
  if (cancelGoalBtn) cancelGoalBtn.addEventListener("click", () => setState({ goalEditing: false, error: null }));

  const deleteGoalBtn = document.getElementById("btn-delete-goal");
  if (deleteGoalBtn) {
    deleteGoalBtn.addEventListener("click", () => {
      if (window.confirm("Supprimer ton objectif ?")) saveGoal(null);
    });
  }

  const goalMetricSelect = document.getElementById("f-goal-metric");
  const goalTargetLabel = document.getElementById("f-goal-target-label");
  if (goalMetricSelect && goalTargetLabel) {
    goalMetricSelect.addEventListener("change", () => {
      goalTargetLabel.firstChild.textContent =
        goalMetricSelect.value === "duree" ? "Durée cible (minutes)" : "Distance cible (km)";
    });
  }

  const goalFormEl = document.getElementById("goal-form");
  if (goalFormEl) {
    goalFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const target = parseFloat(document.getElementById("f-goal-target").value);
      if (!target || target <= 0) {
        setState({ error: "Indique une valeur d'objectif valide." });
        return;
      }
      saveGoal({
        mode: document.getElementById("f-goal-mode").value,
        metric: document.getElementById("f-goal-metric").value,
        target,
      });
    });
  }

  document.querySelectorAll(".activity-delete-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (window.confirm("Supprimer cette course ? Cette action est irréversible.")) {
        deleteActivity(id);
      }
    });
  });

  document.querySelectorAll(".activity-edit-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      openEditActivity(btn.dataset.id);
    });
  });

  document.querySelectorAll(".activity-row-clickable").forEach((row) => {
    row.addEventListener("click", () => {
      setState({ activityDetailId: row.dataset.id });
    });
    row.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        setState({ activityDetailId: row.dataset.id });
      }
    });
  });

  const activityDetailOverlay = document.getElementById("activity-detail-overlay");
  if (activityDetailOverlay) {
    activityDetailOverlay.addEventListener("click", (e) => {
      if (e.target === activityDetailOverlay) setState({ activityDetailId: null });
    });
  }

  const activityDetailClose = document.getElementById("activity-detail-close");
  if (activityDetailClose) {
    activityDetailClose.addEventListener("click", () => setState({ activityDetailId: null }));
  }

  const activityDetailEdit = document.getElementById("activity-detail-edit");
  if (activityDetailEdit) {
    activityDetailEdit.addEventListener("click", () => openEditActivity(activityDetailEdit.dataset.id));
  }

  const activityDetailDelete = document.getElementById("activity-detail-delete");
  if (activityDetailDelete) {
    activityDetailDelete.addEventListener("click", () => {
      const id = activityDetailDelete.dataset.id;
      if (window.confirm("Supprimer cette course ? Cette action est irréversible.")) {
        setState({ activityDetailId: null });
        deleteActivity(id);
      }
    });
  }

  const avatarTrigger = document.getElementById("avatar-trigger");
  const avatarInput = document.getElementById("f-avatar");
  if (avatarTrigger && avatarInput) {
    avatarTrigger.addEventListener("click", () => avatarInput.click());
    avatarInput.addEventListener("change", () => {
      if (avatarInput.files[0]) uploadAvatar(avatarInput.files[0]);
    });
  }

  const distanceInput = document.getElementById("f-distance");
  const splitsGrid = document.querySelector(".splits-grid");
  if (distanceInput && splitsGrid) {
    distanceInput.addEventListener("input", () => {
      const km = Math.floor(parseFloat(distanceInput.value) || 0);
      const count = Math.min(km, 50);
      // On met à jour l'état sans déclencher render() : un render() complet ici
      // reconstruirait le formulaire et effacerait ce que l'utilisateur vient de
      // taper dans le champ distance (et les autres champs du formulaire).
      state.splitInputsCount = count;
      splitsGrid.innerHTML = Array.from({ length: count }, (_, i) => `
        <label class="split-input-label">
          Km ${i + 1}
          <input type="text" class="km-split-input" data-index="${i}" placeholder="mm:ss" />
        </label>
      `).join("");
    });
  }

  document.querySelectorAll(".badge-card[data-badge-type]").forEach((card) => {
    const open = () => setState({
      badgeModal: { type: card.dataset.badgeType, index: Number(card.dataset.badgeIndex) },
      badgeModalSort: "desc",
    });
    card.addEventListener("click", open);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        open();
      }
    });
  });

  const badgeDetailOverlay = document.getElementById("badge-detail-overlay");
  if (badgeDetailOverlay) {
    badgeDetailOverlay.addEventListener("click", (e) => {
      if (e.target === badgeDetailOverlay) setState({ badgeModal: null });
    });
  }

  const badgeDetailClose = document.getElementById("badge-detail-close");
  if (badgeDetailClose) {
    badgeDetailClose.addEventListener("click", () => setState({ badgeModal: null }));
  }

  const badgeDetailSort = document.getElementById("badge-detail-sort");
  if (badgeDetailSort) {
    badgeDetailSort.addEventListener("click", () => {
      setState({ badgeModalSort: state.badgeModalSort === "desc" ? "asc" : "desc" });
    });
  }

  document.querySelectorAll(".badge-dates-list li.is-linked").forEach((li) => {
    const goToActivity = () => setState({ badgeModal: null, activityDetailId: li.dataset.activityId });
    li.addEventListener("click", goToActivity);
    li.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goToActivity();
      }
    });
  });

  document.querySelectorAll(".toast-close").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      setState({ notifications: state.notifications.filter((n) => n.id !== id) });
    });
  });

  const activityForm = document.getElementById("activity-form");
  if (activityForm) {
    activityForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const dureeS = parseDuree(document.getElementById("f-duree").value);
      if (!dureeS) {
        setState({ error: "Format de durée invalide. Utilise mm:ss ou hh:mm:ss." });
        return;
      }

      const kmSplits = Array.from(document.querySelectorAll(".km-split-input")).map((input) =>
        parseDuree(input.value)
      );

      const payload = {
        date: document.getElementById("f-date").value,
        distanceKm: parseFloat(document.getElementById("f-distance").value),
        dureeS,
        deniveleM: parseFloat(document.getElementById("f-denivele").value) || 0,
        kmSplits,
      };

      // Important : en mode édition, on doit METTRE À JOUR l'activité existante
      // et non en créer une nouvelle. Appeler saveActivity() ici (comme avant)
      // insérait une ligne supplémentaire à chaque modification, ce qui faussait
      // tous les compteurs (semaine/mois/année, badges, streak...) en comptant
      // deux fois la même course.
      if (state.editingActivityId) {
        updateActivity(state.editingActivityId, payload);
      } else {
        saveActivity(payload);
      }
    });
  }
}

checkSession();

  

  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.error);
      });
    }
  </script>
