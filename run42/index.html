/* ============================================================
   Run42 — Design tokens
   Univers : piste d'athlétisme le soir, dossard de course,
   feuille de splits. Pas de cream/terracotta, pas de dark+néon.
   ============================================================ */

:root {
  --ink: #14231c;        /* fond — piste la nuit */
  --ink-soft: #1c2f25;   /* cartes sur fond ink */
  --paper: #eef1e8;      /* texte clair / fond clair */
  --rust: #c1502e;       /* accent — clay de piste, dossard */
  --rust-dim: #8f3a20;
  --moss: #5b7a5a;       /* secondaire — lane lines */
  --signal: #e8b84b;     /* accent rare — fanion de départ */

  --font-display: "Oswald", "Arial Narrow", sans-serif;
  --font-body: "IBM Plex Sans", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-body);
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
}

/* ---------- Login ---------- */

.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at 50% 120%, rgba(91,122,90,0.25), transparent 60%),
    var(--ink);
}

.login-card {
  max-width: 380px;
  width: 100%;
  text-align: center;
}

.badge-42 {
  width: 88px;
  height: 88px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--rust);
  color: var(--paper);
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 1px;
  box-shadow: 0 0 0 3px var(--ink-soft), 0 0 0 5px var(--moss);
}

.login-card h1 {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 1px;
  margin: 0 0 8px;
  text-transform: uppercase;
}

.tagline {
  color: rgba(238,241,232,0.75);
  line-height: 1.5;
  margin: 0 0 28px;
}

.btn-strava {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 4px;
  background: var(--rust);
  color: var(--paper);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: background 0.15s ease;
}

.btn-strava:hover { background: var(--rust-dim); }
.btn-strava:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

.fine-print {
  margin-top: 16px;
  font-size: 12px;
  color: rgba(238,241,232,0.5);
  line-height: 1.5;
}

/* ---------- Dashboard shell ---------- */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(91,122,90,0.35);
}

.brand {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.pill {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
}

.pill-connected {
  background: rgba(91,122,90,0.2);
  color: var(--moss);
}

.dashboard {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.panel { margin-bottom: 36px; }

.panel h2 {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 18px;
  color: rgba(238,241,232,0.85);
  margin-bottom: 16px;
}

.muted { color: rgba(238,241,232,0.55); font-size: 14px; line-height: 1.5; }

/* Signature element : la "split ladder" — feuille de splits */

.split-ladder {
  background: var(--ink-soft);
  border-radius: 8px;
  padding: 8px 20px;
}

.split-row {
  display: grid;
  grid-template-columns: 72px 1fr 72px;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(91,122,90,0.2);
}

.split-row:last-child { border-bottom: none; }

.split-label {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(238,241,232,0.65);
}

.split-track {
  height: 10px;
  background: rgba(238,241,232,0.08);
  border-radius: 999px;
  overflow: hidden;
}

.split-bar {
  height: 100%;
  background: var(--rust);
  border-radius: 999px;
  transition: width 0.4s ease;
}

.split-row.is-empty .split-bar { background: rgba(238,241,232,0.15); }

.split-bib {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  text-align: right;
}

.panel-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: var(--ink-soft);
  border-radius: 8px;
  padding: 18px 20px;
}

.card h3 {
  font-family: var(--font-display);
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin: 0 0 8px;
}

@media (max-width: 560px) {
  .panel-split { grid-template-columns: 1fr; }
  .login-card h1 { font-size: 34px; }
}

.fine-print a { color: var(--moss); text-decoration: underline; }

/* ---------- Login form ---------- */

#login-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}

#login-form input[type="email"],
#password-form input {
  padding: 12px 14px;
  border-radius: 4px;
  border: 1px solid rgba(238,241,232,0.2);

#password-form {

.btn-primary {

  border-radius: 4px;
  background: var(--rust);
  color: var(--paper);
  font-size: 16px;
  font-weight: 600;
}

.btn-primary:hover { background: var(--rust-dim); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-add {
  width: auto;
  margin-bottom: 28px;
  padding: 10px 18px;
  font-size: 14px;
}

.info-msg {
  background: rgba(91,122,90,0.15);

  padding: 10px 14px;

  font-size: 14px;

.error-msg {

/* ---------- Topbar actions ---------- */

.topbar-actions { display: flex; gap: 10px; }

.pill-action {

/* ---------- Activity list ---------- */

.activity-row {

  grid-template-columns: 90px 1fr 90px 90px;

  padding: 10px 0;
  border-bottom: 1px solid rgba(91,122,90,0.15);

.activity-form {

  gap: 18px;

.activity-form label {

.activity-form input {

}

.splits-section { border-top: 1px solid rgba(91,122,90,0.2); padding-top: 14px; }

.splits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));

}

.split-input-label {
  font-size: 11px;
  color: rgba(238,241,232,0.55);
}

.split-input-label input { padding: 8px; font-size: 13px; }

/* Accessibilité — focus visible partout */
:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

  { id: "4", label: "4 jours / semaine" },
  { id: "5", label: "5+ jours / semaine" },
];

const OBJECTIF_SESSIONS = {
  "perte-poids": ["Footing facile régulier", "Fractionné léger (30/30)", "Sortie longue tranquille", "Récupération active + gainage", "Footing avec accélérations"],
  "forme": ["Footing facile", "Fractionné léger", "Sortie longue tranquille", "Récupération active", "Footing + gammes"],
  "5k": ["Footing facile", "VMA courte (200-400m)", "Seuil (allure soutenue)", "Sortie longue modérée", "Footing de récupération"],
  "10k": ["Footing facile", "VMA moyenne (400-1000m)", "Seuil", "Sortie longue", "Footing de récupération"],
  "semi": ["Footing facile", "Seuil", "Sortie longue progressive", "Fractionné long (1000-2000m)", "Footing de récupération"],
  "marathon": ["Footing facile", "Sortie longue avec allure marathon", "Seuil", "Fractionné", "Footing de récupération", "Sortie longue"],
};

const NIVEAU_SUFFIX = {
  debutant: " (intensité douce, échauffement long)",
  intermediaire: "",
  avance: " (intensité soutenue)",
  confirme: " (charge élevée, récupération courte)",
};

function generateProgram(profil) {
  const pool = OBJECTIF_SESSIONS[profil.objectif] || OBJECTIF_SESSIONS.forme;
  const n = Math.min(parseInt(profil.joursDispo, 10) || 3, pool.length);
  const suffix = NIVEAU_SUFFIX[profil.niveau] || "";
  const sessions = [];
  for (let i = 0; i < n; i++) {
    sessions.push({ jour: `Séance ${i + 1}`, type: pool[i] + suffix });
  }
  return sessions;
}

function describeProfil(profil) {
  const niveauLabel = NIVEAUX.find((n) => n.id === profil.niveau)?.label || profil.niveau;
  const objectifLabel = OBJECTIFS.find((o) => o.id === profil.objectif)?.label || profil.objectif;
  return `Niveau ${niveauLabel} · Objectif ${objectifLabel} · ${profil.joursDispo} jour(s)/semaine`;
}

// ============================================================
// Constantes distances
// ============================================================

const DISTANCE_ORDER = ["1K", "5K", "10K", "15K", "20K", "Semi", "Marathon"];
const DISTANCE_METERS = {
  "1K": 1000, "5K": 5000, "10K": 10000, "15K": 15000,
  "20K": 20000, "Semi": 21097, "Marathon": 42195,
};

function formatTemps(s) {
  if (!s && s !== 0) return "—";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

// Accepte "mm:ss" ou "hh:mm:ss" → secondes
function parseDuree(str) {
  if (!str) return null;
  const parts = str.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

// ============================================================
// Calcul des PR à partir d'une activité saisie manuellement
// ============================================================

function computeBestEfforts(distanceM, dureeS, kmSplits) {
  const results = [];

  if (kmSplits && kmSplits.length) {
    const wholeKmTargets = [
      [1, "1K"], [5, "5K"], [10, "10K"], [15, "15K"], [20, "20K"],
    ];
    for (const [k, label] of wholeKmTargets) {
      if (kmSplits.length >= k) {
        let best = Infinity;
        for (let i = 0; i + k <= kmSplits.length; i++) {
          const sum = kmSplits.slice(i, i + k).reduce((a, b) => a + b, 0);
          if (sum < best) best = sum;
        }
        results.push({ distance_label: label, temps_s: best });
      }
    }
  }

  for (const label of DISTANCE_ORDER) {
    const target = DISTANCE_METERS[label];
    if (Math.abs(distanceM - target) / target < 0.03) {
      const existing = results.find((r) => r.distance_label === label);
      if (!existing || dureeS < existing.temps_s) {
        results.splice(results.indexOf(existing), existing ? 1 : 0);
        results.push({ distance_label: label, temps_s: dureeS });
      }
    }
  }

  return results;
}

async function saveActivity(formData) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;
    const distanceM = Math.round(formData.distanceKm * 1000);
    const dureeS = formData.dureeS;
    const kmSplits = formData.kmSplits.filter((s) => s != null);
    const allureMoyenne = dureeS / (distanceM / 1000);

    const { data: activity, error: insertError } = await supabase
      .from("activities")
      .insert({
        user_id: userId,
        date: formData.date,
        distance_m: distanceM,
        duree_s: dureeS,
        denivele_m: formData.deniveleM || 0,
        allure_moyenne: allureMoyenne,
        km_splits: kmSplits.length ? kmSplits : null,
        source: "manuel",
      })
      .select()
      .single();

    if (insertError) throw insertError;

    const efforts = computeBestEfforts(distanceM, dureeS, kmSplits);
    for (const effort of efforts) {
      const { data: currentPR } = await supabase
        .from("personal_records")
        .select("meilleur_temps_s")
        .eq("user_id", userId)
        .eq("distance_label", effort.distance_label)
        .maybeSingle();

      if (!currentPR || effort.temps_s < currentPR.meilleur_temps_s) {
        await supabase.from("personal_records").upsert({
          user_id: userId,
          distance_label: effort.distance_label,
          meilleur_temps_s: effort.temps_s,
          activity_id: activity.id,
          date_obtenu: formData.date,
        });
      }
    }

    setState({ loading: false, route: "dashboard", tab: "activities" });
    loadAppData();
  } catch (e) {
    setState({ loading: false, error: "Erreur lors de l'enregistrement : " + e.message });
  }
}

async function uploadAvatar(file) {
  setState({ avatarUploading: true, error: null });
  try {
    const userId = state.session.user.id;
    const ext = file.name.split(".").pop();
    const path = `${userId}/avatar.${ext}`;

    const { error: uploadError } = await supabase.storage
      .from("avatars")
      .upload(path, file, { upsert: true });
    if (uploadError) throw uploadError;

    const { data: pub } = supabase.storage.from("avatars").getPublicUrl(path);
    const cacheBusted = `${pub.publicUrl}?t=${Date.now()}`;

    const { data: updated, error: updateError } = await supabase.auth.updateUser({
      data: { avatar_url: cacheBusted },
    });
    if (updateError) throw updateError;

    setState({
      avatarUploading: false,
      session: { ...state.session, user: updated.user },
    });
  } catch (e) {
    setState({ avatarUploading: false, error: "Échec de l'upload : " + e.message });
  }
}

function computeCounts(dates) {
  const now = new Date();
  const startOfWeek = new Date(now);
  const dow = (startOfWeek.getDay() + 6) % 7;
  startOfWeek.setDate(startOfWeek.getDate() - dow);
  startOfWeek.setHours(0, 0, 0, 0);

  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfYear = new Date(now.getFullYear(), 0, 1);

  let week = 0, month = 0, year = 0;
  for (const dStr of dates) {
    const d = new Date(dStr + "T00:00:00");
    if (d >= startOfYear) year++;
    if (d >= startOfMonth) month++;
    if (d >= startOfWeek) week++;
  }
  return { week, month, year };
}

const MONTH_LABELS_SHORT = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];
const MONTH_LABELS_LONG = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

function computeMonthlyDistances(activities, year) {
  const monthsKm = new Array(12).fill(0);
  for (const a of activities) {
    const d = new Date(a.date + "T00:00:00");
    if (d.getFullYear() === year) {
      monthsKm[d.getMonth()] += (a.distance_m || 0) / 1000;
    }
  }
  return monthsKm;
}

function monthlyChart(monthsKm) {
  const width = 600, height = 150, padTop = 16, padBottom = 22, padSide = 24;
  const max = Math.max(...monthsKm, 1);
  const stepX = (width - padSide * 2) / 11;
  const points = monthsKm.map((km, i) => {
    const x = padSide + i * stepX;
    const y = height - padBottom - (km / max) * (height - padTop - padBottom);
    return { x, y, km };
  });
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD = `${pathD} L${points[points.length - 1].x.toFixed(1)},${height - padBottom} L${points[0].x.toFixed(1)},${height - padBottom} Z`;
  const dots = points.map((p) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--rust)" />`).join("");
  const labels = points.map((p, i) => `<text x="${p.x.toFixed(1)}" y="${height - 4}" text-anchor="middle" font-size="9" fill="rgba(238,241,232,0.5)" font-family="var(--font-mono)">${MONTH_LABELS_SHORT[i]}</text>`).join("");

  return `
    <div class="distance-chart-wrap">
      <svg viewBox="0 0 ${width} ${height}" class="distance-chart" preserveAspectRatio="none">
        <path d="${areaD}" fill="rgba(193,80,46,0.15)" stroke="none" />
        <path d="${pathD}" fill="none" stroke="var(--rust)" stroke-width="2" />
        ${dots}
        ${labels}
      </svg>
    </div>
  `;
}

function monthSelector(selectedMonth) {
  const items = MONTH_LABELS_LONG.map((label, i) => `
    <button class="month-chip ${i === selectedMonth ? "is-active" : ""}" data-month="${i}">${label}</button>
  `).join("");
  return `<div class="month-selector-scroll">${items}</div>`;
}

function monthCalendar(activities, year, month) {
  const dateSet = new Set(activities.map((a) => a.date));
  const first = new Date(year, month, 1);
  const startDow = (first.getDay() + 6) % 7; // lundi = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    cells.push({ day, iso, active: dateSet.has(iso) });
  }

  const dowHtml = ["L", "M", "M", "J", "V", "S", "D"].map((d) => `<div class="cal-dow">${d}</div>`).join("");
  const cellsHtml = cells.map((c) =>
    c ? `<div class="cal-day ${c.active ? "is-active" : ""}" title="${c.iso}">${c.day}</div>` : `<div class="cal-day is-empty"></div>`
  ).join("");

  return `
    <div class="month-calendar">
      <div class="cal-grid cal-dow-row">${dowHtml}</div>
      <div class="cal-grid">${cellsHtml}</div>
    </div>
  `;
}

function splitLadder(prs) {
  if (!prs.length) {
    return `<p class="muted">Aucune course enregistrée pour l'instant. Ajoute ta première course pour voir apparaître tes records.</p>`;
  }

  const withTime = prs.filter((p) => p.meilleur_temps_s);
  const maxSec = withTime.length ? Math.max(...withTime.map((p) => p.meilleur_temps_s)) : 1;

  const rows = ["1K", "5K", "10K", "Semi", "Marathon"].map((label) => {
    const pr = prs.find((p) => p.distance_label === label);
    const sec = pr ? pr.meilleur_temps_s : null;
    const widthPct = sec ? Math.max(12, (sec / maxSec) * 100) : 6;
    const empty = !sec;
    return `
      <div class="split-row ${empty ? "is-empty" : ""}">
        <span class="split-label">${label}</span>
        <div class="split-track">
          <div class="split-bar" style="width:${widthPct}%"></div>
        </div>
        <span class="split-bib">${formatTemps(sec)}</span>
      </div>
    `;
  }).join("");

  return `<div class="split-ladder">${rows}</div>`;
}

function activityRow(a) {

}

function attachHandlers() {
  const passwordForm = document.getElementById("password-form");
  if (passwordForm) {
    passwordForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("pw-email").value;
      const password = document.getElementById("pw-password").value;
      if (state.authAction === "signup") signUpPassword(email, password);
      else signInPassword(email, password);
    });
  }

  const toggleAction = document.getElementById("toggle-auth-action");
  if (toggleAction) {
    toggleAction.addEventListener("click", (e) => {
      e.preventDefault();
      setState({
        authAction: state.authAction === "signup" ? "signin" : "signup",
        error: null,
        info: null,
      });
    });
  }

  const logoutBtn = document.getElementById("btn-logout");
  if (logoutBtn) logoutBtn.addEventListener("click", logout);

  document.querySelectorAll(".nav-item").forEach((btn) => {
    btn.addEventListener("click", () => setState({ tab: btn.dataset.tab, error: null }));
  });

  const addBtn = document.getElementById("btn-add-activity");
  if (addBtn) addBtn.addEventListener("click", () => setState({ route: "add-activity", error: null }));

  const cancelBtn = document.getElementById("btn-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => setState({ route: "dashboard", error: null }));

  const avatarTrigger = document.getElementById("avatar-trigger");
  const avatarInput = document.getElementById("f-avatar");
  if (avatarTrigger && avatarInput) {
    avatarTrigger.addEventListener("click", () => avatarInput.click());
    avatarInput.addEventListener("change", () => {
      if (avatarInput.files[0]) uploadAvatar(avatarInput.files[0]);
    });
  }

  const distanceInput = document.getElementById("f-distance");
  if (distanceInput) {
    distanceInput.addEventListener("change", () => {
      const km = Math.floor(parseFloat(distanceInput.value) || 0);
      setState({ splitInputsCount: Math.min(km, 50) });
    });
  }

  const activityForm = document.getElementById("activity-form");
  if (activityForm) {
    activityForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const dureeS = parseDuree(document.getElementById("f-duree").value);
      if (!dureeS) {
        setState({ error: "Format de durée invalide. Utilise mm:ss ou hh:mm:ss." });
        return;

      const kmSplits = Array.from(document.querySelectorAll(".km-split-input")).map((input) =>

      );

      saveActivity({
        date: document.getElementById("f-date").value,
        distanceKm: parseFloat(document.getElementById("f-distance").value),
        dureeS,
        deniveleM: parseFloat(document.getElementById("f-denivele").value) || 0,
        kmSplits,
      });
    });
  }
}
