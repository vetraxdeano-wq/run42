    { label: "Sous les 18:00", seconds: 1080 },
  ],
  10000: [
    { label: "Sous 1h00", seconds: 3600 },
    { label: "Sous 50:00", seconds: 3000 },
    { label: "Sous 45:00", seconds: 2700 },
    { label: "Sous 40:00", seconds: 2400 },
    { label: "Sous 35:00", seconds: 2100 },
  ],
  15000: [
    { label: "Sous 1h30", seconds: 5400 },
    { label: "Sous 1h15", seconds: 4500 },
    { label: "Sous 1h06", seconds: 3960 },
    { label: "Sous 1h00", seconds: 3600 },
  ],
  20000: [
    { label: "Sous 2h00", seconds: 7200 },
    { label: "Sous 1h40", seconds: 6000 },
    { label: "Sous 1h30", seconds: 5400 },
    { label: "Sous 1h20", seconds: 4800 },
  ],
  21097: [
    { label: "Sous 2h10", seconds: 7800 },
    { label: "Sous 1h50", seconds: 6600 },
    { label: "Sous 1h40", seconds: 6000 },
    { label: "Sous 1h30", seconds: 5400 },
  ],
  42195: [
    { label: "Sous 4h30", seconds: 16200 },
    { label: "Sous 4h00", seconds: 14400 },
    { label: "Sous 3h30", seconds: 12600 },
    { label: "Sous 3h00", seconds: 10800 },
    { label: "Sous 2h30", seconds: 9000 },
  ],
};

function computeSpeedBadges(activities, targetMeters) {
  const tiers = SPEED_TIERS_BY_METERS[targetMeters] || [];
  const relevant = activities.filter((a) => matchesDistanceCategory(a.distance_m || 0, targetMeters));
  return tiers.map((t) => {
    const matches = relevant
      .filter((a) => (a.duree_s || 0) > 0 && a.duree_s <= t.seconds)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    return {
      ...t,
      achievedCount: matches.length,
      unlocked: matches.length > 0,
      bestDate: matches.length
        ? matches.reduce((best, a) => (a.duree_s < best.duree_s ? a : best)).date
        : null,
      dates: matches.map((a) => a.date),
    };
  });
}

function computeBadges(activities) {
  const count = activities.length;

  const activityBadges = ACTIVITY_BADGES.map((b) => ({ ...b, unlocked: count >= b.count }));

  const distanceBadges = DISTANCE_BADGES.map((b) => {
    const matches = activities
      .filter((a) => (a.distance_m || 0) >= b.meters)
      .sort((a, b2) => (a.date < b2.date ? 1 : -1));
    const achievedCount = matches.length;
    return {
      ...b,
      achievedCount,
      unlocked: achievedCount > 0,
      tier: computeTierForThresholds(achievedCount, b.tierThresholds),
      next: nextTierForThresholds(achievedCount, b.tierThresholds),
      dates: matches.map((a) => a.date),
      entries: matches.map((a) => ({ id: a.id, date: a.date })),
    };
  });

  const durationBadges = DURATION_BADGES.map((b) => {
    const matches = activities
      .filter((a) => (a.duree_s || 0) >= b.seconds)
      .sort((a, b2) => (a.date < b2.date ? 1 : -1));
    const achievedCount = matches.length;
    return {
      ...b,
      achievedCount,
      unlocked: achievedCount > 0,
      tier: computeTierForThresholds(achievedCount, b.tierThresholds),
      next: nextTierForThresholds(achievedCount, b.tierThresholds),
      dates: matches.map((a) => a.date),
      entries: matches.map((a) => ({ id: a.id, date: a.date })),
    };
  });

  return { activityBadges, distanceBadges, durationBadges };
}

// Compare l'état des badges avant/après une nouvelle activité pour détecter
// les nouveaux paliers débloqués (notification). Prend les listes brutes
// d'activités avant/après l'ajout.
function detectBadgeUnlocks(activitiesBefore, activitiesAfter) {
  const before = computeBadges(activitiesBefore);
  const after = computeBadges(activitiesAfter);
  const messages = [];

  after.activityBadges.forEach((b, i) => {
    if (b.unlocked && !before.activityBadges[i].unlocked) {
      messages.push({ icon: b.icon, text: `Badge débloqué : <strong>${b.label}</strong> !` });
    }
  });

  const compareTiered = (beforeList, afterList) => {
    afterList.forEach((b, i) => {
      const beforeTierKey = beforeList[i].tier ? beforeList[i].tier.key : null;
      const afterTierKey = b.tier ? b.tier.key : null;
      if (afterTierKey && afterTierKey !== beforeTierKey) {
        messages.push({
          icon: b.tier.icon,
          text: `Nouveau palier : <strong>${b.label} — ${b.tier.label}</strong> (×${b.achievedCount}) !`,
        });
      }
    });
  };

  compareTiered(before.distanceBadges, after.distanceBadges);
  compareTiered(before.durationBadges, after.durationBadges);

  // Badges combinés vitesse : uniquement sur les distances
  DISTANCE_BADGES.forEach((db) => {
    const beforeSpeed = computeSpeedBadges(activitiesBefore, db.meters);
    const afterSpeed = computeSpeedBadges(activitiesAfter, db.meters);
    afterSpeed.forEach((s, i) => {
      if (s.unlocked && !beforeSpeed[i].unlocked) {
        messages.push({ icon: "⚡", text: `Badge vitesse débloqué : <strong>${db.label} ${s.label}</strong> !` });
      }
    });
  });

  return messages;
}

// ============================================================
// Prédictions de chrono (VDOT + Riegel, pondérées assiduité)
// ============================================================
//
// Principe : chaque activité valide (distance + durée connues) devient un ou
// plusieurs "points de performance". Le modèle VDOT (Daniels & Gilbert)
// suppose par construction que le temps fourni correspond à un effort
// maximal de course (100 % de l'engagement) sur la distance parcourue. Or la
// grande majorité des sorties enregistrées ne sont PAS courues à cet
// effort-là : un 10K bouclé en endurance fondamentale est volontairement
// couru "tranquille", pas pour battre un record. Injecter son temps brut
// dans la formule sous-estimerait donc largement la forme réelle du coureur.
//
// On corrige ça en deux étapes indépendantes pour chaque point :
//  1) Équivalent course (TYPE_RACE_EFFORT_FACTOR) : avant de calculer le
//     VDOT, on ramène le temps réel à un temps "à effort de course" en le
//     multipliant par un facteur <1 qui dépend du type de séance (plus la
//     séance est tranquille, plus la correction est forte). C'est cette
//     valeur corrigée qui sert de base à la projection sur les autres
//     distances — pas le chrono brut.
//  2) Pondération de fiabilité (TYPE_RELIABILITY) : même corrigée, une
//     estimation issue d'une sortie tranquille reste moins fiable qu'une
//     vraie perf de compétition, donc elle pèse moins dans la moyenne
//     pondérée finale et abaisse la confiance affichée.
//
// Les points sont aussi pondérés par leur ancienneté (les perfs récentes
// comptent plus, décroissance exponentielle) et par l'écart entre la
// distance source et la distance cible (extrapoler un 10K vers un semi est
// plus fiable qu'un 1K vers un marathon). Un score d'assiduité (régularité +
// tendance de volume sur 8 semaines) ajuste ensuite légèrement le résultat
// final, et — au-delà du 10K — un contrôle d'endurance spécifique pénalise
// la prédiction si aucune sortie récente ne s'approche de la distance visée.

// Fiabilité relative de chaque type de séance comme indicateur d'allure de course
const TYPE_RELIABILITY = {
  "Compétition": 1.00,
  "Seuil / Tempo": 0.85,
  "Fractionné": 0.60,
  "Sortie longue": 0.55,
  "Sortie libre": 0.40,
  "Endurance Fondamentale": 0.35,
  "Récupération": 0.15,
};
const TYPE_RELIABILITY_DEFAULT = 0.30;

// Facteur multiplicatif appliqué au temps réel pour estimer le temps
// "équivalent course" (effort maximal) à partir duquel le VDOT est calculé.
// 1.00 = déjà couru à effort de course (aucune correction). Plus le chiffre
// est bas, plus la séance était tranquille par rapport à ce que le coureur
// est réellement capable de produire en compétition sur la même distance.
// Ordres de grandeur issus des repères d'intensité d'entraînement usuels
// (% VMA / % VO2max) : seuil ≈ 88-92 %, endurance fondamentale ≈ 65-75 %,
// récupération ≈ 60-65 %, contre ~100 % en course.
const TYPE_RACE_EFFORT_FACTOR = {
  "Compétition": 1.00,
  "Seuil / Tempo": 0.97,
  "Fractionné": 0.93,
  "Sortie longue": 0.90,
  "Sortie libre": 0.85,
  "Endurance Fondamentale": 0.80,
  "Récupération": 0.70,
};
const TYPE_RACE_EFFORT_FACTOR_DEFAULT = 0.85;

// Convertit un temps réel en temps "équivalent course" selon le type de
// séance. Un segment extrait des splits (source "splits") capte déjà le
// rythme réellement couru sur cette portion, hors récupération — il est
// donc plus proche de l'effort maximal que la moyenne de toute la séance,
// et la correction est atténuée de moitié.
function raceEffortFactor(type, source) {
  const base = TYPE_RACE_EFFORT_FACTOR[type] ?? TYPE_RACE_EFFORT_FACTOR_DEFAULT;
  if (source === "splits") return Math.min(1, base + (1 - base) * 0.5);
  return base;
}

const PREDICTION_RECENCY_HALFLIFE_DAYS = 45; // une perf "pèse" moitié moins tous les ~45 jours
const PREDICTION_MIN_DISTANCE_M = 800;       // sous ce seuil, une sortie n'est pas un point fiable

// ---------- Modèle physiologique (Daniels & Gilbert) ----------

function vo2FromVelocity(vMetersPerMin) {
  return -4.60 + 0.182258 * vMetersPerMin + 0.000104 * vMetersPerMin * vMetersPerMin;
}

function percentVo2Max(tMinutes) {
  return 0.8 + 0.1894393 * Math.exp(-0.012778 * tMinutes) + 0.2989558 * Math.exp(-0.1932605 * tMinutes);
}

// VDOT à partir d'une performance réelle (distance en m, temps en s)
function vdotFromPerformance(distanceM, timeS) {
  const tMin = timeS / 60;
  if (tMin <= 0) return 0;
  const v = distanceM / tMin;
  return vo2FromVelocity(v) / percentVo2Max(tMin);
}

// Temps théorique (s) pour parcourir distanceM avec un VDOT donné, par
// bissection (la relation VDOT ↔ temps n'a pas d'inverse analytique simple).
function predictTimeFromVdot(vdot, distanceM) {
  let lo = distanceM * 0.12; // ~2:00/km — borne basse volontairement irréaliste (garde-fou)
  let hi = distanceM * 0.75; // ~12:30/km — borne haute (garde-fou)
  for (let i = 0; i < 40; i++) {
    const mid = (lo + hi) / 2;
    const impliedVdot = vdotFromPerformance(distanceM, mid);
    if (impliedVdot > vdot) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

// ---------- Constitution des points de performance ----------

function predictionTypeWeight(type) {
  return TYPE_RELIABILITY[type] ?? TYPE_RELIABILITY_DEFAULT;
}

// Un "point" par effort exploitable : l'activité entière, plus, si des
// splits km existent, les meilleurs segments qu'on peut en extraire (utile
// pour capter la vraie vitesse de course dans un Fractionné ou une sortie
// longue avec accélérations, indépendamment des temps de repos inclus dans
// la durée totale).
function collectPredictionPoints(activities) {
  const points = [];
  for (const a of activities || []) {
    if (!a.distance_m || !a.duree_s || a.distance_m < PREDICTION_MIN_DISTANCE_M) continue;
    const type = a.type_activite || null;
    const baseWeight = predictionTypeWeight(type);

    points.push({
      distanceM: a.distance_m,
      timeS: a.duree_s,
      date: a.date,
      type,
      weight: baseWeight,
      source: "total",
      activityId: a.id,
    });

    if (a.km_splits && a.km_splits.length >= 3) {
      for (const eff of computeBestEfforts(a.distance_m, a.duree_s, a.km_splits)) {
        if (eff.source !== "splits") continue;
        points.push({
          distanceM: DISTANCE_METERS[eff.distance_label],
          timeS: eff.temps_s,
          date: a.date,
          type,
          // Un segment extrait des splits est un signal plus "pur" qu'une
          // moyenne sur toute la sortie (il exclut la récup) : légère prime.
          weight: Math.min(1, baseWeight + 0.15),
          source: "splits",
          activityId: a.id,
        });
      }
    }
  }
  return points;
}

function daysBetween(dateA, dateB) {
  const a = new Date(dateA + "T00:00:00");
  const b = new Date(dateB + "T00:00:00");
  return Math.max(0, Math.round((b - a) / 86400000));
}

function recencyWeight(pointDate, referenceDate) {
  const age = daysBetween(pointDate, referenceDate);
  return Math.pow(0.5, age / PREDICTION_RECENCY_HALFLIFE_DAYS);
}

// Pénalise (légèrement) l'extrapolation entre deux distances trop éloignées
function distanceClosenessWeight(sourceM, targetM) {
  const ratio = Math.abs(Math.log(targetM / sourceM));
  return 1 / (1 + 0.6 * ratio);
}

// ---------- Assiduité ----------

const ASSIDUITE_WINDOW_WEEKS = 8;

// Régularité (proportion de semaines actives sur 8 semaines) + tendance de
// volume (4 dernières semaines vs 4 précédentes), combinées en un score
// entre -1 (irrégulier / net recul) et +1 (très régulier / en progression).
function computeAssiduite(activities, referenceDate) {
  const refMonday = mondayKey(referenceDate);
  const weekKeys = [];
  for (let i = 0; i < ASSIDUITE_WINDOW_WEEKS; i++) weekKeys.push(addDaysKey(refMonday, -7 * i));

  const perWeek = Object.fromEntries(weekKeys.map((k) => [k, { count: 0, km: 0 }]));
  for (const a of activities || []) {
    if (!a.date || a.date > referenceDate) continue;
    const wk = mondayKey(a.date + "T00:00:00");
    if (perWeek[wk]) {
      perWeek[wk].count += 1;
      perWeek[wk].km += (a.distance_m || 0) / 1000;
    }
  }

  const activeWeeksCount = weekKeys.filter((k) => perWeek[k].count > 0).length;
  const regularityRatio = activeWeeksCount / ASSIDUITE_WINDOW_WEEKS;

  const recent4 = weekKeys.slice(0, 4).reduce((s, k) => s + perWeek[k].km, 0);
  const prior4 = weekKeys.slice(4, 8).reduce((s, k) => s + perWeek[k].km, 0);
  const trendRatio = prior4 > 0 ? recent4 / prior4 : (recent4 > 0 ? 2 : 1);
  const trendComponent = Math.max(-1, Math.min(1, trendRatio - 1));

  const score = Math.max(-1, Math.min(1, (regularityRatio - 0.5) * 1.4 + trendComponent * 0.3));

  let label, tone;
  if (activeWeeksCount === 0) { label = "Pas d'activité récente"; tone = "negative"; }
  else if (score >= 0.5) { label = "Très assidu, en progression"; tone = "positive"; }
  else if (score >= 0.15) { label = "Entraînement régulier"; tone = "positive"; }
  else if (score > -0.15) { label = "Régularité correcte"; tone = "neutral"; }
  else if (score > -0.5) { label = "Entraînement irrégulier"; tone = "negative"; }
  else { label = "Gros passage à vide récent"; tone = "negative"; }

  // Impact sur les prédictions : ±2.5 % max sur le temps prédit final.
  const adjustmentFactor = 1 - score * 0.025;

  return { activeWeeksCount, regularityRatio, trendRatio, score, label, tone, adjustmentFactor, recentKm: recent4, priorKm: prior4 };
}

// ---------- Combinaison finale ----------

const PREDICTION_CONFIDENCE_TIERS = [
  { key: "faible", label: "Fiabilité faible" },
  { key: "correcte", label: "Fiabilité correcte" },
  { key: "bonne", label: "Bonne fiabilité" },
  { key: "excellente", label: "Excellente fiabilité" },
];

function confidenceTierFromScore(totalWeight, pointCount) {
  const score = Math.min(1, (totalWeight / 4) * 0.7 + (Math.min(pointCount, 6) / 6) * 0.3);
  if (score >= 0.75) return { ...PREDICTION_CONFIDENCE_TIERS[3], score };
  if (score >= 0.5) return { ...PREDICTION_CONFIDENCE_TIERS[2], score };
  if (score >= 0.25) return { ...PREDICTION_CONFIDENCE_TIERS[1], score };
  return { ...PREDICTION_CONFIDENCE_TIERS[0], score };
}

// Calcule, à partir des contributions pondérées d'une prédiction, une
// fourchette basse/haute autour du temps prédit. Avec ≥2 points, on part de
// l'écart-type pondéré des projections individuelles (dispersion réelle des
// points de mesure) ; avec un seul point, on n'a aucune dispersion mesurable
// donc on retombe sur une fourchette forfaitaire liée au score de confiance
// (moins de confiance ⇒ fourchette plus large). Dans les deux cas la largeur
// est bornée entre 1 % et 15 % du temps prédit pour rester réaliste.
function predictionRange(seconds, contributions, confidenceScore) {
  let spread;
  if (contributions.length >= 2) {
    let varSum = 0, wSum = 0;
    for (const c of contributions) {
      varSum += c.w * Math.pow(c.predictedT - seconds, 2);
      wSum += c.w;
    }
    const variance = wSum > 0 ? varSum / wSum : 0;
    spread = Math.sqrt(variance);
  } else {
    spread = seconds * (0.03 + (1 - confidenceScore) * 0.09);
  }
  spread = Math.min(Math.max(spread, seconds * 0.01), seconds * 0.15);
  return { low: seconds - spread, high: seconds + spread, spread };
}

// ---------- Endurance spécifique (au-delà du 10K) ----------
//
// L'extrapolation VDOT suppose une forme cardio comparable quelle que soit
// la distance, mais au-delà d'environ 1h de course, la limite n'est plus
// seulement cardio-vasculaire : réserves de glycogène, résistance musculaire
// à la fatigue, gestion du ravitaillement. Un coureur rapide sur 10K mais
// qui n'a jamais couru proche d'un semi ou d'un marathon aura très
// probablement un temps réel moins bon que la simple projection VDOT, faute
// d'endurance spécifique éprouvée ("le mur"). On pénalise donc le temps
// prédit quand la plus longue sortie récente reste loin de la distance
// visée, et on élargit la fourchette en conséquence (l'ampleur exacte de cet
// effet est elle-même incertaine tant qu'il n'a pas été testé à l'entraînement).
const ENDURANCE_GAP_RELEVANCE_WEIGHT_MIN = 0.15; // ignore les sorties trop anciennes (~130 j avec demi-vie 45 j)

function enduranceGapConfig(targetMeters) {
  if (targetMeters <= 12000) return null;                     // 1K à 10K : pas de pénalité, l'aérobie domine
  if (targetMeters <= 17000) return { fullRatio: 0.70, maxPenalty: 0.02 };  // 15K
  if (targetMeters <= 20500) return { fullRatio: 0.75, maxPenalty: 0.035 }; // 20K
  if (targetMeters <= 30000) return { fullRatio: 0.75, maxPenalty: 0.05 };  // Semi
  return { fullRatio: 0.75, maxPenalty: 0.12 };                            // Marathon
}

function enduranceGapAdjustment(targetMeters, points, referenceDate) {
  const cfg = enduranceGapConfig(targetMeters);
  if (!cfg) return { factor: 1, penalty: 0, ratio: 1, longestM: null };

  let longestM = 0;
  for (const p of points) {
    if (recencyWeight(p.date, referenceDate) < ENDURANCE_GAP_RELEVANCE_WEIGHT_MIN) continue;
    if (p.distanceM > longestM) longestM = p.distanceM;
  }

  const ratio = longestM / targetMeters;
  if (ratio >= cfg.fullRatio) return { factor: 1, penalty: 0, ratio, longestM };

  const gap = 1 - ratio / cfg.fullRatio; // 0 (juste sous le seuil) → 1 (aucune sortie longue récente)
  const penalty = cfg.maxPenalty * gap;
  return { factor: 1 + penalty, penalty, ratio, longestM };
}

// Calcule la prédiction pour une distance cible, à partir d'une liste de
// points déjà filtrés (date <= referenceDate), avec ajustement d'assiduité
// puis d'endurance spécifique.
function predictForDistance(points, targetMeters, referenceDate, assiduiteFactor) {
  if (!points.length) return null;

  let weightedSum = 0;
  let weightTotal = 0;
  let ageWeightedSum = 0;
  const contributions = [];

  for (const p of points) {
    const effortFactor = raceEffortFactor(p.type, p.source);
    const raceEquivalentTimeS = p.timeS * effortFactor;
    const vdot = vdotFromPerformance(p.distanceM, raceEquivalentTimeS);
    if (!vdot || !isFinite(vdot) || vdot <= 0) continue;
    const predictedT = predictTimeFromVdot(vdot, targetMeters);
    const recW = recencyWeight(p.date, referenceDate);
    const closeW = distanceClosenessWeight(p.distanceM, targetMeters);
    const w = p.weight * recW * closeW;
    if (w <= 0) continue;
    weightedSum += predictedT * w;
    weightTotal += w;
    ageWeightedSum += daysBetween(p.date, referenceDate) * w;
    contributions.push({ ...p, predictedT, w, vdot, recW, closeW, effortFactor, raceEquivalentTimeS });
  }

  if (weightTotal === 0) return null;

  const rawSeconds = weightedSum / weightTotal;
  const assiduiteAdjusted = rawSeconds * assiduiteFactor;

  contributions.sort((a, b) => b.w - a.w);
  for (const c of contributions) c.wShare = c.w / weightTotal;

  const confidence = confidenceTierFromScore(weightTotal, contributions.length);
  const endurance = enduranceGapAdjustment(targetMeters, points, referenceDate);
  const seconds = assiduiteAdjusted * endurance.factor;

  // La fourchette est d'abord estimée autour de la moyenne pondérée des
  // projections (dispersion réelle des points de mesure), puis recentrée sur
  // le temps final — pénalité d'endurance comprise — et légèrement élargie
  // quand cette pénalité est significative, puisque son ampleur exacte reste
  // incertaine tant qu'elle n'a pas été validée à l'entraînement.
  const baseRange = predictionRange(assiduiteAdjusted, contributions, confidence.score);
  let spread = baseRange.spread * endurance.factor * (1 + endurance.penalty * 0.6);
  spread = Math.min(Math.max(spread, seconds * 0.01), seconds * 0.2);
  const range = { low: seconds - spread, high: seconds + spread, spread };

  return {
    seconds,
    rawSeconds,
    paceSecPerKm: seconds / (targetMeters / 1000),
    range,
    avgAgeDays: ageWeightedSum / weightTotal,
    confidence,
    endurance,
    pointCount: contributions.length,
    topContribution: contributions[0] || null,
    contributions,
  };
}

// Point d'entrée principal : prédictions pour toutes les distances de
// référence, à une date donnée (par défaut aujourd'hui), à partir de
// l'historique complet des activités.
function computePredictions(activities, referenceDate) {
  const refDate = referenceDate || new Date().toISOString().slice(0, 10);
  const relevantActivities = (activities || []).filter((a) => a.date && a.date <= refDate);
  const points = collectPredictionPoints(relevantActivities);
  const assiduite = computeAssiduite(activities, refDate);

  const predictions = {};
  for (const label of DISTANCE_ORDER) {
    predictions[label] = predictForDistance(points, DISTANCE_METERS[label], refDate, assiduite.adjustmentFactor);
  }
  return { predictions, assiduite };
}

// Prédictions recalculées en excluant la toute dernière activité enregistrée
// (à la date de l'avant-dernière) — sert de point de comparaison pour
// afficher l'effet de la dernière sortie sur chaque prédiction.
function computePredictionsExcludingLast(activities) {
  const dated = (activities || []).filter((a) => a.date);
  if (!dated.length) return null;
  const sorted = [...dated].sort((a, b) => (a.date < b.date ? 1 : -1));
  const last = sorted[0];
  const withoutLast = (activities || []).filter((a) => a.id !== last.id);
  const remaining = withoutLast.filter((a) => a.date).sort((a, b) => (a.date < b.date ? 1 : -1));
  const referenceDate = remaining.length ? remaining[0].date : addDaysKey(last.date, -1);
  return { result: computePredictions(withoutLast, referenceDate), lastActivity: last };
}

// Historique glissant (8 → 0 semaines) d'une prédiction, pour tracer sa
// courbe d'évolution récente (mini graphique dans la carte de prédiction).
const PREDICTION_HISTORY_WEEKS_AGO = [8, 6, 4, 2, 0];

function computePredictionHistory(activities, targetMeters) {
  const today = new Date().toISOString().slice(0, 10);
  return PREDICTION_HISTORY_WEEKS_AGO.map((weeksAgo) => {
    const cutoff = addDaysKey(today, -7 * weeksAgo);
    const relevant = (activities || []).filter((a) => a.date && a.date <= cutoff);
    const points = collectPredictionPoints(relevant);
    const assiduite = computeAssiduite(activities, cutoff);
    const prediction = predictForDistance(points, targetMeters, cutoff, assiduite.adjustmentFactor);
    return { weeksAgo, cutoff, seconds: prediction ? prediction.seconds : null };
  });
}

function formatDeltaSeconds(s) {
  const abs = Math.round(Math.abs(s));
  if (abs < 60) return `${abs} s`;
  const m = Math.floor(abs / 60);
  const rem = abs % 60;
  return rem ? `${m} min ${String(rem).padStart(2, "0")} s` : `${m} min`;
}

// Allure au format mm:ss/km, à partir d'un temps en secondes par kilomètre.
function formatPace(secPerKm) {
  const total = Math.round(secPerKm);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

const AGE_DAYS_FMT = new Intl.NumberFormat("fr-FR", { maximumFractionDigits: 0 });

const MONTH_LABELS_SHORT = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];
const MONTH_LABELS_LONG = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

function computeMonthlyDistances(activities, year) {
  const monthsKm = new Array(12).fill(0);
  for (const a of activities) {
    const d = new Date(a.date + "T00:00:00");
    if (d.getFullYear() === year) {
      monthsKm[d.getMonth()] += (a.distance_m || 0) / 1000;
    }
  }
  return monthsKm;
}

// Choisit un pas d'axe "rond" (1, 2, 5, 10, 20, 50, 100...) pour que les
// graduations verticales tombent sur des valeurs de km lisibles.
function niceAxisStep(maxValue, targetTicks) {
  const rough = maxValue / targetTicks;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rough || 1)));
  const residual = rough / magnitude;
  let niceResidual;
  if (residual > 5) niceResidual = 10;
  else if (residual > 2) niceResidual = 5;
  else if (residual > 1) niceResidual = 2;
  else niceResidual = 1;
  return niceResidual * magnitude;
}

function monthlyChart(monthsKm, monthIndices) {
  const indices = monthIndices || monthsKm.map((_, i) => i);
  const values = indices.map((i) => monthsKm[i]);
  const width = 600, height = 170, padTop = 16, padBottom = 22, padLeft = 40, padRight = 12;
  const rawMax = Math.max(...values, 1);
  const step = niceAxisStep(rawMax, 3);
  const axisMax = Math.max(step, Math.ceil(rawMax / step) * step);
  const plotWidth = width - padLeft - padRight;
  const stepX = values.length > 1 ? plotWidth / (values.length - 1) : 0;

  const yFor = (km) => height - padBottom - (km / axisMax) * (height - padTop - padBottom);

  const points = values.map((km, i) => {
    const x = values.length > 1 ? padLeft + i * stepX : padLeft + plotWidth / 2;
    return { x, y: yFor(km), km, monthIndex: indices[i] };
  });
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD = `${pathD} L${points[points.length - 1].x.toFixed(1)},${height - padBottom} L${points[0].x.toFixed(1)},${height - padBottom} Z`;
  const dots = points.map((p) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--rust)"><title>${p.km.toFixed(1)} km</title></circle>`).join("");
  const valueLabels = points.map((p) => `<text x="${p.x.toFixed(1)}" y="${(p.y - 8).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(238,241,232,0.75)" font-family="var(--font-mono)">${p.km > 0 ? p.km.toFixed(0) : ""}</text>`).join("");
  const monthLabels = points.map((p) => `<text x="${p.x.toFixed(1)}" y="${height - 4}" text-anchor="middle" font-size="9" fill="rgba(238,241,232,0.5)" font-family="var(--font-mono)">${MONTH_LABELS_SHORT[p.monthIndex]}</text>`).join("");

  // Graduations de l'axe vertical (distance totale du mois, en km)
  const tickCount = Math.round(axisMax / step);
  const yTicks = [];
  for (let i = 0; i <= tickCount; i++) yTicks.push(i * step);
  const gridLines = yTicks.map((km) => {
    const y = yFor(km);
    return `
      <line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${width - padRight}" y2="${y.toFixed(1)}" stroke="rgba(238,241,232,0.08)" stroke-width="1" ${km === 0 ? "" : 'stroke-dasharray="3,3"'} />
      <text x="${padLeft - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(238,241,232,0.45)" font-family="var(--font-mono)">${km}</text>
    `;
  }).join("");

  return `
    <div class="distance-chart-wrap">
      <svg viewBox="0 0 ${width} ${height}" class="distance-chart" preserveAspectRatio="none">
        ${gridLines}
        <text x="${padLeft}" y="12" font-size="9" fill="rgba(238,241,232,0.45)" font-family="var(--font-mono)">km</text>
        <path d="${areaD}" fill="rgba(87,176,46,0.15)" stroke="none" />
        <path d="${pathD}" fill="none" stroke="var(--rust)" stroke-width="2" />
        ${dots}
        ${valueLabels}
        ${monthLabels}
      </svg>
    </div>
  `;
}

function monthSelector(selectedMonth) {
  const items = MONTH_LABELS_LONG.map((label, i) => `
    <button class="month-chip ${i === selectedMonth ? "is-active" : ""}" data-month="${i}">${label}</button>
  `).join("");
  return `<div class="month-selector-scroll">${items}</div>`;
}

function monthCalendar(activities, year, month) {
  const dateSet = new Set(activities.map((a) => a.date));
  const first = new Date(year, month, 1);
  const startDow = (first.getDay() + 6) % 7; // lundi = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    cells.push({ day, iso, active: dateSet.has(iso) });
  }

  const dowHtml = ["L", "M", "M", "J", "V", "S", "D"].map((d) => `<div class="cal-dow">${d}</div>`).join("");
  const cellsHtml = cells.map((c) =>
    c ? `<div class="cal-day ${c.active ? "is-active" : ""}" title="${c.iso}">${c.day}</div>` : `<div class="cal-day is-empty"></div>`
  ).join("");

  return `
    <div class="month-calendar">
      <div class="cal-grid cal-dow-row">${dowHtml}</div>
      <div class="cal-grid">${cellsHtml}</div>
    </div>
  `;
}

function yearHeatmap(dates) {
  const dateSet = new Set(dates);
  const year = new Date().getFullYear();
  const cellSize = 11, cellGap = 3, padLeft = 20, padTop = 16;

  const start = new Date(year, 0, 1);
  const startDow = (start.getDay() + 6) % 7; // lundi = 0
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() - startDow);

  const end = new Date(year, 11, 31);
  const totalDays = Math.round((end - gridStart) / 86400000) + 1;
  const totalWeeks = Math.ceil(totalDays / 7);

  const cells = [];
  const monthLabelsSeen = new Set();
  const monthLabels = [];

  for (let w = 0; w < totalWeeks; w++) {
    for (let d = 0; d < 7; d++) {
      const day = new Date(gridStart);
      day.setDate(day.getDate() + w * 7 + d);
      if (day.getFullYear() !== year) continue;
      const iso = `${day.getFullYear()}-${String(day.getMonth() + 1).padStart(2, "0")}-${String(day.getDate()).padStart(2, "0")}`;
      const x = padLeft + w * (cellSize + cellGap);
      const y = padTop + d * (cellSize + cellGap);
      cells.push({ x, y, iso, active: dateSet.has(iso) });

      if (day.getDate() <= 7 && !monthLabelsSeen.has(day.getMonth())) {
        monthLabelsSeen.add(day.getMonth());
        monthLabels.push({ x, label: MONTH_LABELS_SHORT[day.getMonth()] });
      }
    }
  }

  const width = padLeft + totalWeeks * (cellSize + cellGap);
  const height = padTop + 7 * (cellSize + cellGap);

  const cellsHtml = cells.map((c) =>
    `<rect x="${c.x}" y="${c.y}" width="${cellSize}" height="${cellSize}" rx="2" fill="${c.active ? "var(--rust)" : "rgba(238,241,232,0.08)"}"><title>${c.iso}</title></rect>`
  ).join("");

  const labelsHtml = monthLabels.map((m) =>
    `<text x="${m.x}" y="10" font-size="9" fill="rgba(238,241,232,0.5)" font-family="var(--font-mono)">${m.label}</text>`
  ).join("");

  return `
    <div class="heatmap-wrap">
      <svg viewBox="0 0 ${width} ${height}" class="heatmap" preserveAspectRatio="xMinYMin meet">
        ${labelsHtml}
        ${cellsHtml}
      </svg>
    </div>
  `;
}

// Fusionne le classement calculé à partir des activités avec un éventuel
// record ajouté manuellement (cf. recordForm), pour une distance donnée.
function topEntriesForLabel(label, prs, rankingsByLabel) {
  const entries = rankingsByLabel[label] || [];
  const pr = prs.find((p) => p.distance_label === label);
  const hasManualEntry = pr && pr.activity_id == null
    && !entries.some((e) => e.temps_s === pr.meilleur_temps_s);
  return hasManualEntry
    ? [...entries, { temps_s: pr.meilleur_temps_s, activity_id: null, date: pr.date_obtenu }].sort((a, b) => a.temps_s - b.temps_s)
    : entries;
}

// ---------- Podium des records — top 3 directement affiché par distance ----------

const PODIUM_MEDALS = { 1: "🥇", 2: "🥈", 3: "🥉" };

function recordsPodium(prs, rankingsByLabel) {
  if (!prs.length) {
    return `<p class="muted">Aucune course enregistrée pour l'instant. Ajoute ta première course pour voir apparaître tes records.</p>`;
  }

  const blocks = ["1K", "5K", "10K", "Semi", "Marathon"].map((label) => {
    const allEntries = topEntriesForLabel(label, prs, rankingsByLabel);
    const top3 = allEntries.slice(0, 3);
    const openable = allEntries.length > 0;

    if (!top3.length) {
      return `
        <div class="podium-block">
          <h4 class="podium-distance">${label}</h4>
          <p class="muted podium-empty">Pas encore de temps enregistré.</p>
        </div>
      `;
    }

    // Ordre d'affichage d'un vrai podium : 2e à gauche, 1er au centre, 3e à droite.
    const displayOrder = [1, 0, 2];
    const steps = displayOrder.map((idx) => {
      const rank = idx + 1;
      const e = top3[idx];
      if (!e) {
        return `
          <div class="podium-step podium-step-${rank} is-empty">
            <span class="podium-medal">${PODIUM_MEDALS[rank]}</span>
            <span class="podium-time">—</span>
            <div class="podium-bar">${rank}</div>
          </div>
        `;
      }
      const linked = !!e.activity_id;
      const tag = !e.activity_id ? "ajouté manuellement"
        : e.source === "splits" ? `extrait d'une course de ${(e.activityDistanceM / 1000).toFixed(1)} km`
        : "";
      return `
        <div class="podium-step podium-step-${rank} ${linked ? "is-linked" : ""}"
             ${linked ? `data-activity-id="${e.activity_id}" role="button" tabindex="0"` : ""}>
          <span class="podium-medal">${PODIUM_MEDALS[rank]}</span>
          <span class="podium-time">${formatTemps(e.temps_s)}</span>
          <div class="podium-bar">${rank}</div>
          ${tag ? `<span class="podium-tag">${tag}</span>` : ""}
        </div>
      `;
    }).join("");

    return `
      <div class="podium-block" ${openable ? `data-records-label="${label}" role="button" tabindex="0"` : ""}>
        <h4 class="podium-distance">${label}</h4>
        <div class="podium-row">${steps}</div>
        ${openable ? `<p class="muted podium-hint">Touche pour voir le classement complet</p>` : ""}
      </div>
    `;
  }).join("");

  return `<div class="podium-list">${blocks}</div>`;
}

function predictionSparkline(history) {
  const valid = history.filter((h) => h.seconds != null);
  if (valid.length < 2) return "";

  const width = 280, height = 34, padX = 6, padY = 6;
  const secondsList = valid.map((h) => h.seconds);
  const min = Math.min(...secondsList);
  const max = Math.max(...secondsList);
  const span = Math.max(max - min, 1);
  const stepX = (width - padX * 2) / (history.length - 1);

  // Plus rapide (temps petit) = plus haut sur le graphique
  const yFor = (s) => padY + ((s - min) / span) * (height - padY * 2);

  let lastX = null, lastY = null;
  const segments = [];
  const dots = [];
  history.forEach((h, i) => {
    if (h.seconds == null) return;
    const x = padX + i * stepX;
    const y = yFor(h.seconds);
    if (lastX != null) {
      segments.push(`<line x1="${lastX.toFixed(1)}" y1="${lastY.toFixed(1)}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--rust)" stroke-width="2" stroke-linecap="round" />`);
    }
    const whenLabel = h.weeksAgo === 0 ? "aujourd'hui" : `il y a ${h.weeksAgo} sem.`;
    dots.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.6" fill="var(--signal)"><title>${formatTemps(h.seconds)} (${whenLabel})</title></circle>`);
    lastX = x; lastY = y;
  });

  return `
    <svg viewBox="0 0 ${width} ${height}" class="prediction-spark" preserveAspectRatio="none">
      ${segments.join("")}
      ${dots.join("")}
    </svg>
  `;
}

// Badge circulaire identifiant la distance : un anneau de progression fait
// le tour du label et matérialise le score de fiabilité de la prédiction
// (anneau plein = fiabilité excellente, anneau à peine amorcé = faible).
// score va de 0 à 1 ; score = null → anneau neutre (carte vide, pas assez
// de données) au lieu d'un pourcentage de confiance.
function predictionBadge(label, score) {
  const r = 27;
  const circumference = 2 * Math.PI * r;
  const pct = score == null ? 0 : Math.max(0.04, score); // un minimum visible même à faible score
  const offset = circumference * (1 - pct);
  return `
    <div class="prediction-badge">
      <svg viewBox="0 0 62 62" class="prediction-badge-ring">
        <circle cx="31" cy="31" r="${r}" class="ring-track" />
        ${score != null ? `<circle cx="31" cy="31" r="${r}" class="ring-progress" stroke-dasharray="${circumference.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" />` : ""}
      </svg>
      <span class="prediction-badge-label${label.length > 3 ? " is-long" : ""}">${label}</span>
    </div>
  `;
}

function predictionCard(label, current, previousSeconds) {
  if (!current) {
    return `
      <div class="prediction-card is-empty">
        <div class="prediction-card-top">
          ${predictionBadge(label, null)}
        </div>
        <p class="prediction-empty-text">Pas assez de données sur cette distance.</p>
      </div>
    `;
  }

  const delta = previousSeconds != null ? previousSeconds - current.seconds : null; // > 0 = plus rapide qu'avant
  let deltaHtml = "";
  if (delta != null && Math.abs(delta) >= 1) {
    const faster = delta > 0;
    deltaHtml = `
      <span class="prediction-delta ${faster ? "is-faster" : "is-slower"}" title="${faster ? "Gagné" : "Perdu"} depuis ta dernière activité enregistrée : ${formatDeltaSeconds(delta)}">
        ${faster ? "▼" : "▲"} ${formatDeltaSeconds(delta)}
      </span>
    `;
  } else if (delta != null) {
    deltaHtml = `<span class="prediction-delta is-stable" title="Stable depuis ta dernière activité enregistrée">= stable</span>`;
  }

  const history = computePredictionHistory(state.allActivities, DISTANCE_METERS[label]);
  const spark = predictionSparkline(history);

  const scorePct = Math.round(current.confidence.score * 100);
  const avgAge = Math.round(current.avgAgeDays);
  const ageLabel = avgAge <= 1 ? "quelques jours" : `${AGE_DAYS_FMT.format(avgAge)} jours`;

  const targetKm = DISTANCE_METERS[label] / 1000;
  const paceLow = current.range.low / targetKm;   // borne rapide de la fourchette
  const paceHigh = current.range.high / targetKm; // borne lente de la fourchette

  const countTitle = `${current.pointCount} performance${current.pointCount > 1 ? "s" : ""} prise${current.pointCount > 1 ? "s" : ""} en compte, âgée${current.pointCount > 1 ? "s" : ""} de ${ageLabel} en moyenne${current.topContribution ? ` · la plus déterminante pèse pour ${Math.round(current.topContribution.wShare * 100)} % du résultat` : ""}.`;

  let enduranceHtml = "";
  if (current.endurance && current.endurance.penalty > 0.004) {
    const longestKm = current.endurance.longestM ? (current.endurance.longestM / 1000).toFixed(1) : "0";
    enduranceHtml = `<span class="prediction-endurance-flag" title="Peu de sorties proches de cette distance récemment (la plus longue fait ${longestKm} km) : marge de prudence d'environ ${Math.round(current.endurance.penalty * 100)} % appliquée pour l'endurance spécifique manquante.">⚠ endurance limitée</span>`;
  }

  return `
    <div class="prediction-card tier-${current.confidence.key}">
      <div class="prediction-card-top">
        ${predictionBadge(label, current.confidence.score)}
        <span class="prediction-tier-caption" title="Score de fiabilité de cette prédiction">${current.confidence.label} · ${scorePct} %</span>
      </div>
      <div class="prediction-main">
        <div class="prediction-time-row">
          <span class="prediction-time">${formatTemps(current.seconds)}</span>
          <span class="prediction-pace">${formatPace(current.paceSecPerKm)} /km</span>
        </div>
        ${deltaHtml}
      </div>
      <div class="prediction-rangebar" title="Fourchette estimée compte tenu de la dispersion de tes performances">
        <div class="prediction-rangebar-track"><div class="prediction-rangebar-marker"></div></div>
        <div class="prediction-rangebar-labels">
          <span>${formatTemps(current.range.low)}<small>${formatPace(paceLow)} /km</small></span>
          <span>${formatTemps(current.range.high)}<small>${formatPace(paceHigh)} /km</small></span>
        </div>
      </div>
      ${spark ? `<div class="prediction-spark-wrap">${spark}</div>` : ""}
      <div class="prediction-meta">
        <span class="prediction-meta-count" title="${countTitle}">${current.pointCount} perf. prise${current.pointCount > 1 ? "s" : ""} en compte</span>
        ${enduranceHtml}
      </div>
    </div>
  `;
}

function assiduiteSummary(assiduite) {
  const impactPct = -assiduite.score * 2.5; // négatif = accélère les prédictions, positif = les ralentit
  const impactLabel = Math.abs(impactPct) < 0.3
    ? "a un effet marginal sur tes prédictions en ce moment"
    : impactPct < 0
      ? `accélère tes prédictions d'environ ${Math.abs(impactPct).toFixed(1)} %`
      : `ralentit tes prédictions d'environ ${impactPct.toFixed(1)} %`;

  return `
    <div class="assiduite-strip tone-${assiduite.tone}">
      <span class="assiduite-label">${assiduite.label}</span>
      <span class="assiduite-detail">${assiduite.activeWeeksCount}/8 semaines actives récemment · cette régularité ${impactLabel}</span>
    </div>
  `;
}

function predictionsSection() {
  const activities = state.allActivities || [];
  const usable = activities.filter((a) => a.distance_m && a.duree_s);

  if (!usable.length) {
    return `

        <h2>Prédictions de chrono</h2>
        <p class="muted">Enregistre au moins une course avec distance et durée pour obtenir tes premières estimations de chrono.</p>
      </section>
    `;
  }

  const { predictions: current, assiduite } = computePredictions(activities);
  const prevData = computePredictionsExcludingLast(activities);
  const previous = prevData ? prevData.result.predictions : {};

  const cardsHtml = DISTANCE_ORDER.map((label) =>
    predictionCard(label, current[label], previous[label] ? previous[label].seconds : null)
  ).join("");

  return `
    <section class="panel">
      <h2>Prédictions de chrono</h2>
      <p class="muted" title="Une sortie tranquille est d'abord ramenée à son équivalent effort de course selon son type, puis pondérée selon sa fiabilité, son ancienneté et son écart à la distance visée, avant ajustement par ton assiduité des 8 dernières semaines.">Temps estimés à effort de compétition maximal, pas à ton allure d'entraînement.</p>
      ${assiduiteSummary(assiduite)}
      <div class="prediction-grid">${cardsHtml}</div>
    </section>
  `;
}

function badgeDetailModal() {

      <div class="badge-speed-section">

  return `

// Génère une couronne de petites flèches discrètes (plutôt qu'une barre
// pleine) : chaque flèche pointe dans le sens de la progression, comme une
// suite de pas qui avancent autour du cadran.
function goalDialTicks(pct) {
  const total = 32;
  const filled = Math.round((Math.max(0, Math.min(100, pct)) / 100) * total);
  const radius = 50;
  let ticks = "";
  for (let i = 0; i < total; i++) {
    const angleDeg = (360 / total) * i - 90;
    const angleRad = (angleDeg * Math.PI) / 180;
    const cx = (60 + radius * Math.cos(angleRad)).toFixed(2);
    const cy = (60 + radius * Math.sin(angleRad)).toFixed(2);
    const rotate = (angleDeg + 90).toFixed(1);
    const isFilled = i < filled;
    ticks += `<path class="goal-tick ${isFilled ? "is-filled" : ""}" d="M-2.6 -3 L2.6 0 L-2.6 3 Z" transform="translate(${cx} ${cy}) rotate(${rotate})" />`;
  }
  return ticks;
}

  return `

        </div>
        <input type="hidden" id="f-goal-metric" value="${metric}" />
      </div>
      <label id="f-goal-target-label">
        ${metric === "duree" ? "Durée cible (minutes)" : "Distance cible (km)"}
        <input type="number" id="f-goal-target" class="goal-form-target-input" min="0.1" step="0.1" value="${goal?.target ?? ""}" required />
      </label>
      <button type="submit" class="btn-primary" ${state.goalSaving ? "disabled" : ""}>
        ${state.goalSaving ? "Enregistrement…" : "Enregistrer mon objectif"}
      </button>
      ${goal ? `<button type="button" class="btn-secondary" id="btn-delete-goal">Supprimer l'objectif</button>` : ""}
    </form>
  `;
}

// Construit un groupe de chips (sélection simple ou multiple) relié à un input caché
function chipGroup({ id, options, selected, multi }) {
  const selectedSet = multi ? new Set(Array.isArray(selected) ? selected : []) : null;
  const buttons = options.map((o) => {
    const active = multi ? selectedSet.has(o.id) : selected === o.id;
    return `<button type="button" class="chip-toggle ${active ? "is-active" : ""}" data-value="${o.id}">${o.label}</button>`;
  }).join("");
  const hiddenValue = multi ? (Array.isArray(selected) ? selected.join(",") : "") : (selected || "");
  return `
    <div class="chip-toggle-group" data-target="${id}" data-multi="${multi ? "true" : "false"}">${buttons}</div>
    <input type="hidden" id="${id}" value="${hiddenValue}" />
  `;
}

function viewToasts() {
  if (!state.notifications.length) return "";
  return `
    <div class="toast-stack">
      ${state.notifications.map((n) => `
        <div class="toast">
          <span class="toast-icon">${n.icon}</span>
          <span class="toast-text">${n.text}</span>
          <button class="toast-close" data-id="${n.id}" aria-label="Fermer la notification">✕</button>
        </div>
      `).join("")}
    </div>
  `;
}

function render() {
  let html;
  if (state.route === "dashboard") html = viewShell();
  else if (state.route === "add-activity") html = viewAddActivity();
  else html = viewLogin();

  root.innerHTML = html + viewToasts();
  attachHandlers();
}

function attachHandlers() {
  const passwordForm = document.getElementById("password-form");
  if (passwordForm) {
    passwordForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("pw-email").value;
      const password = document.getElementById("pw-password").value;
      if (state.authAction === "signup") signUpPassword(email, password);
      else signInPassword(email, password);
    });
  }

  const toggleAction = document.getElementById("toggle-auth-action");
  if (toggleAction) {
    toggleAction.addEventListener("click", (e) => {
      e.preventDefault();
      setState({
        authAction: state.authAction === "signup" ? "signin" : "signup",
        error: null,
        info: null,
      });
    });
  }

  const logoutBtn = document.getElementById("btn-logout");
  if (logoutBtn) logoutBtn.addEventListener("click", logout);

  const chartToggleBtn = document.getElementById("btn-toggle-chart-range");
  if (chartToggleBtn) {
    chartToggleBtn.addEventListener("click", () => setState({ chartFullYear: !state.chartFullYear }));
  }

  const calPrevBtn = document.getElementById("btn-cal-prev");
  if (calPrevBtn) {
    calPrevBtn.addEventListener("click", () => {
      let { calendarYear, calendarMonth } = state;
      calendarMonth -= 1;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear -= 1;
      }
      setState({ calendarYear, calendarMonth });
    });
  }

  const calNextBtn = document.getElementById("btn-cal-next");
  if (calNextBtn) {
    calNextBtn.addEventListener("click", () => {
      const now = new Date();
      let { calendarYear, calendarMonth } = state;
      calendarMonth += 1;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear += 1;
      }
      if (calendarYear > now.getFullYear() || (calendarYear === now.getFullYear() && calendarMonth > now.getMonth())) {
        return;
      }
      setState({ calendarYear, calendarMonth });
    });
  }

  document.querySelectorAll(".nav-item").forEach((btn) => {
    btn.addEventListener("click", () => setState({ tab: btn.dataset.tab, error: null }));
  });

  const addBtn = document.getElementById("btn-add-activity");
  if (addBtn) addBtn.addEventListener("click", () => setState({ route: "add-activity", error: null, editingActivityId: null, splitInputsCount: 0 }));

  const cancelBtn = document.getElementById("btn-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => setState({ route: "dashboard", error: null, editingActivityId: null }));

  document.querySelectorAll(".account-subnav-btn").forEach((btn) => {
    btn.addEventListener("click", () => setState({ accountView: btn.dataset.view }));
  });

  document.querySelectorAll(".sort-chip").forEach((btn) => {
    btn.addEventListener("click", () => {
      const field = btn.dataset.sortField;
      const current = state.accountActivitiesSort;
      const dir = current.field === field ? (current.dir === "asc" ? "desc" : "asc") : "desc";
      setState({ accountActivitiesSort: { field, dir } });
    });
  });

  const toggleRecordFormBtn = document.getElementById("btn-toggle-record-form");
  if (toggleRecordFormBtn) {
    toggleRecordFormBtn.addEventListener("click", () =>
      setState({ recordFormOpen: !state.recordFormOpen, error: null })
    );
  }

  const recordFormEl = document.getElementById("record-form");
  if (recordFormEl) {
    recordFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const dureeS = parseDuree(document.getElementById("f-record-temps").value);
      if (!dureeS) {
        setState({ error: "Format de temps invalide. Utilise mm:ss ou hh:mm:ss." });
        return;
      }
      saveRecordManual({
        distanceLabel: document.getElementById("f-record-distance").value,
        dureeS,
        dateObtenu: document.getElementById("f-record-date").value,
      });
    });
  }

  document.querySelectorAll(".podium-step.is-linked").forEach((step) => {
    const goToActivity = () => setState({ activityDetailId: step.dataset.activityId });
    step.addEventListener("click", goToActivity);
    step.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goToActivity();
      }
    });
  });

  document.querySelectorAll(".podium-block[data-records-label]").forEach((block) => {
    const open = (e) => {
      // Un clic sur une marche du podium (temps déjà cliquable vers une
      // activité) ne doit pas aussi ouvrir la modale de classement complet.
      if (e && e.target && e.target.closest(".podium-step")) return;
      setState({ recordsModal: block.dataset.recordsLabel });
    };
    block.addEventListener("click", open);
    block.addEventListener("keydown", (e) => {
      if ((e.key === "Enter" || e.key === " ") && !e.target.closest(".podium-step")) {
        e.preventDefault();
        open();
      }
    });
  });

  const recordsDetailOverlay = document.getElementById("records-detail-overlay");
  if (recordsDetailOverlay) {
    recordsDetailOverlay.addEventListener("click", (e) => {
      if (e.target === recordsDetailOverlay) setState({ recordsModal: null });
    });
  }

  const recordsDetailClose = document.getElementById("records-detail-close");
  if (recordsDetailClose) {
    recordsDetailClose.addEventListener("click", () => setState({ recordsModal: null }));
  }

  document.querySelectorAll(".record-rank-row.is-linked").forEach((row) => {
    const goToActivity = () => setState({ recordsModal: null, activityDetailId: row.dataset.activityId });
    row.addEventListener("click", goToActivity);
    row.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goToActivity();
      }
    });
  });

  const editPseudoBtn = document.getElementById("btn-edit-pseudo");
  if (editPseudoBtn) editPseudoBtn.addEventListener("click", () => setState({ pseudoEditing: true, error: null }));

  const cancelPseudoBtn = document.getElementById("btn-cancel-pseudo");
  if (cancelPseudoBtn) cancelPseudoBtn.addEventListener("click", () => setState({ pseudoEditing: false, error: null }));

  const pseudoForm = document.getElementById("pseudo-form");
  if (pseudoForm) {
    pseudoForm.addEventListener("submit", (e) => {
      e.preventDefault();
      savePseudo(document.getElementById("f-pseudo").value);
    });
  }

  const editProfilBtn = document.getElementById("btn-edit-profil");
  if (editProfilBtn) editProfilBtn.addEventListener("click", () => setState({ profilEditing: true, error: null }));

  const profilFormEl = document.getElementById("profil-form");
  if (profilFormEl) {
    profilFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const joursValue = document.getElementById("f-jours").value;
      const terrainValue = document.getElementById("f-terrain").value;
      const contraintesValue = document.getElementById("f-contraintes").value;
      saveProfil({
        niveau: document.getElementById("f-niveau").value,
        experience: document.getElementById("f-experience").value,
        volumeHebdo: document.getElementById("f-volume").value,
        objectif: document.getElementById("f-objectif").value,
        objectifDate: document.getElementById("f-objectif-date").value || null,
        objectifTemps: document.getElementById("f-objectif-temps").value.trim() || null,
        joursSemaine: joursValue ? joursValue.split(",") : [],
        dureeSeance: document.getElementById("f-duree-seance").value,
        terrain: terrainValue ? terrainValue.split(",") : [],
        contraintes: contraintesValue ? contraintesValue.split(",") : [],
        notes: document.getElementById("f-profil-notes").value.trim(),
      });
    });
  }

  const editGoalBtn = document.getElementById("btn-edit-goal");
  if (editGoalBtn) editGoalBtn.addEventListener("click", () => setState({ goalEditing: true, error: null }));

  const cancelGoalBtn = document.getElementById("btn-cancel-goal");
  if (cancelGoalBtn) cancelGoalBtn.addEventListener("click", () => setState({ goalEditing: false, error: null }));

  const deleteGoalBtn = document.getElementById("btn-delete-goal");
  if (deleteGoalBtn) {
    deleteGoalBtn.addEventListener("click", () => {
      if (window.confirm("Supprimer ton objectif ?")) saveGoal(null);
    });
  }

  const goalMetricHiddenInput = document.getElementById("f-goal-metric");
  const goalTargetLabel = document.getElementById("f-goal-target-label");

  document.querySelectorAll(".chip-toggle-group[data-target]").forEach((group) => {
    const hiddenInput = document.getElementById(group.dataset.target);
    if (!hiddenInput) return;
    const isMulti = group.dataset.multi === "true";
    group.querySelectorAll(".chip-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (isMulti) {
          btn.classList.toggle("is-active");
          const values = Array.from(group.querySelectorAll(".chip-toggle.is-active")).map((b) => b.dataset.value);
          hiddenInput.value = values.join(",");
        } else {
          group.querySelectorAll(".chip-toggle").forEach((b) => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          hiddenInput.value = btn.dataset.value;
        }
        // Objectif "course" (5k/10k/semi/marathon) : on affiche date/temps cible en plus
        if (group.dataset.target === "f-objectif") {
          const details = document.getElementById("objectif-details");
          if (details) {
            details.style.display = OBJECTIFS_COURSE.includes(btn.dataset.value) ? "flex" : "none";
          }
        }
      });
    });
  });

  document.querySelectorAll(".segmented[data-target]").forEach((group) => {
    const hiddenInput = document.getElementById(group.dataset.target);
    if (!hiddenInput) return;
    group.querySelectorAll(".segmented-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        group.querySelectorAll(".segmented-btn").forEach((b) => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        hiddenInput.value = btn.dataset.value;
        if (hiddenInput === goalMetricHiddenInput && goalTargetLabel) {
          goalTargetLabel.firstChild.textContent =
            btn.dataset.value === "duree" ? "Durée cible (minutes)" : "Distance cible (km)";
        }
      });
    });
  });

  const goalFormEl = document.getElementById("goal-form");
  if (goalFormEl) {
    goalFormEl.addEventListener("submit", (e) => {
      e.preventDefault();
      const target = parseFloat(document.getElementById("f-goal-target").value);
      if (!target || target <= 0) {
        setState({ error: "Indique une valeur d'objectif valide." });
        return;
      }
      saveGoal({
        mode: document.getElementById("f-goal-mode").value,
        metric: document.getElementById("f-goal-metric").value,
        target,

  }

  document.querySelectorAll(".activity-delete-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (window.confirm("Supprimer cette course ? Cette action est irréversible.")) {
        deleteActivity(id);

    activityDetailEdit.addEventListener("click", () => openEditActivity(activityDetailEdit.dataset.id));

  const activityDetailDelete = document.getElementById("activity-detail-delete");
  if (activityDetailDelete) {
    activityDetailDelete.addEventListener("click", () => {
      const id = activityDetailDelete.dataset.id;
      if (window.confirm("Supprimer cette course ? Cette action est irréversible.")) {
        setState({ activityDetailId: null });
        deleteActivity(id);
      }

  const avatarTrigger = document.getElementById("avatar-trigger");

  if (avatarTrigger && avatarInput) {
    avatarTrigger.addEventListener("click", () => avatarInput.click());

      if (avatarInput.files[0]) uploadAvatar(avatarInput.files[0]);
    });
  }

  const distanceInput = document.getElementById("f-distance");
  const splitsGrid = document.querySelector(".splits-grid");
  if (distanceInput && splitsGrid) {
    distanceInput.addEventListener("input", () => {
      const km = Math.floor(parseFloat(distanceInput.value) || 0);
      const count = Math.min(km, 50);
      // On met à jour l'état sans déclencher render() : un render() complet ici
      // reconstruirait le formulaire et effacerait ce que l'utilisateur vient de
      // taper dans le champ distance (et les autres champs du formulaire).
      state.splitInputsCount = count;
      splitsGrid.innerHTML = Array.from({ length: count }, (_, i) => `
        <label class="split-input-label">
          Km ${i + 1}
          <input type="text" class="km-split-input" data-index="${i}" placeholder="mm:ss" />
        </label>
      `).join("");
    });
  }

  document.querySelectorAll(".badge-card[data-badge-type]").forEach((card) => {
    const open = () => setState({
      badgeModal: { type: card.dataset.badgeType, index: Number(card.dataset.badgeIndex) },
      badgeModalSort: "desc",
    });
    card.addEventListener("click", open);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        open();
      }
    });
  });

  const badgeDetailOverlay = document.getElementById("badge-detail-overlay");
  if (badgeDetailOverlay) {
    badgeDetailOverlay.addEventListener("click", (e) => {
      if (e.target === badgeDetailOverlay) setState({ badgeModal: null });
    });
  }

  const badgeDetailClose = document.getElementById("badge-detail-close");
  if (badgeDetailClose) {
    badgeDetailClose.addEventListener("click", () => setState({ badgeModal: null }));
  }

  const badgeDetailSort = document.getElementById("badge-detail-sort");
  if (badgeDetailSort) {
    badgeDetailSort.addEventListener("click", () => {
      setState({ badgeModalSort: state.badgeModalSort === "desc" ? "asc" : "desc" });
    });
  }

  document.querySelectorAll(".badge-dates-list li.is-linked").forEach((li) => {
    const goToActivity = () => setState({ badgeModal: null, activityDetailId: li.dataset.activityId });
    li.addEventListener("click", goToActivity);
    li.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        goToActivity();
      }
    });
  });

  document.querySelectorAll(".toast-close").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      setState({ notifications: state.notifications.filter((n) => n.id !== id) });
    });
  });

  const typeSelect = document.getElementById("f-type");
  const fractionneFields = document.getElementById("fractionne-fields");
  if (typeSelect && fractionneFields) {
    typeSelect.addEventListener("change", () => {
      fractionneFields.style.display = typeSelect.value === "Fractionné" ? "" : "none";
    });
  }

  const activityForm = document.getElementById("activity-form");
  if (activityForm) {
    activityForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const dureeS = parseDuree(document.getElementById("f-duree").value);
      if (!dureeS) {
        setState({ error: "Format de durée invalide. Utilise mm:ss ou hh:mm:ss." });
        return;
      }

      const kmSplits = Array.from(document.querySelectorAll(".km-split-input")).map((input) =>
        parseDuree(input.value)
      );

      const typeActivite = document.getElementById("f-type").value || null;
      const fracEffortInput = document.getElementById("f-frac-effort");
      const fracReposInput = document.getElementById("f-frac-repos");
      const fracRepsInput = document.getElementById("f-frac-reps");
      const isFractionne = typeActivite === "Fractionné";

      const payload = {
        titre: document.getElementById("f-titre").value.trim(),
        typeActivite,
        fractionneEffortS: isFractionne ? parseDuree(fracEffortInput.value) : null,
        fractionneReposS: isFractionne ? parseDuree(fracReposInput.value) : null,
        fractionneReps: isFractionne && fracRepsInput.value ? parseInt(fracRepsInput.value, 10) : null,
        date: document.getElementById("f-date").value,
        distanceKm: parseFloat(document.getElementById("f-distance").value),
        dureeS,
        deniveleM: parseFloat(document.getElementById("f-denivele").value) || 0,
        description: document.getElementById("f-description").value.trim(),
        kmSplits,
      };

      // Important : en mode édition, on doit METTRE À JOUR l'activité existante
      // et non en créer une nouvelle. Appeler saveActivity() ici (comme avant)
      // insérait une ligne supplémentaire à chaque modification, ce qui faussait
      // tous les compteurs (semaine/mois/année, badges, streak...) en comptant
      // deux fois la même course.
      if (state.editingActivityId) {
        updateActivity(state.editingActivityId, payload);
      } else {
        saveActivity(payload);
      }
    });
  }
}

checkSession();

  

  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
