<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Run42</title>
  <meta name="theme-color" content="#0a130c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-32.png" sizes="32x32" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

/* ============================================================
   Run42 — Design tokens
   Univers : identité du logo Run42 — dégradé vert lime → vert
   forêt, coureur noir, fond blanc. App moderne, sombre, nette.
   ============================================================ */

:root {
  --ink: #0a130c;         /* fond — noir verdâtre profond */
  --ink-soft: #142016;    /* cartes sur fond ink */
  --ink-softer: #1b2c1e;  /* survol / relief supplémentaire */
  --paper: #eef1e8;       /* texte clair / fond clair */
  --rust: #57b02e;        /* accent principal — vert du logo */
  --rust-dim: #3f8a1f;    /* survol accent principal */
  --moss: #8bc34a;        /* secondaire — vert clair lisible */
  --signal: #b6d928;      /* accent rare — lime du dégradé */
  --danger: #e35b4a;      /* erreurs uniquement */

  --gradient-accent: linear-gradient(135deg, #74c531 0%, #4a9e28 55%, #1c6b23 100%);

  --font-display: "Oswald", "Arial Narrow", sans-serif;
  --font-body: "IBM Plex Sans", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-body);
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
}

/* ---------- Login ---------- */

.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at 50% 0%, rgba(87,176,46,0.20), transparent 55%),
    radial-gradient(circle at 50% 120%, rgba(139,195,74,0.18), transparent 60%),
    var(--ink);
}

.login-card {
  max-width: 380px;
  width: 100%;
  text-align: center;
}

.badge-42 {
  width: 96px;
  height: 96px;
  margin: 0 auto 24px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(139,195,74,0.25), 0 16px 32px -12px rgba(87,176,46,0.55);
  animation: badge-in 0.5s ease;
}

.badge-42 img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

@keyframes badge-in {
  from { opacity: 0; transform: translateY(-6px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.login-card h1 {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 1px;
  margin: 0 0 8px;
  text-transform: uppercase;
}

.tagline {
  color: rgba(238,241,232,0.75);
  line-height: 1.5;
  margin: 0 0 28px;
}

.btn-strava {
  width: 100%;
  padding: 15px 20px;
  border: none;
  border-radius: 12px;
  background: var(--gradient-accent);
  color: var(--paper);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.3px;
  box-shadow: 0 10px 24px -10px rgba(87,176,46,0.65);
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}

.btn-strava:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 14px 28px -10px rgba(87,176,46,0.75); }
.btn-strava:active { transform: translateY(0); }
.btn-strava:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

.fine-print {
  margin-top: 16px;
  font-size: 12px;
  color: rgba(238,241,232,0.5);
  line-height: 1.5;
}

/* ---------- Dashboard shell ---------- */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(139,195,74,0.35);
}

.brand {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.pill {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
}

.pill-connected {
  background: rgba(139,195,74,0.2);
  color: var(--moss);
}

.dashboard {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.panel { margin-bottom: 36px; }

.panel h2 {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 18px;
  color: rgba(238,241,232,0.85);
  margin-bottom: 16px;
}

.muted { color: rgba(238,241,232,0.55); font-size: 14px; line-height: 1.5; }

/* Signature element : le "podium" des records — top 3 par distance */

.podium-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.podium-block {
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  border-radius: 14px;
  padding: 14px 16px 16px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.podium-distance {
  margin: 0 0 12px;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 12.5px;
  color: rgba(238,241,232,0.6);
}

.podium-empty {
  margin: 0;
  font-size: 12.5px;
}

.podium-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
}

.podium-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 30%;
  max-width: 96px;
}

.podium-time {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 600;
  margin-bottom: 6px;
  color: rgba(238,241,232,0.85);
}

.podium-bar {
  width: 100%;
  border-radius: 8px 8px 3px 3px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 6px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
}

.podium-step-1 .podium-bar { height: 64px; background: var(--gradient-accent); color: var(--ink); }
.podium-step-2 .podium-bar { height: 46px; background: var(--moss); color: var(--ink); }
.podium-step-3 .podium-bar { height: 32px; background: rgba(139,195,74,0.32); color: rgba(238,241,232,0.85); }

.podium-step.is-empty .podium-bar { background: rgba(238,241,232,0.07); color: rgba(238,241,232,0.3); }
.podium-step.is-empty .podium-time { color: rgba(238,241,232,0.3); }

.podium-step.is-linked { cursor: pointer; }
.podium-step.is-linked:hover .podium-bar,
.podium-step.is-linked:focus-visible .podium-bar { filter: brightness(1.15); }

.podium-tag {
  margin-top: 4px;
  font-family: var(--font-body);
  font-size: 9.5px;
  color: rgba(238,241,232,0.4);
  text-align: center;
}

.panel-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Module objectif — version épurée, orientée mobile : cadran de flèches
   discrètes autour d'une empreinte de pas. */

.goal-dial {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 6px 0 2px;
}

.goal-ring-wrap {
  position: relative;
  width: 156px;
  height: 156px;
}

.goal-ring-svg { width: 100%; height: 100%; display: block; }

.goal-ring-track {
  fill: none;
  stroke: rgba(238,241,232,0.06);
  stroke-width: 1;
}

.goal-tick {
  fill: rgba(238,241,232,0.16);
  transition: fill 0.3s ease;
}
.goal-tick.is-filled { fill: var(--signal); }
.goal-dial.is-reached .goal-tick.is-filled { fill: var(--moss); }

.goal-dial-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}

.goal-footprint-icon {
  width: 26px;
  height: 26px;
  color: rgba(238,241,232,0.45);
}
.goal-dial.is-reached .goal-footprint-icon { color: var(--signal); }

.goal-dial-pct {
  font-family: var(--font-mono);
  font-size: 21px;
  font-weight: 700;
  color: var(--paper);
}

.goal-dial-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-align: center;
}

.goal-dial-current {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--paper);
}

.goal-dial-days {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(238,241,232,0.55);
}
.goal-dial.is-reached .goal-dial-days { color: var(--signal); }

.card {
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.card h3 {
  font-family: var(--font-display);
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin: 0 0 8px;
}

@media (max-width: 560px) {
  .panel-split { grid-template-columns: 1fr; }
  .login-card h1 { font-size: 34px; }
}

.fine-print a { color: var(--moss); text-decoration: underline; }

/* ---------- Login form ---------- */

#login-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}

#login-form input[type="email"],
#password-form input {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.2);
  background: var(--ink-soft);
  color: var(--paper);
  font-size: 15px;
}

#password-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}

.btn-primary {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  background: var(--rust);
  color: var(--paper);
  font-size: 16px;
  font-weight: 600;
}

.btn-primary:hover { background: var(--rust-dim); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-add {
  width: auto;
  margin-bottom: 28px;
  padding: 10px 18px;
  font-size: 14px;
}

.info-msg {
  background: rgba(139,195,74,0.15);
  color: var(--moss);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 16px;
}

.error-msg {
  background: rgba(227,91,74,0.15);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  margin-bottom: 16px;
}

/* ---------- Topbar actions ---------- */

.topbar-actions { display: flex; gap: 10px; }

.pill-action {
  border: none;
  background: rgba(238,241,232,0.08);
  color: var(--paper);
}

/* ---------- Activity list ---------- */

.activity-row-wrap { border-bottom: 1px solid rgba(139,195,74,0.15); }
.activity-list .activity-row-wrap:last-child { border-bottom: none; }

.activity-row {
  display: grid;
  grid-template-columns: 90px 1fr 90px 90px 30px 30px;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  font-family: var(--font-mono);
  font-size: 14px;
}

.activity-row-clickable { cursor: pointer; border-radius: 10px; transition: background 0.12s ease; }
.activity-row-clickable:hover, .activity-row-clickable:focus-visible { background: rgba(238,241,232,0.04); outline: none; }

.activity-pr-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--signal);
  padding: 0 0 10px 2px;
}

.activity-date { color: rgba(238,241,232,0.6); }

.activity-delete-btn, .activity-edit-btn {
  background: none;
  border: none;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(238,241,232,0.4);
  position: relative;
  z-index: 1;
}

.activity-delete-btn svg, .activity-edit-btn svg { width: 17px; height: 17px; }
.activity-delete-btn:hover { color: var(--danger); }
.activity-edit-btn:hover { color: var(--signal); }

/* ---------- Activity form ---------- */

.activity-form {
  display: flex;
  flex-direction: column;
  gap: 18px;
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.activity-form label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  color: rgba(238,241,232,0.7);
}

.activity-form input {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.15);
  background: var(--ink);
  color: var(--paper);
  font-size: 15px;
  font-family: var(--font-mono);
}

.splits-section { border-top: 1px solid rgba(139,195,74,0.2); padding-top: 14px; }

.splits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.split-input-label {
  font-size: 11px;
  color: rgba(238,241,232,0.55);
}

.split-input-label input { padding: 8px; font-size: 13px; }

/* Accessibilité — focus visible partout */
:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

  
/* ============================================================
   Navigation mobile — topbar + bottom nav bar
   ============================================================ */

.mobile-topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(139,195,74,0.25);
  position: sticky;
  top: 0;
  background: var(--ink);
  z-index: 5;
}

.mobile-title {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 17px;
}

.mobile-logo {
  position: absolute;
  left: 20px;
  width: 30px;
  height: 30px;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(139,195,74,0.3);
}

.mobile-logo img { width: 100%; height: 100%; display: block; }

.topbar-cancel {
  position: absolute;
  right: 20px;
  background: rgba(238,241,232,0.08);
  border: none;
  color: var(--paper);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 999px;
}

.mobile-content {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 20px calc(96px + env(safe-area-inset-bottom, 0px));
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: space-around;
  background: rgba(20,32,22,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid rgba(139,195,74,0.2);
  border-radius: 20px 20px 0 0;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -8px 24px -12px rgba(0,0,0,0.5);
  z-index: 10;
}

.nav-item {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: rgba(238,241,232,0.5);
  font-size: 10px;
  font-family: var(--font-body);
  padding: 4px 14px;
}

.nav-item svg { width: 22px; height: 22px; }
.nav-item.is-active { color: var(--paper); }
.nav-item.is-active svg { stroke: var(--rust); }

.nav-add {
  background: var(--gradient-accent);
  width: 56px;
  height: 56px;
  border-radius: 18px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -28px;
  box-shadow: 0 8px 20px -6px rgba(87,176,46,0.6), 0 4px 14px rgba(0,0,0,0.35);
  color: var(--paper);
  transition: transform 0.15s ease, filter 0.15s ease;
}

.nav-add svg { width: 26px; height: 26px; }
.nav-add:hover { filter: brightness(1.08); transform: translateY(-1px); }
.nav-add:active { transform: translateY(0); }

/* ============================================================
   Onglet Activités
   ============================================================ */

.activity-list { background: var(--ink-soft); border-radius: 14px; padding: 4px 20px; }

/* ============================================================
   Onglet Compte
   ============================================================ */

.account-header { text-align: center; }

.avatar-wrap {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  margin: 0 auto 14px;
  position: relative;
  cursor: pointer;
  background: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  border: 2px solid var(--moss);
}

.avatar-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.avatar-initial {
  font-family: var(--font-display);
  font-size: 36px;
  color: rgba(238,241,232,0.6);
}

.avatar-edit-badge {
  position: absolute;
  bottom: 0;
  right: 0;
  background: var(--rust);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border: 2px solid var(--ink);
}

.account-email {
  color: rgba(238,241,232,0.6);
  font-size: 13px;
  font-family: var(--font-mono);
}

.account-pseudo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.3px;
  color: var(--paper);
  margin: 0;
}

.pseudo-edit-btn {
  background: none;
  border: none;
  padding: 4px;
  display: flex;
  align-items: center;
  color: rgba(238,241,232,0.45);
}
.pseudo-edit-btn svg { width: 15px; height: 15px; }
.pseudo-edit-btn:hover { color: var(--rust); }

.pseudo-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  margin-top: 4px;
}

.pseudo-form input {
  text-align: center;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.2);
  background: var(--ink-soft);
  color: var(--paper);
  font-size: 15px;
  font-family: var(--font-body);
  max-width: 220px;
}

.pseudo-form-actions { display: flex; gap: 8px; }

.stats-row {
  display: flex;
  gap: 12px;
}

.stat-box {
  flex: 1;
  background: var(--ink-soft);
  border-radius: 14px;
  padding: 16px 8px;
  text-align: center;
}

.stat-number {
  display: block;
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 600;
  color: var(--paper);
}

.stat-label {
  display: block;
  font-size: 11px;
  color: rgba(238,241,232,0.55);
  margin-top: 4px;
}

.distance-chart-wrap {
  background: var(--ink-soft);
  border-radius: 14px;
  padding: 14px 10px 6px;
}

.distance-chart { width: 100%; height: auto; display: block; }

.month-selector-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 12px;
  scrollbar-width: none;
}

.month-selector-scroll::-webkit-scrollbar { display: none; }

.month-chip {
  flex: 0 0 auto;
  padding: 8px 16px;
  border-radius: 999px;
  border: none;
  background: rgba(238,241,232,0.06);
  color: rgba(238,241,232,0.4);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: nowrap;
  transition: background 0.15s ease, color 0.15s ease;
}

.month-chip.is-active {
  background: var(--rust);
  color: var(--paper);
}

.month-calendar {
  background: var(--ink-soft);
  border-radius: 14px;
  padding: 14px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.cal-dow-row { margin-bottom: 6px; }

.cal-dow {
  text-align: center;
  font-size: 10px;
  color: rgba(238,241,232,0.4);
  font-family: var(--font-mono);
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: rgba(238,241,232,0.05);
  font-size: 12px;
  font-family: var(--font-mono);
  color: rgba(238,241,232,0.6);
}

.cal-day.is-active {
  background: var(--rust);

const NIVEAUX = [

const OBJECTIFS = [

  { id: "4", label: "4 jours / semaine" },
  { id: "5", label: "5+ jours / semaine" },
];

const OBJECTIF_SESSIONS = {
  "perte-poids": ["Footing facile régulier", "Fractionné léger (30/30)", "Sortie longue tranquille", "Récupération active + gainage", "Footing avec accélérations"],
  "forme": ["Footing facile", "Fractionné léger", "Sortie longue tranquille", "Récupération active", "Footing + gammes"],
  "5k": ["Footing facile", "VMA courte (200-400m)", "Seuil (allure soutenue)", "Sortie longue modérée", "Footing de récupération"],
  "10k": ["Footing facile", "VMA moyenne (400-1000m)", "Seuil", "Sortie longue", "Footing de récupération"],
  "semi": ["Footing facile", "Seuil", "Sortie longue progressive", "Fractionné long (1000-2000m)", "Footing de récupération"],
  "marathon": ["Footing facile", "Sortie longue avec allure marathon", "Seuil", "Fractionné", "Footing de récupération", "Sortie longue"],
};

const NIVEAU_SUFFIX = {
  debutant: " (intensité douce, échauffement long)",
  intermediaire: "",
  avance: " (intensité soutenue)",
  confirme: " (charge élevée, récupération courte)",
};

function generateProgram(profil) {
  const pool = OBJECTIF_SESSIONS[profil.objectif] || OBJECTIF_SESSIONS.forme;
  const n = Math.min(parseInt(profil.joursDispo, 10) || 3, pool.length);
  const suffix = NIVEAU_SUFFIX[profil.niveau] || "";
  const sessions = [];
  for (let i = 0; i < n; i++) {
    sessions.push({ jour: `Séance ${i + 1}`, type: pool[i] + suffix });
  }
  return sessions;
}

function describeProfil(profil) {
  const niveauLabel = NIVEAUX.find((n) => n.id === profil.niveau)?.label || profil.niveau;
  const objectifLabel = OBJECTIFS.find((o) => o.id === profil.objectif)?.label || profil.objectif;
  return `Niveau ${niveauLabel} · Objectif ${objectifLabel} · ${profil.joursDispo} jour(s)/semaine`;
}

// Constantes distances
// ============================================================

const DISTANCE_ORDER = ["1K", "5K", "10K", "15K", "20K", "Semi", "Marathon"];
const DISTANCE_METERS = {
  "1K": 1000, "5K": 5000, "10K": 10000, "15K": 15000,
  "20K": 20000, "Semi": 21097, "Marathon": 42195,
};

function formatTemps(s) {
  if (!s && s !== 0) return "—";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

// Comme formatTemps, mais renvoie toujours un format saisissable dans un
// champ texte (mm:ss ou hh:mm:ss), utilisé pour préremplir le formulaire
// de modification d'une course.
function formatDureeInput(s) {
  if (!s && s !== 0) return "";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function formatDateFr(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
}

// Accepte "mm:ss" ou "hh:mm:ss" → secondes
function parseDuree(str) {
  if (!str) return null;
  const parts = str.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

async function signInPassword(email, password) {
  setState({ loading: true, error: null, info: null });
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) setState({ loading: false, error: error.message });
}

async function signUpPassword(email, password) {
  setState({ loading: true, error: null, info: null });
  const { error } = await supabase.auth.signUp({ email, password });
  if (error) {
    setState({ loading: false, error: error.message });
  } else {
    setState({
      loading: false,
      info: "Compte créé ! Vérifie ta boîte mail pour confirmer, puis connecte-toi.",
      authAction: "signin",
    });
  }

async function checkSession() {
  const { data } = await supabase.auth.getSession();
  setState({ session: data.session, route: data.session ? "dashboard" : "login" });
  if (data.session) loadAppData();

  supabase.auth.onAuthStateChange((_event, session) => {
    setState({ session, route: session ? "dashboard" : "login" });
    if (session) loadAppData();
  });
}

async function logout() {
  await supabase.auth.signOut();
  setState({ session: null, route: "login", prs: [], activities: [], allActivities: [] });
}

// ============================================================
// Chargement des données
// ============================================================

async function loadAppData() {
  setState({ loading: true, error: null });
  try {
    const { data: prs, error } = await supabase
      .from("personal_records")
      .select("distance_label, meilleur_temps_s, activity_id, date_obtenu")
      .order("distance_label");
    if (error) throw error;

    const { data: activities } = await supabase
      .from("activities")
      .select("*")
      .order("date", { ascending: false })
      .limit(30);

    // Toutes les colonnes sont nécessaires ici : id (pour relier badges/records
    // à l'activité d'origine et permettre la redirection), km_splits (pour le
    // classement des performances par distance) et les autres champs affichés
    // dans la modale de détail lorsqu'elle est ouverte depuis un badge/record
    // portant sur une activité plus ancienne que les 30 dernières.
    const { data: allActivities } = await supabase
      .from("activities")
      .select("*");

    setState({
      prs: prs || [],
      activities: activities || [],
      allActivities: allActivities || [],
      loading: false,
    });
  } catch (e) {
    setState({ prs: [], activities: [], allActivities: [], loading: false, error: "Impossible de charger tes données. Vérifie ta config Supabase." });
  }
}

// ============================================================
// Calcul des PR à partir d'une activité saisie manuellement
// ============================================================

function computeBestEfforts(distanceM, dureeS, kmSplits) {
  const results = [];

  if (kmSplits && kmSplits.length) {
    const wholeKmTargets = [
      [1, "1K"], [5, "5K"], [10, "10K"], [15, "15K"], [20, "20K"],
    ];
    for (const [k, label] of wholeKmTargets) {
      if (kmSplits.length >= k) {
        let best = Infinity;
        for (let i = 0; i + k <= kmSplits.length; i++) {
          const sum = kmSplits.slice(i, i + k).reduce((a, b) => a + b, 0);
          if (sum < best) best = sum;
        }
        // "splits" : ce chrono a été extrait d'un enchaînement de km
        // consécutifs au sein d'une course plus longue (ex. le meilleur 5K
        // trouvé entre le 3e et le 8e km d'un 10K) — pas une course dédiée
        // à cette distance précise.
        results.push({ distance_label: label, temps_s: best, source: "splits" });
      }
    }
  }

  for (const label of DISTANCE_ORDER) {
    const target = DISTANCE_METERS[label];
    if (Math.abs(distanceM - target) / target < 0.03) {
      const existing = results.find((r) => r.distance_label === label);
      if (!existing || dureeS < existing.temps_s) {
        results.splice(results.indexOf(existing), existing ? 1 : 0);
        // "exact" : la course entière correspond directement à cette
        // distance (à ±3% près).
        results.push({ distance_label: label, temps_s: dureeS, source: "exact" });
      }
    }
  }

  return results;
}

// Pour chaque distance de DISTANCE_ORDER, classe TOUTES les activités qui
// couvrent cette distance (une entrée par activité, sa meilleure performance
// sur ce label) plutôt que de ne garder que le record en cours — utilisé par
// l'écran "Records" pour afficher l'historique complet des perfs, pas
// uniquement la meilleure.
function computeAllBestEffortsByLabel(activities) {
  const byLabel = {};
  for (const label of DISTANCE_ORDER) byLabel[label] = [];

  for (const a of activities || []) {
    const efforts = computeBestEfforts(a.distance_m, a.duree_s, a.km_splits);
    for (const eff of efforts) {
      byLabel[eff.distance_label].push({
        temps_s: eff.temps_s,
        activity_id: a.id,
        date: a.date,
        source: eff.source,
        activityDistanceM: a.distance_m,
      });
    }
  }

  for (const label of DISTANCE_ORDER) {
    byLabel[label].sort((a, b) => a.temps_s - b.temps_s);
  }

  return byLabel;
}

async function saveActivity(formData) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;
    const distanceM = Math.round(formData.distanceKm * 1000);
    const dureeS = formData.dureeS;
    const kmSplits = formData.kmSplits.filter((s) => s != null);
    const allureMoyenne = dureeS / (distanceM / 1000);

    // On détermine AVANT l'insertion quels efforts constituent un nouveau record.
    // C'est ce qui permet de figer le résultat (pr_labels) sur l'activité :
    // même si un record plus récent écrase ensuite personal_records, l'activité
    // gardera la trace qu'elle était un PR au moment où elle a été enregistrée.
    const efforts = computeBestEfforts(distanceM, dureeS, kmSplits);
    const prChecks = [];
    for (const effort of efforts) {
      const { data: currentPR } = await supabase
        .from("personal_records")
        .select("meilleur_temps_s")
        .eq("user_id", userId)
        .eq("distance_label", effort.distance_label)
        .maybeSingle();

      const isNewPR = !currentPR || effort.temps_s < currentPR.meilleur_temps_s;
      prChecks.push({ ...effort, isNewPR });
    }
    const prLabels = prChecks.filter((p) => p.isNewPR).map((p) => p.distance_label);

    const { data: activity, error: insertError } = await supabase
      .from("activities")
      .insert({
        user_id: userId,
        date: formData.date,
        distance_m: distanceM,
        duree_s: dureeS,
        denivele_m: formData.deniveleM || 0,
        allure_moyenne: allureMoyenne,
        km_splits: kmSplits.length ? kmSplits : null,
        source: "manuel",
        pr_labels: prLabels.length ? prLabels : null,
      })
      .select()
      .single();

    if (insertError) throw insertError;

    for (const p of prChecks) {
      if (p.isNewPR) {
        await supabase.from("personal_records").upsert({
          user_id: userId,
          distance_label: p.distance_label,
          meilleur_temps_s: p.temps_s,
          activity_id: activity.id,
          date_obtenu: formData.date,
        });
      }
    }

    const activitiesBefore = state.allActivities;
    await loadAppData();
    const unlocks = detectBadgeUnlocks(activitiesBefore, state.allActivities);
    const prNotifications = prLabels.map((label) => ({
      id: `${Date.now()}-${Math.random()}`,
      icon: "🏆",
      text: `Nouveau record personnel : <strong>${label}</strong> !`,
    }));
    const newNotifications = [
      ...prNotifications,
      ...unlocks.map((u) => ({ id: `${Date.now()}-${Math.random()}`, ...u })),
    ];

    setState({
      loading: false,
      route: "dashboard",
      tab: "activities",
      notifications: [...state.notifications, ...newNotifications],
    });

    newNotifications.forEach((n) => scheduleNotificationDismiss(n.id));
  } catch (e) {
    setState({ loading: false, error: "Erreur lors de l'enregistrement : " + e.message });
  }
}

function scheduleNotificationDismiss(id) {
  setTimeout(() => {
    setState({ notifications: state.notifications.filter((n) => n.id !== id) });
  }, 6000);
}

// ============================================================
// Ajout manuel d'un record déjà existant
// ============================================================

async function saveRecordManual({ distanceLabel, dureeS, dateObtenu }) {
  setState({ recordSaving: true, error: null });
  try {
    const userId = state.session.user.id;

    const { data: currentPR } = await supabase
      .from("personal_records")
      .select("meilleur_temps_s")
      .eq("user_id", userId)
      .eq("distance_label", distanceLabel)
      .maybeSingle();

    if (currentPR && dureeS >= currentPR.meilleur_temps_s) {
      setState({
        recordSaving: false,
        error: `Tu as déjà un meilleur temps sur ${distanceLabel} (${formatTemps(currentPR.meilleur_temps_s)}). Ce nouveau temps n'a pas été conservé.`,
      });
      return;
    }

    const { error } = await supabase.from("personal_records").upsert({
      user_id: userId,
      distance_label: distanceLabel,
      meilleur_temps_s: dureeS,
      date_obtenu: dateObtenu || null,
    });
    if (error) throw error;

    setState({ recordSaving: false, recordFormOpen: false });
    loadAppData();
  } catch (e) {
    setState({ recordSaving: false, error: "Échec de l'enregistrement du record : " + e.message });
  }
}

async function uploadAvatar(file) {
  setState({ avatarUploading: true, error: null });
  try {
    const userId = state.session.user.id;
    const ext = file.name.split(".").pop();
    const path = `${userId}/avatar.${ext}`;

    const { error: uploadError } = await supabase.storage
      .from("avatars")
      .upload(path, file, { upsert: true });
    if (uploadError) throw uploadError;

    const { data: pub } = supabase.storage.from("avatars").getPublicUrl(path);
    const cacheBusted = `${pub.publicUrl}?t=${Date.now()}`;

    const { data: updated, error: updateError } = await supabase.auth.updateUser({
      data: { avatar_url: cacheBusted },
    });
    if (updateError) throw updateError;

    setState({
      avatarUploading: false,
      session: { ...state.session, user: updated.user },
    });
  } catch (e) {
    setState({ avatarUploading: false, error: "Échec de l'upload : " + e.message });
  }
}

// Calcule où on en est sur la période en cours (semaine ou mois glissant
// calendaire) par rapport à l'objectif fixé, à partir des activités déjà
// enregistrées — pas besoin de stocker de progression séparément, elle se
// déduit toujours des activités réelles.
function computeGoalProgress(goal, activities) {
  if (!goal) return null;
  const now = new Date();
  let periodStart, periodEnd;

  if (goal.mode === "hebdo") {
    const start = new Date(now);
    const dow = (start.getDay() + 6) % 7;
    start.setDate(start.getDate() - dow);
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 7);
    periodStart = start;
    periodEnd = end;
  } else {
    periodStart = new Date(now.getFullYear(), now.getMonth(), 1);
    periodEnd = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  }

  let current = 0;
  for (const a of activities || []) {
    const d = new Date(a.date + "T00:00:00");
    if (d >= periodStart && d < periodEnd) {
      current += goal.metric === "distance" ? (a.distance_m || 0) : (a.duree_s || 0);
    }
  }

  const target = goal.metric === "distance" ? goal.target * 1000 : goal.target * 60;
  const pct = target > 0 ? Math.min(100, (current / target) * 100) : 0;
  const daysLeft = Math.max(0, Math.ceil((periodEnd - now) / 86400000));

  return { current, target, pct, daysLeft, reached: current >= target };
}

// ============================================================
// Suppression d'une activité
// ============================================================

async function deleteActivity(activityId) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;

    // Avant de supprimer l'activité, on repère les PR qui sont actuellement
    // basés dessus : ce sont les seuls qu'il faudra recalculer / retirer.
    // (Les badges, eux, sont recalculés à la volée à partir du nombre/de la
    // distance/de la durée des activités restantes : rien à faire côté
    // badges, ils se re-verrouillent automatiquement si le seuil n'est plus atteint.)
    const { data: linkedPRs } = await supabase
      .from("personal_records")
      .select("distance_label")
      .eq("user_id", userId)
      .eq("activity_id", activityId);
    const affectedLabels = (linkedPRs || []).map((p) => p.distance_label);

    // "personal_records" a une clé étrangère vers "activities" (activity_id).
    // Tant qu'un PR pointe encore vers cette activité, Postgres refuse de la
    // supprimer (violation de contrainte de clé étrangère) : il faut donc
    // détacher ces PR d'abord (activity_id → null), supprimer l'activité,
    // puis recalculer ces PR pour qu'ils repointent vers la meilleure
    // activité restante (ou soient retirés s'il n'en reste aucune).
    if (affectedLabels.length) {
      const { error: detachError } = await supabase
        .from("personal_records")
        .update({ activity_id: null })
        .eq("user_id", userId)
        .eq("activity_id", activityId);
      if (detachError) throw detachError;
    }

    // On utilise { count: "exact" } plutôt qu'un .select() après coup : un
    // .select() sur une ligne qui vient d'être supprimée dépend d'une policy
    // RLS "SELECT" pour pouvoir la renvoyer, et remonte un tableau vide si
    // cette policy manque — même quand la suppression a réellement fonctionné.
    // Cela donnait l'impression trompeuse que "supprimer" échouait à chaque
    // fois. Le count, lui, reflète directement le nombre de lignes affectées
    // par le DELETE (gouverné par la policy "DELETE", pas "SELECT").
    const { error, count } = await supabase
      .from("activities")
      .delete({ count: "exact" })
      .eq("id", activityId)
      .eq("user_id", userId);
    if (error) throw error;

    if (!count) {
      throw new Error(
        "Aucune ligne supprimée. Vérifie qu'une policy RLS \"DELETE\" existe sur la table activities dans Supabase (autorisant user_id = auth.uid())."
      );
    }

    // L'activité qui détenait ces records n'existe plus : on recalcule le
    // meilleur temps parmi les activités restantes plutôt que d'effacer
    // purement et simplement le PR (qui pourrait masquer une 2e meilleure
    // perf tout à fait valide).
    if (affectedLabels.length) {
      await recomputeAffectedPRs(userId, affectedLabels);
    }

    await loadAppData();
  } catch (e) {
    setState({ loading: false, error: "Échec de la suppression : " + e.message });
  }
}

// Recalcule, pour chaque distance_label listé, le meilleur temps parmi
// TOUTES les activités restantes de l'utilisateur (courses entières qui
// matchent la distance à ±3%, ou meilleurs enchaînements de km_splits pour
// les distances rondes 1K/5K/10K/15K/20K). Si aucune activité ne peut plus
// justifier le label, le PR est retiré ; sinon il est mis à jour vers la
// nouvelle meilleure performance (avec sa propre activity_id/date).
async function recomputeAffectedPRs(userId, affectedLabels) {
  const { data: allActs } = await supabase
    .from("activities")
    .select("id, date, distance_m, duree_s, km_splits")
    .eq("user_id", userId);

  const bestByLabel = {};
  for (const a of allActs || []) {
    const efforts = computeBestEfforts(a.distance_m, a.duree_s, a.km_splits);
    for (const eff of efforts) {
      if (!affectedLabels.includes(eff.distance_label)) continue;
      const current = bestByLabel[eff.distance_label];
      if (!current || eff.temps_s < current.temps_s) {
        bestByLabel[eff.distance_label] = { temps_s: eff.temps_s, activity_id: a.id, date: a.date };
      }
    }
  }

  for (const label of affectedLabels) {
    const best = bestByLabel[label];
    if (best) {
      await supabase.from("personal_records").upsert({
        user_id: userId,
        distance_label: label,
        meilleur_temps_s: best.temps_s,
        activity_id: best.activity_id,
        date_obtenu: best.date,
      });
    } else {
      // Plus aucune activité ne couvre cette distance : le PR n'a plus
      // aucune preuve derrière lui, on le retire.
      await supabase
        .from("personal_records")
        .delete()
        .eq("user_id", userId)
        .eq("distance_label", label);
    }
  }

  return bestByLabel;
}

// ============================================================
// Modification d'une activité existante
// ============================================================
// Modifier une course change potentiellement ses temps/distance : les records
// personnels doivent donc être recalculés, exactement comme lors d'une
// suppression. Deux cas à couvrir :
//  - l'activité détenait déjà un ou plusieurs PR : si l'édition la rend moins
//    bonne, ces PR doivent être recalculés (peut-être une autre activité
//    prend le relais, ou le PR disparaît s'il n'y a plus aucune activité).
//  - l'activité ne détenait aucun PR mais l'édition la rend désormais
//    meilleure que le record actuel sur une distance : elle doit pouvoir
//    décrocher ce nouveau PR.
// On recalcule donc sur l'union des labels "avant" et "après" l'édition.
async function updateActivity(activityId, formData) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;
    const distanceM = Math.round(formData.distanceKm * 1000);
    const dureeS = formData.dureeS;
    const kmSplits = formData.kmSplits.filter((s) => s != null);
    const allureMoyenne = dureeS / (distanceM / 1000);

    const { data: linkedPRs } = await supabase
      .from("personal_records")
      .select("distance_label")
      .eq("user_id", userId)
      .eq("activity_id", activityId);
    const previousLabels = (linkedPRs || []).map((p) => p.distance_label);

    const newEfforts = computeBestEfforts(distanceM, dureeS, kmSplits);
    const newLabels = newEfforts.map((e) => e.distance_label);
    const affectedLabels = Array.from(new Set([...previousLabels, ...newLabels]));

    const { error } = await supabase
      .from("activities")
      .update({
        date: formData.date,
        distance_m: distanceM,
        duree_s: dureeS,
        denivele_m: formData.deniveleM || 0,
        allure_moyenne: allureMoyenne,
        km_splits: kmSplits.length ? kmSplits : null,
      })
      .eq("id", activityId)
      .eq("user_id", userId);

    if (error) throw error;

    if (affectedLabels.length) {
      const bestByLabel = await recomputeAffectedPRs(userId, affectedLabels);
      // Le badge "🏆 Record personnel" affiché sous une course est figé sur
      // sa ligne (pr_labels) : on le remet à jour pour cette activité afin
      // qu'il reflète sa nouvelle réalité après édition (record gagné, perdu,
      // ou conservé).
      const updatedPrLabels = affectedLabels.filter(
        (label) => bestByLabel[label] && bestByLabel[label].activity_id === activityId
      );
      await supabase
        .from("activities")
        .update({ pr_labels: updatedPrLabels.length ? updatedPrLabels : null })
        .eq("id", activityId)
        .eq("user_id", userId);
    }

    await loadAppData();
    setState({
      loading: false,
      route: "dashboard",
      tab: "activities",
      editingActivityId: null,
    });
  } catch (e) {
    setState({ loading: false, error: "Erreur lors de la modification : " + e.message });
  }
}

// Ouvre le formulaire de course (réutilisé) préchargé avec les valeurs
// existantes de l'activité, prêt à être modifiée puis renvoyé via updateActivity.
function openEditActivity(id) {
  const a = state.allActivities.find((x) => x.id === id) || state.activities.find((x) => x.id === id);
  if (!a) return;
  const splitInputsCount = a.km_splits && a.km_splits.length
    ? a.km_splits.length
    : Math.min(Math.floor(a.distance_m / 1000), 50);
  setState({
    route: "add-activity",
    editingActivityId: id,
    splitInputsCount,
    error: null,
    activityDetailId: null,
  });
}

function computeCounts(activities) {
  const now = new Date();
  const startOfWeek = new Date(now);
  const dow = (startOfWeek.getDay() + 6) % 7;
  startOfWeek.setDate(startOfWeek.getDate() - dow);
  startOfWeek.setHours(0, 0, 0, 0);

  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfYear = new Date(now.getFullYear(), 0, 1);

  let week = 0, month = 0, year = 0;
  let distWeek = 0, distMonth = 0, distYear = 0;
  let dureeWeek = 0, dureeMonth = 0, dureeYear = 0;
  for (const a of activities) {
    const d = new Date(a.date + "T00:00:00");
    const dist = a.distance_m || 0;
    const duree = a.duree_s || 0;
    if (d >= startOfYear) { year++; distYear += dist; dureeYear += duree; }
    if (d >= startOfMonth) { month++; distMonth += dist; dureeMonth += duree; }
    if (d >= startOfWeek) { week++; distWeek += dist; dureeWeek += duree; }
  }
  return {
    week, month, year,
    distWeek, distMonth, distYear,
    dureeWeek, dureeMonth, dureeYear,
  };
}

function formatDistanceKm(meters) {
  return `${(meters / 1000).toFixed(1)} km`;
}

// Renvoie la date (YYYY-MM-DD) du lundi de la semaine de "date"
function mondayKey(date) {
  const d = new Date(date);
  const dow = (d.getDay() + 6) % 7; // lundi = 0
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

function addDaysKey(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

// Une activité dans la semaine suffit à maintenir le streak.
// La semaine en cours n'étant pas terminée, elle ne casse pas
// le streak tant qu'elle n'est pas passée sans activité.
function computeStreak(dates) {
  const weekKeys = new Set(dates.map((d) => mondayKey(d + "T00:00:00")));
  const thisWeek = mondayKey(new Date());
  const lastWeek = addDaysKey(thisWeek, -7);

  let anchor;
  let atRisk = false;

  if (weekKeys.has(thisWeek)) {
    anchor = thisWeek;
  } else if (weekKeys.has(lastWeek)) {
    anchor = lastWeek;
    atRisk = true;
  } else {
    return { count: 0, atRisk: false };
  }

  let count = 0;
  let cursor = anchor;
  while (weekKeys.has(cursor)) {
    count++;
    cursor = addDaysKey(cursor, -7);
  }
  return { count, atRisk };
}

];

// Métadonnées visuelles des paliers (communes à tous les badges — seuls les
// seuils numériques varient d'un badge à l'autre, cf. tierThresholds).
const TIER_META = [
  { key: "bronze", label: "Bronze", icon: "🥉" },
  { key: "argent", label: "Argent", icon: "🥈" },
  { key: "or", label: "Or", icon: "🥇" },
  { key: "platine", label: "Platine", icon: "💎" },
];

function computeTierForThresholds(achievedCount, thresholds) {
  let current = null;
  for (let i = 0; i < thresholds.length; i++) {
    if (achievedCount >= thresholds[i]) current = { ...TIER_META[i], threshold: thresholds[i] };
  }
  return current;
}

function nextTierForThresholds(achievedCount, thresholds) {
  for (let i = 0; i < thresholds.length; i++) {
    if (achievedCount < thresholds[i]) return { ...TIER_META[i], threshold: thresholds[i] };
  }
  return null;
}

// Tolérance utilisée pour rattacher une activité à une distance "cible"
// (même logique que le calcul des records personnels).
function matchesDistanceCategory(distanceM, targetM) {
  return Math.abs(distanceM - targetM) / targetM < 0.03;
}

// Paliers de vitesse par distance — "badge combiné vitesse". Des seuils de
// temps réalistes et progressifs, propres à chaque distance.

function computeSpeedBadges(activities, targetMeters) {
  const tiers = SPEED_TIERS_BY_METERS[targetMeters] || [];
  const relevant = activities.filter((a) => matchesDistanceCategory(a.distance_m || 0, targetMeters));
  return tiers.map((t) => {
    const matches = relevant
      .filter((a) => (a.duree_s || 0) > 0 && a.duree_s <= t.seconds)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    return {
      ...t,
      achievedCount: matches.length,
      unlocked: matches.length > 0,
      bestDate: matches.length
        ? matches.reduce((best, a) => (a.duree_s < best.duree_s ? a : best)).date
        : null,
      dates: matches.map((a) => a.date),
    };
  });
}

function computeBadges(activities) {
  const count = activities.length;

  const activityBadges = ACTIVITY_BADGES.map((b) => ({ ...b, unlocked: count >= b.count }));

  const distanceBadges = DISTANCE_BADGES.map((b) => {
    const matches = activities
      .filter((a) => (a.distance_m || 0) >= b.meters)
      .sort((a, b2) => (a.date < b2.date ? 1 : -1));
    const achievedCount = matches.length;
    return {
      ...b,
      achievedCount,
      unlocked: achievedCount > 0,
      tier: computeTierForThresholds(achievedCount, b.tierThresholds),
      next: nextTierForThresholds(achievedCount, b.tierThresholds),
      dates: matches.map((a) => a.date),
      entries: matches.map((a) => ({ id: a.id, date: a.date })),
    };
  });

  const durationBadges = DURATION_BADGES.map((b) => {
    const matches = activities
      .filter((a) => (a.duree_s || 0) >= b.seconds)
      .sort((a, b2) => (a.date < b2.date ? 1 : -1));
    const achievedCount = matches.length;
    return {
      ...b,
      achievedCount,
      unlocked: achievedCount > 0,
      tier: computeTierForThresholds(achievedCount, b.tierThresholds),
      next: nextTierForThresholds(achievedCount, b.tierThresholds),
      dates: matches.map((a) => a.date),
      entries: matches.map((a) => ({ id: a.id, date: a.date })),
    };
  });

  return { activityBadges, distanceBadges, durationBadges };
}

// Compare l'état des badges avant/après une nouvelle activité pour détecter
// les nouveaux paliers débloqués (notification). Prend les listes brutes
// d'activités avant/après l'ajout.
function detectBadgeUnlocks(activitiesBefore, activitiesAfter) {
  const before = computeBadges(activitiesBefore);
  const after = computeBadges(activitiesAfter);
  const messages = [];

  after.activityBadges.forEach((b, i) => {
    if (b.unlocked && !before.activityBadges[i].unlocked) {
      messages.push({ icon: b.icon, text: `Badge débloqué : <strong>${b.label}</strong> !` });
    }
  });

  const compareTiered = (beforeList, afterList) => {
    afterList.forEach((b, i) => {
      const beforeTierKey = beforeList[i].tier ? beforeList[i].tier.key : null;
      const afterTierKey = b.tier ? b.tier.key : null;
      if (afterTierKey && afterTierKey !== beforeTierKey) {
        messages.push({
          icon: b.tier.icon,
          text: `Nouveau palier : <strong>${b.label} — ${b.tier.label}</strong> (×${b.achievedCount}) !`,
        });
      }
    });
  };

  compareTiered(before.distanceBadges, after.distanceBadges);
  compareTiered(before.durationBadges, after.durationBadges);

  // Badges combinés vitesse : uniquement sur les distances
  DISTANCE_BADGES.forEach((db) => {
    const beforeSpeed = computeSpeedBadges(activitiesBefore, db.meters);
    const afterSpeed = computeSpeedBadges(activitiesAfter, db.meters);
    afterSpeed.forEach((s, i) => {
      if (s.unlocked && !beforeSpeed[i].unlocked) {
        messages.push({ icon: "⚡", text: `Badge vitesse débloqué : <strong>${db.label} ${s.label}</strong> !` });
      }
    });
  });

  return messages;
}

const MONTH_LABELS_SHORT = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];
const MONTH_LABELS_LONG = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

function computeMonthlyDistances(activities, year) {
  const monthsKm = new Array(12).fill(0);
  for (const a of activities) {
    const d = new Date(a.date + "T00:00:00");
    if (d.getFullYear() === year) {
      monthsKm[d.getMonth()] += (a.distance_m || 0) / 1000;
    }
  }
  return monthsKm;
}

// Choisit un pas d'axe "rond" (1, 2, 5, 10, 20, 50, 100...) pour que les
// graduations verticales tombent sur des valeurs de km lisibles.
function niceAxisStep(maxValue, targetTicks) {
  const rough = maxValue / targetTicks;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rough || 1)));
  const residual = rough / magnitude;
  let niceResidual;
  if (residual > 5) niceResidual = 10;
  else if (residual > 2) niceResidual = 5;
  else if (residual > 1) niceResidual = 2;
  else niceResidual = 1;
  return niceResidual * magnitude;
}

function monthlyChart(monthsKm, monthIndices) {
  const indices = monthIndices || monthsKm.map((_, i) => i);
  const values = indices.map((i) => monthsKm[i]);
  const width = 600, height = 170, padTop = 16, padBottom = 22, padLeft = 40, padRight = 12;
  const rawMax = Math.max(...values, 1);
  const step = niceAxisStep(rawMax, 3);
  const axisMax = Math.max(step, Math.ceil(rawMax / step) * step);
  const plotWidth = width - padLeft - padRight;
  const stepX = values.length > 1 ? plotWidth / (values.length - 1) : 0;

  const yFor = (km) => height - padBottom - (km / axisMax) * (height - padTop - padBottom);

  const points = values.map((km, i) => {
    const x = values.length > 1 ? padLeft + i * stepX : padLeft + plotWidth / 2;
    return { x, y: yFor(km), km, monthIndex: indices[i] };
  });
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD = `${pathD} L${points[points.length - 1].x.toFixed(1)},${height - padBottom} L${points[0].x.toFixed(1)},${height - padBottom} Z`;
  const dots = points.map((p) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--rust)"><title>${p.km.toFixed(1)} km</title></circle>`).join("");
  const valueLabels = points.map((p) => `<text x="${p.x.toFixed(1)}" y="${(p.y - 8).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(238,241,232,0.75)" font-family="var(--font-mono)">${p.km > 0 ? p.km.toFixed(0) : ""}</text>`).join("");
  const monthLabels = points.map((p) => `<text x="${p.x.toFixed(1)}" y="${height - 4}" text-anchor="middle" font-size="9" fill="rgba(238,241,232,0.5)" font-family="var(--font-mono)">${MONTH_LABELS_SHORT[p.monthIndex]}</text>`).join("");

  // Graduations de l'axe vertical (distance totale du mois, en km)
  const tickCount = Math.round(axisMax / step);
  const yTicks = [];
  for (let i = 0; i <= tickCount; i++) yTicks.push(i * step);
  const gridLines = yTicks.map((km) => {
    const y = yFor(km);
    return `
      <line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${width - padRight}" y2="${y.toFixed(1)}" stroke="rgba(238,241,232,0.08)" stroke-width="1" ${km === 0 ? "" : 'stroke-dasharray="3,3"'} />
      <text x="${padLeft - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(238,241,232,0.45)" font-family="var(--font-mono)">${km}</text>
    `;
  }).join("");

  return `
    <div class="distance-chart-wrap">
      <svg viewBox="0 0 ${width} ${height}" class="distance-chart" preserveAspectRatio="none">
        ${gridLines}
        <text x="${padLeft}" y="12" font-size="9" fill="rgba(238,241,232,0.45)" font-family="var(--font-mono)">km</text>
        <path d="${areaD}" fill="rgba(87,176,46,0.15)" stroke="none" />
        <path d="${pathD}" fill="none" stroke="var(--rust)" stroke-width="2" />
        ${dots}
        ${valueLabels}
        ${monthLabels}
      </svg>
    </div>
  `;
}

function monthSelector(selectedMonth) {
  const items = MONTH_LABELS_LONG.map((label, i) => `
    <button class="month-chip ${i === selectedMonth ? "is-active" : ""}" data-month="${i}">${label}</button>
  `).join("");
  return `<div class="month-selector-scroll">${items}</div>`;

function monthCalendar(activities, year, month) {
  const dateSet = new Set(activities.map((a) => a.date));
  const first = new Date(year, month, 1);
  const startDow = (first.getDay() + 6) % 7; // lundi = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    cells.push({ day, iso, active: dateSet.has(iso) });
  }

  const dowHtml = ["L", "M", "M", "J", "V", "S", "D"].map((d) => `<div class="cal-dow">${d}</div>`).join("");
  const cellsHtml = cells.map((c) =>
    c ? `<div class="cal-day ${c.active ? "is-active" : ""}" title="${c.iso}">${c.day}</div>` : `<div class="cal-day is-empty"></div>`
  ).join("");

  return `
    <div class="month-calendar">
      <div class="cal-grid cal-dow-row">${dowHtml}</div>
      <div class="cal-grid">${cellsHtml}</div>
    </div>
  `;
}

function yearHeatmap(dates) {
  const dateSet = new Set(dates);
  const year = new Date().getFullYear();
  const cellSize = 11, cellGap = 3, padLeft = 20, padTop = 16;

  const start = new Date(year, 0, 1);
  const startDow = (start.getDay() + 6) % 7; // lundi = 0
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() - startDow);

  const end = new Date(year, 11, 31);
  const totalDays = Math.round((end - gridStart) / 86400000) + 1;
  const totalWeeks = Math.ceil(totalDays / 7);

  const cells = [];
  const monthLabelsSeen = new Set();
  const monthLabels = [];

  for (let w = 0; w < totalWeeks; w++) {
    for (let d = 0; d < 7; d++) {
      const day = new Date(gridStart);
      day.setDate(day.getDate() + w * 7 + d);
      if (day.getFullYear() !== year) continue;
      const iso = `${day.getFullYear()}-${String(day.getMonth() + 1).padStart(2, "0")}-${String(day.getDate()).padStart(2, "0")}`;
      const x = padLeft + w * (cellSize + cellGap);
      const y = padTop + d * (cellSize + cellGap);
      cells.push({ x, y, iso, active: dateSet.has(iso) });

      if (day.getDate() <= 7 && !monthLabelsSeen.has(day.getMonth())) {
        monthLabelsSeen.add(day.getMonth());
        monthLabels.push({ x, label: MONTH_LABELS_SHORT[day.getMonth()] });
      }
    }
  }

  const width = padLeft + totalWeeks * (cellSize + cellGap);
  const height = padTop + 7 * (cellSize + cellGap);

  const cellsHtml = cells.map((c) =>
    `<rect x="${c.x}" y="${c.y}" width="${cellSize}" height="${cellSize}" rx="2" fill="${c.active ? "var(--rust)" : "rgba(238,241,232,0.08)"}"><title>${c.iso}</title></rect>`
  ).join("");

  const labelsHtml = monthLabels.map((m) =>
    `<text x="${m.x}" y="10" font-size="9" fill="rgba(238,241,232,0.5)" font-family="var(--font-mono)">${m.label}</text>`
  ).join("");

  return `
    <div class="heatmap-wrap">
      <svg viewBox="0 0 ${width} ${height}" class="heatmap" preserveAspectRatio="xMinYMin meet">
        ${labelsHtml}
        ${cellsHtml}
      </svg>
    </div>
  `;
}

// Fusionne le classement calculé à partir des activités avec un éventuel
// record ajouté manuellement (cf. recordForm), pour une distance donnée.
function topEntriesForLabel(label, prs, rankingsByLabel) {
  const entries = rankingsByLabel[label] || [];
  const pr = prs.find((p) => p.distance_label === label);
  const hasManualEntry = pr && pr.activity_id == null
    && !entries.some((e) => e.temps_s === pr.meilleur_temps_s);
  return hasManualEntry
    ? [...entries, { temps_s: pr.meilleur_temps_s, activity_id: null, date: pr.date_obtenu }].sort((a, b) => a.temps_s - b.temps_s)
    : entries;
}

// ---------- Podium des records — top 3 directement affiché par distance ----------

function recordsPodium(prs, rankingsByLabel) {
  if (!prs.length) {
    return `<p class="muted">Aucune course enregistrée pour l'instant. Ajoute ta première course pour voir apparaître tes records.</p>`;
  }

  const blocks = ["1K", "5K", "10K", "Semi", "Marathon"].map((label) => {
    const top3 = topEntriesForLabel(label, prs, rankingsByLabel).slice(0, 3);

    if (!top3.length) {
      return `
        <div class="podium-block">
          <h4 class="podium-distance">${label}</h4>
          <p class="muted podium-empty">Pas encore de temps enregistré.</p>
        </div>
      `;
    }

    // Ordre d'affichage d'un vrai podium : 2e à gauche, 1er au centre, 3e à droite.
    const displayOrder = [1, 0, 2];
    const steps = displayOrder.map((idx) => {
      const rank = idx + 1;
      const e = top3[idx];
      if (!e) {
        return `
          <div class="podium-step podium-step-${rank} is-empty">
            <span class="podium-time">—</span>
            <div class="podium-bar">${rank}</div>
          </div>
        `;
      }
      const linked = !!e.activity_id;
      const tag = !e.activity_id ? "ajouté manuellement"
        : e.source === "splits" ? `extrait d'une course de ${(e.activityDistanceM / 1000).toFixed(1)} km`
        : "";
      return `
        <div class="podium-step podium-step-${rank} ${linked ? "is-linked" : ""}"
             ${linked ? `data-activity-id="${e.activity_id}" role="button" tabindex="0"` : ""}>
          <span class="podium-time">${formatTemps(e.temps_s)}</span>
          <div class="podium-bar">${rank}</div>
          ${tag ? `<span class="podium-tag">${tag}</span>` : ""}
        </div>
      `;
    }).join("");

    return `
      <div class="podium-block">
        <h4 class="podium-distance">${label}</h4>
        <div class="podium-row">${steps}</div>
      </div>
    `;
  }).join("");

  return `<div class="podium-list">${blocks}</div>`;
}

function badgeDetailModal() {

  const tierRows = def.tierThresholds.map((threshold, i) => {
    const meta = TIER_META[i];
    const reached = badge.achievedCount >= threshold;
    const remaining = reached ? "" : `<span class="tier-row-remaining">encore ${threshold - badge.achievedCount}</span>`;
    return `
      <div class="tier-row ${reached ? "is-reached" : ""}">

        <span class="tier-row-label">${meta.label}</span>
        <span class="tier-row-count">×${threshold}</span>
        ${reached ? `<span class="tier-row-check">✓ atteint</span>` : remaining}

  const sortedEntries = [...badge.entries].sort((a, b) =>
    state.badgeModalSort === "desc" ? (a.date < b.date ? 1 : -1) : (a.date < b.date ? -1 : 1)

  const datesHtml = sortedEntries.length
    ? `<ul class="badge-dates-list">${sortedEntries.map((e) => `

    : `<p class="muted">Pas encore obtenu.</p>`;

  const speedHtml = type === "distance" ? (() => {
    const speedTiers = computeSpeedBadges(state.allActivities, def.meters);
    if (!speedTiers.length) return "";
    const rows = speedTiers.map((s) => `

        <span class="tier-row-label">${s.label}</span>
        <span class="tier-row-count">×${s.achievedCount}</span>
        ${s.unlocked ? `<span class="tier-row-check">✓ ${formatDateFr(s.bestDate)}</span>` : ""}
      </div>
    `).join("");
    return `
      <div class="badge-speed-section">
        <h4>Paliers de vitesse — ${def.label}</h4>
        <p class="muted">Temps réalistes à battre sur cette distance.</p>
        <div class="badge-tier-ladder">${rows}</div>
      </div>
    `;
  })() : "";

  return `
    <div class="modal-overlay" id="badge-detail-overlay">
      <div class="modal-card">
        <button class="modal-close" id="badge-detail-close" aria-label="Fermer">✕</button>

          <span class="modal-badge-icon">${badge.tier ? badge.tier.icon : def.icon}</span>

        <div class="badge-tier-ladder">${tierRows}</div>
        <div class="badge-dates-header">

}

// Génère une couronne de petites flèches discrètes (plutôt qu'une barre
// pleine) : chaque flèche pointe dans le sens de la progression, comme une
// suite de pas qui avancent autour du cadran.
function goalDialTicks(pct) {
  const total = 32;
  const filled = Math.round((Math.max(0, Math.min(100, pct)) / 100) * total);
  const radius = 50;
  let ticks = "";
  for (let i = 0; i < total; i++) {
    const angleDeg = (360 / total) * i - 90;
    const angleRad = (angleDeg * Math.PI) / 180;
    const cx = (60 + radius * Math.cos(angleRad)).toFixed(2);
    const cy = (60 + radius * Math.sin(angleRad)).toFixed(2);
    const rotate = (angleDeg + 90).toFixed(1);
    const isFilled = i < filled;
    ticks += `<path class="goal-tick ${isFilled ? "is-filled" : ""}" d="M-2.6 -3 L2.6 0 L-2.6 3 Z" transform="translate(${cx} ${cy}) rotate(${rotate})" />`;
  }
  return ticks;
}
