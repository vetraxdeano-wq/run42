<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Run42</title>
  <meta name="theme-color" content="#0a130c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-32.png" sizes="32x32" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

/* ============================================================
   Run42 — Design tokens
   Univers : identité du logo Run42 — dégradé vert lime → vert
   forêt, coureur noir, fond blanc. App moderne, sombre, nette.
   ============================================================ */

:root {
  --ink: #0a130c;         /* fond — noir verdâtre profond */
  --ink-soft: #142016;    /* cartes sur fond ink */
  --ink-softer: #1b2c1e;  /* survol / relief supplémentaire */
  --paper: #eef1e8;       /* texte clair / fond clair */
  --rust: #57b02e;        /* accent principal — vert du logo */
  --rust-dim: #3f8a1f;    /* survol accent principal */
  --moss: #8bc34a;        /* secondaire — vert clair lisible */
  --signal: #b6d928;      /* accent rare — lime du dégradé */
  --danger: #e35b4a;      /* erreurs uniquement */

  --gradient-accent: linear-gradient(135deg, #74c531 0%, #4a9e28 55%, #1c6b23 100%);

  --font-display: "Oswald", "Arial Narrow", sans-serif;
  --font-body: "IBM Plex Sans", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-body);
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
}

/* ---------- Login ---------- */

.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at 50% 0%, rgba(87,176,46,0.20), transparent 55%),
    radial-gradient(circle at 50% 120%, rgba(139,195,74,0.18), transparent 60%),
    var(--ink);
}

.login-card {
  max-width: 380px;
  width: 100%;
  text-align: center;
}

.badge-42 {
  width: 96px;
  height: 96px;
  margin: 0 auto 24px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(139,195,74,0.25), 0 16px 32px -12px rgba(87,176,46,0.55);
  animation: badge-in 0.5s ease;
}

.badge-42 img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

@keyframes badge-in {
  from { opacity: 0; transform: translateY(-6px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.login-card h1 {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 1px;
  margin: 0 0 8px;
  text-transform: uppercase;
}

.tagline {
  color: rgba(238,241,232,0.75);
  line-height: 1.5;
  margin: 0 0 28px;
}

.btn-strava {
  width: 100%;
  padding: 15px 20px;
  border: none;
  border-radius: 12px;
  background: var(--gradient-accent);
  color: var(--paper);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.3px;
  box-shadow: 0 10px 24px -10px rgba(87,176,46,0.65);
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}

.btn-strava:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 14px 28px -10px rgba(87,176,46,0.75); }
.btn-strava:active { transform: translateY(0); }
.btn-strava:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

.fine-print {
  margin-top: 16px;
  font-size: 12px;
  color: rgba(238,241,232,0.5);
  line-height: 1.5;
}

/* ---------- Dashboard shell ---------- */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(139,195,74,0.35);
}

.brand {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.pill {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
}

.pill-connected {
  background: rgba(139,195,74,0.2);
  color: var(--moss);
}

.dashboard {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.panel { margin-bottom: 36px; }

.panel h2 {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 18px;
  color: rgba(238,241,232,0.85);
  margin-bottom: 16px;
}

.muted { color: rgba(238,241,232,0.55); font-size: 14px; line-height: 1.5; }

/* Signature element : le "podium" des records — top 3 par distance */

.podium-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.podium-block {
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  border-radius: 14px;
  padding: 14px 16px 16px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: background 0.15s ease;
}
.podium-block:hover,
.podium-block:focus-visible { background: var(--ink-softer); }

.podium-distance {
  margin: 0 0 12px;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 12.5px;
  color: rgba(238,241,232,0.6);
}

.podium-empty {
  margin: 0;
  font-size: 12.5px;
}

.podium-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
}

.podium-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 30%;
  max-width: 96px;
}

.podium-medal {
  font-size: 16px;
  line-height: 1;
  margin-bottom: 4px;
}

.podium-time {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 600;
  margin-bottom: 6px;
  color: rgba(238,241,232,0.85);
}

.podium-bar {
  width: 100%;
  border-radius: 8px 8px 3px 3px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 6px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
}

.podium-step-1 .podium-bar { height: 64px; background: linear-gradient(150deg, #f7dd7a 0%, #d9a824 100%); color: #3a2a00; }
.podium-step-2 .podium-bar { height: 46px; background: linear-gradient(150deg, #e6e9e6 0%, #b3bab3 100%); color: #262b26; }
.podium-step-3 .podium-bar { height: 32px; background: linear-gradient(150deg, #e0a468 0%, #ab6a30 100%); color: #2a1400; }

.podium-step.is-empty .podium-bar { background: rgba(238,241,232,0.07); color: rgba(238,241,232,0.3); }
.podium-step.is-empty .podium-time { color: rgba(238,241,232,0.3); }

.podium-step.is-linked { cursor: pointer; }
.podium-step.is-linked:hover .podium-bar,
.podium-step.is-linked:focus-visible .podium-bar { filter: brightness(1.1); }

.podium-tag {
  margin-top: 4px;
  font-family: var(--font-body);
  font-size: 9.5px;
  color: rgba(238,241,232,0.4);
  text-align: center;
}

.podium-hint {
  margin: 12px 0 0;
  font-size: 11.5px;
  text-align: center;
}

.panel-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Module objectif — version épurée, orientée mobile : cadran de flèches
   discrètes autour d'une empreinte de pas. */

.goal-dial {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 6px 0 2px;
}

.goal-ring-wrap {
  position: relative;
  width: 156px;
  height: 156px;
}

.goal-ring-svg { width: 100%; height: 100%; display: block; }

.goal-ring-track {
  fill: none;
  stroke: rgba(238,241,232,0.06);
  stroke-width: 1;
}

.goal-tick {
  fill: rgba(238,241,232,0.16);
  transition: fill 0.3s ease;
}
.goal-tick.is-filled { fill: var(--signal); }
.goal-dial.is-reached .goal-tick.is-filled { fill: var(--moss); }

.goal-dial-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}

.goal-footprint-icon {
  width: 26px;
  height: 26px;
  color: rgba(238,241,232,0.45);
}
.goal-dial.is-reached .goal-footprint-icon { color: var(--signal); }

.goal-dial-pct {
  font-family: var(--font-mono);
  font-size: 21px;
  font-weight: 700;
  color: var(--paper);
}

.goal-dial-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-align: center;
}

.goal-dial-current {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--paper);
}

.goal-dial-days {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(238,241,232,0.55);
}
.goal-dial.is-reached .goal-dial-days { color: var(--signal); }

.goal-form-field { display: flex; flex-direction: column; gap: 8px; }
.goal-form-label {
  font-size: 13px;
  color: rgba(238,241,232,0.7);
}
.segmented {
  display: flex;
  background: rgba(238,241,232,0.05);
  border: 1px solid rgba(238,241,232,0.1);
  border-radius: 12px;
  padding: 4px;
  gap: 4px;
}
.segmented-btn {
  flex: 1;
  border: none;
  background: transparent;
  color: rgba(238,241,232,0.55);
  font-family: var(--font-body);
  font-size: 13.5px;
  font-weight: 600;
  padding: 10px 8px;
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
}
.segmented-btn.is-active {
  background: var(--gradient-accent);
  color: var(--ink);
}
.segmented-btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

/* ---------- Chips de sélection (remplace les <select> pour la personnalisation) ---------- */

.chip-toggle-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip-toggle {
  border: 1px solid rgba(238,241,232,0.15);
  background: rgba(238,241,232,0.05);
  color: rgba(238,241,232,0.75);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}

.chip-toggle.is-active {
  background: var(--gradient-accent);
  border-color: transparent;
  color: var(--ink);
}

.chip-toggle:hover:not(.is-active) { border-color: rgba(139,195,74,0.4); }
.chip-toggle:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

/* ---------- Sections de formulaire (regroupement thématique du profil) ---------- */

.form-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 18px;
  border-top: 1px solid rgba(139,195,74,0.14);
}

.form-section:first-of-type { padding-top: 0; border-top: none; }

.form-section-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: rgba(238,241,232,0.8);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-section-hint {
  font-size: 12px;
  color: rgba(238,241,232,0.45);
  line-height: 1.4;
  margin: 0;
}

.form-subgroup {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-subgroup + .form-subgroup { margin-top: 4px; }

/* ---------- Carte récapitulative du profil (mode lecture) ---------- */

.profil-summary {
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.profil-summary-row {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.profil-summary-label {
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: rgba(238,241,232,0.45);
  font-weight: 600;
}

.profil-summary-value {
  font-size: 14.5px;
  color: var(--paper);
}

.profil-tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.profil-tag {
  font-size: 12px;
  font-family: var(--font-mono);
  padding: 4px 11px;
  border-radius: 999px;
  background: rgba(139,195,74,0.15);
  color: var(--moss);
}

.profil-note {
  font-size: 13.5px;
  font-style: italic;
  color: rgba(238,241,232,0.65);
  line-height: 1.5;
  border-left: 2px solid rgba(139,195,74,0.35);
  padding: 2px 0 2px 14px;
  margin: 0;
}

.goal-form-target-input {
  text-align: center;
  font-size: 22px !important;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.card {
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.card h3 {
  font-family: var(--font-display);
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin: 0 0 8px;
}

@media (max-width: 560px) {
  .panel-split { grid-template-columns: 1fr; }
  .login-card h1 { font-size: 34px; }
}

.fine-print a { color: var(--moss); text-decoration: underline; }

/* ---------- Login form ---------- */

#login-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}

#login-form input[type="email"],
#password-form input {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.2);
  background: var(--ink-soft);
  color: var(--paper);
  font-size: 15px;
}

#password-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}

.btn-primary {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  background: var(--rust);
  color: var(--paper);
  font-size: 16px;
  font-weight: 600;
}

.btn-primary:hover { background: var(--rust-dim); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-add {
  width: auto;
  margin-bottom: 28px;
  padding: 10px 18px;
  font-size: 14px;
}

.info-msg {
  background: rgba(139,195,74,0.15);
  color: var(--moss);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 16px;
}

.error-msg {
  background: rgba(227,91,74,0.15);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  margin-bottom: 16px;
}

/* ---------- Topbar actions ---------- */

.topbar-actions { display: flex; gap: 10px; }

.pill-action {
  border: none;
  background: rgba(238,241,232,0.08);
  color: var(--paper);
}

/* ---------- Activity list — cartes "dossard" ---------- */

.activity-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.dossard-card {
  position: relative;
  display: grid;
  grid-template-columns: 68px 1fr auto;
  align-items: stretch;
  gap: 14px;
  background: var(--ink-soft);
  border: 2px solid rgba(139,195,74,0.22);
  border-radius: 14px;
  padding: 14px 16px;
  overflow: visible;
}

/* perforations façon dossard de course, en haut et en bas de la carte */
.dossard-card::before,
.dossard-card::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1px;
  background-image: radial-gradient(circle, rgba(139,195,74,0.35) 1.5px, transparent 1.6px);
  background-size: 10px 10px;
  background-repeat: repeat-x;
}
.dossard-card::before { top: -1px; }
.dossard-card::after { bottom: -1px; }

.dossard-card.activity-row-clickable { cursor: pointer; transition: border-color 0.14s ease, background 0.14s ease, transform 0.1s ease; }
.dossard-card.activity-row-clickable:hover,
.dossard-card.activity-row-clickable:focus-visible {
  border-color: rgba(139,195,74,0.55);
  background: var(--ink-softer);
  outline: none;
}

.dossard-stub {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border-right: 2px dashed rgba(139,195,74,0.3);
  padding-right: 12px;
  font-family: var(--font-display);
}

.dossard-day {
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  color: var(--moss);
}

.dossard-month {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(238,241,232,0.5);
}

.dossard-body { min-width: 0; }

.dossard-header {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}

.activity-stats {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 20px;
}

.stat-block {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.stat-block.stat-primary {
  flex-direction: row;
  align-items: baseline;
  gap: 4px;
}

.stat-primary .stat-value {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  color: var(--paper);
}

.stat-primary .stat-unit {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(238,241,232,0.55);
}

.stat-value-sm {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.1;
}

.stat-block.stat-accent .stat-value-sm { color: var(--signal); }
.stat-block:not(.stat-accent) .stat-value-sm { color: var(--paper); }

.stat-label-sm {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(238,241,232,0.4);
}

.activity-pr-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 700;
  color: #241a04;
  background: linear-gradient(135deg, #ffe27a 0%, #f0b93a 100%);
  border-radius: 8px;
  padding: 6px 11px;
  box-shadow: 0 3px 10px -2px rgba(240,185,58,0.55);
}

.dossard-card.has-pr {
  border-color: rgba(240,185,58,0.6);
  box-shadow: 0 0 0 1px rgba(240,185,58,0.12), 0 8px 20px -10px rgba(240,185,58,0.35);
}

.dossard-card.has-pr::before,
.dossard-card.has-pr::after {
  background-image: radial-gradient(circle, rgba(240,185,58,0.45) 1.5px, transparent 1.6px);
}

.activity-accolades {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.activity-accolade-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  border-radius: 8px;
  padding: 5px 10px;
}

.activity-accolade-badge.tier-gold {
  color: #241a04;
  background: linear-gradient(135deg, #ffe27a 0%, #f0b93a 100%);
}

.activity-accolade-badge.tier-silver {
  color: #22262a;
  background: linear-gradient(135deg, #eef1f2 0%, #b9c2c8 100%);
}

.activity-accolade-badge.tier-bronze {
  color: #2a1608;
  background: linear-gradient(135deg, #e3a877 0%, #b3702f 100%);
}

.activity-title {
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--paper);
}

.activity-type-badge {
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: #fff;
  background: var(--type-color, var(--moss));
  border-radius: 999px;
  padding: 3px 9px;
  white-space: nowrap;

.activity-fractionne-info {

  font-size: 12.5px;
  color: rgba(238,241,232,0.65);

}

.dossard-actions {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
}

.activity-delete-btn, .activity-edit-btn {
  background: none;
  border: none;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(238,241,232,0.4);
  position: relative;
  z-index: 1;
}

.activity-delete-btn svg, .activity-edit-btn svg { width: 17px; height: 17px; }
.activity-delete-btn:hover { color: var(--danger); }
.activity-edit-btn:hover { color: var(--signal); }

/* ---------- Activity form ---------- */

.activity-form {
  display: flex;
  flex-direction: column;
  gap: 18px;
  background: var(--ink-soft);
  border: 1px solid rgba(139,195,74,0.12);
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.activity-form label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  color: rgba(238,241,232,0.7);
}

.activity-form input {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.15);
  background: var(--ink);
  color: var(--paper);
  font-size: 15px;
  font-family: var(--font-mono);
}

.activity-form textarea {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(238,241,232,0.15);
  background: var(--ink);
  color: var(--paper);
  font-size: 14px;
  font-family: var(--font-body);
  resize: vertical;
  min-height: 64px;
}

.splits-section { border-top: 1px solid rgba(139,195,74,0.2); padding-top: 14px; }

.splits-grid {
  display: grid;

  margin-top: 10px;
}

.split-input-label {

}

.split-input-label input { padding: 8px; font-size: 13px; }

/* Accessibilité — focus visible partout */
:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

  
/* ============================================================
   Navigation mobile — topbar + bottom nav bar
   ============================================================ */

.mobile-topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 18px 20px;

}

.mobile-title {

}

.mobile-logo {

  left: 20px;

  height: 30px;

  box-shadow: 0 0 0 1px rgba(139,195,74,0.3);
}

.mobile-logo img { width: 100%; height: 100%; display: block; }

.topbar-cancel {
  position: absolute;
  right: 20px;

.mobile-content {

  margin: 0 auto;
  padding: 20px 20px calc(114px + env(safe-area-inset-bottom, 0px));
}

.bottom-nav {
  position: fixed;
  left: 16px;
  right: 16px;
  bottom: calc(14px + env(safe-area-inset-bottom, 0px));

  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(20,32,22,0.92);

}

.bottom-nav-group {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-around;

}

.nav-item {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: rgba(238,241,232,0.5);
  font-size: 10px;
  font-family: var(--font-body);
  padding: 4px 8px;
  white-space: nowrap;
}

.nav-item svg { width: 22px; height: 22px; }
.nav-item.is-active { color: var(--paper); }
.nav-item.is-active svg { stroke: var(--rust); }

.nav-add {
  background: var(--gradient-accent);
  width: 56px;
  height: 56px;
  border-radius: 18px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -28px;
  box-shadow: 0 8px 20px -6px rgba(87,176,46,0.6), 0 4px 14px rgba(0,0,0,0.35);

  transition: transform 0.15s ease, filter 0.15s ease;
}

.nav-add svg { width: 26px; height: 26px; }
.nav-add:hover { filter: brightness(1.08); transform: translateY(-1px); }
.nav-add:active { transform: translateY(0); }

.avatar-wrap img {

.account-email {

}

.account-pseudo {

.pseudo-edit-btn {

.pseudo-edit-btn:hover { color: var(--rust); }

.pseudo-form {

}

.pseudo-form input {

.pseudo-form-actions { display: flex; gap: 8px; }

.stats-row {

}

.stat-box {

}

.stat-number {

.distance-chart-wrap {

.month-selector-scroll {

.month-chip {

.month-chip.is-active {

.month-calendar {

.cal-grid {

.cal-dow-row { margin-bottom: 6px; }

.cal-dow {

}

.cal-day {

  justify-content: center;
  border-radius: 10px;
  background: rgba(238,241,232,0.05);

  font-family: var(--font-mono);

}

.cal-day.is-active {
  background: var(--rust);
  color: var(--paper);
  font-weight: 600;
}

.cal-day.is-empty { background: transparent; }

.panel-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.panel-header-row h2 { margin: 0; }

.streak-panel { padding: 16px 18px; }

.streak-row {

  align-items: center;
  gap: 14px;
}

.streak-flame {
  font-size: 34px;
  opacity: 0.3;
  filter: grayscale(1);
  line-height: 1;
}
.streak-flame.is-lit {

  filter: none;
}

.streak-info { display: flex; flex-direction: column; gap: 2px; }

.streak-count {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--paper);
}

.streak-message { margin: 0; font-size: 12px; }

.account-subnav {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 4px 0 8px;
}

.account-subnav-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 18px;
  border-radius: 20px;
  border: 1px solid rgba(238,241,232,0.15);
  background: transparent;
  color: rgba(238,241,232,0.55);
}
.account-subnav-btn.is-active {
  background: var(--rust);
  border-color: var(--rust);
  color: var(--paper);
}

.badge-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.badge-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 6px;
  border-radius: 10px;
  background: var(--ink-soft);
  border: 1px solid rgba(238,241,232,0.08);
  text-align: center;
}

.badge-card.is-locked {
  opacity: 0.35;
  filter: grayscale(1);
}

.badge-icon { font-size: 26px; }

.badge-label {
  font-size: 10.5px;
  font-family: var(--font-mono);
  line-height: 1.3;
  color: rgba(238,241,232,0.8);
}

/* Paliers de répétition */

.badge-tier-label {
  font-size: 9px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 600;
}

.badge-count {
  font-size: 9.5px;
  font-family: var(--font-mono);
  color: rgba(238,241,232,0.5);
}

.badge-next {
  font-size: 8.5px;
  font-family: var(--font-mono);
  color: rgba(238,241,232,0.4);
  line-height: 1.3;
}

.badge-next-max { color: var(--signal); }

.badge-card.tier-bronze.is-unlocked {
  border-color: #b0703f;
  box-shadow: 0 0 0 1px rgba(176,112,63,0.25);
}
.badge-card.tier-bronze .badge-tier-label { color: #cd8a52; }

.badge-card.tier-argent.is-unlocked {
  border-color: #a9b4ad;
  box-shadow: 0 0 0 1px rgba(169,180,173,0.25);
}
.badge-card.tier-argent .badge-tier-label { color: #cfd8d2; }

.badge-card.tier-or.is-unlocked {
  border-color: var(--signal);
  box-shadow: 0 0 0 1px rgba(232,184,75,0.3);
}
.badge-card.tier-or .badge-tier-label { color: var(--signal); }

.badge-card.tier-platine.is-unlocked {
  border-color: #bfe3ea;
  box-shadow: 0 0 0 1px rgba(191,227,234,0.3);
}
.badge-card.tier-platine .badge-tier-label { color: #bfe3ea; }

.badge-card[data-badge-type] {
  cursor: pointer;
  transition: transform 0.12s ease, background 0.12s ease;
}
.badge-card[data-badge-type]:hover,
.badge-card[data-badge-type]:focus-visible {
  background: rgba(238,241,232,0.06);
  transform: translateY(-1px);
  outline: none;
}

/* ---------- Prédictions de chrono ---------- */

.assiduite-strip {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(238,241,232,0.04);
  border: 1px solid rgba(238,241,232,0.08);
  margin: 12px 0 4px;
}

.assiduite-label {
  font-family: var(--font-display);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  color: rgba(238,241,232,0.9);
}

.assiduite-strip.tone-positive .assiduite-label { color: var(--moss); }
.assiduite-strip.tone-negative .assiduite-label { color: var(--danger); }

.assiduite-detail {
  font-size: 12px;
  color: rgba(238,241,232,0.55);
  line-height: 1.4;
}

.prediction-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 14px;
}

.prediction-card {
  display: flex;
  flex-direction: column;
  background: var(--ink-soft);
  border: 1px solid rgba(238,241,232,0.1);
  border-radius: 16px;
  padding: 18px 18px 16px;
  box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5);
}

.prediction-card.is-empty {
  align-items: center;
  text-align: center;
  gap: 10px;
  padding: 22px 18px;
  opacity: 0.6;
}

.prediction-card.tier-faible { border-color: rgba(227,91,74,0.3); }
.prediction-card.tier-correcte { border-color: rgba(238,241,232,0.14); }
.prediction-card.tier-bonne { border-color: rgba(139,195,74,0.4); }
.prediction-card.tier-excellente {
  border-color: var(--signal);
  box-shadow: 0 0 0 1px rgba(182,217,40,0.25), 0 6px 18px -10px rgba(0,0,0,0.5);
}

/* Le badge de distance forme son propre bloc, détaché du reste des
   données : c'est l'identité de la carte, pas une donnée parmi d'autres. */
.prediction-card-top {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding-bottom: 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(238,241,232,0.08);
}

.prediction-card.is-empty .prediction-card-top { padding-bottom: 0; margin-bottom: 0; border-bottom: none; }

/* Badge circulaire par distance : anneau de progression = score de
   fiabilité de la prédiction (0 → 100 %), rempli en fonction du tier. */
.prediction-badge {
  position: relative;
  width: 62px;
  height: 62px;
  flex: 0 0 auto;
}

.prediction-badge-ring {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

.prediction-badge-ring .ring-track {
  fill: none;
  stroke: rgba(238,241,232,0.1);
  stroke-width: 3.5;
}

.prediction-badge-ring .ring-progress {
  fill: none;
  stroke-width: 3.5;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.4s ease;
}

.tier-faible .ring-progress { stroke: var(--danger); }
.tier-correcte .ring-progress { stroke: rgba(238,241,232,0.55); }
.tier-bonne .ring-progress { stroke: var(--moss); }
.tier-excellente .ring-progress { stroke: var(--signal); }

.prediction-badge-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--paper);
  text-align: center;
}

.prediction-badge-label.is-long { font-size: 10px; }

.prediction-tier-caption {
  font-size: 9.5px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: rgba(238,241,232,0.4);
}

.tier-excellente .prediction-tier-caption { color: var(--signal); }
.tier-bonne .prediction-tier-caption { color: var(--moss); }
.tier-faible .prediction-tier-caption { color: var(--danger); }

.prediction-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
}

.prediction-time-row { display: flex; align-items: baseline; justify-content: center; gap: 8px; flex-wrap: wrap; }

.prediction-time {
  font-family: var(--font-mono);
  font-size: 30px;
  font-weight: 700;
  color: var(--paper);
  letter-spacing: -0.01em;
}

.prediction-pace {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: rgba(238,241,232,0.5);
}

.prediction-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 999px;
  cursor: default;
}

.prediction-delta.is-faster { background: rgba(139,195,74,0.18); color: var(--moss); }
.prediction-delta.is-slower { background: rgba(227,91,74,0.18); color: var(--danger); }
.prediction-delta.is-stable { background: rgba(238,241,232,0.07); color: rgba(238,241,232,0.5); }

/* Fourchette : une seule barre visuelle porte à la fois le temps et
   l'allure (bas / haut), plutôt que deux lignes de texte séparées. */
.prediction-rangebar { margin-top: 16px; }

.prediction-rangebar-track {
  position: relative;
  height: 5px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--moss), var(--signal));
  opacity: 0.55;
}

.prediction-rangebar-marker {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--paper);
  box-shadow: 0 0 0 3px var(--ink-soft), 0 0 0 4px rgba(238,241,232,0.25);
  transform: translate(-50%, -50%);
}

.prediction-rangebar-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 9px;
}

.prediction-rangebar-labels span {
  display: flex;
  flex-direction: column;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: rgba(238,241,232,0.7);
}

.prediction-rangebar-labels span:last-child { align-items: flex-end; }

.prediction-rangebar-labels small {
  font-size: 10px;
  color: rgba(238,241,232,0.4);
  margin-top: 1px;
}

.prediction-spark-wrap { margin-top: 12px; }

.prediction-spark { width: 100%; height: 34px; display: block; }

.prediction-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 12px;
}

.prediction-meta-count {
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: rgba(238,241,232,0.4);
  cursor: default;
}

.prediction-endurance-flag {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--danger);
  background: rgba(227,91,74,0.1);
  padding: 2px 8px;
  border-radius: 999px;
  cursor: default;
  white-space: nowrap;
}

.prediction-empty-text { font-size: 12px; margin: 0; color: rgba(238,241,232,0.5); }

/* Mobile : 2 colonnes compactes (3 lignes) + Marathon centré en dernière
   ligne, plutôt qu'une seule colonne qui oblige à scroller longtemps. */
@media (max-width: 560px) {
  .prediction-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .prediction-card {
    padding: 10px 8px 9px;
    border-radius: 12px;
  }

  .prediction-card.is-empty {
    padding: 12px 8px;
    gap: 6px;
  }

  .prediction-card-top {
    gap: 3px;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }

  .prediction-badge {
    width: 40px;
    height: 40px;
  }

  .prediction-badge-label {
    font-size: 9.5px;
  }

  { id: "trail", label: "Trail / nature" },
  { id: "piste", label: "Piste" },
  { id: "tapis", label: "Tapis" },
];

const CONTRAINTES = [
  { id: "pas-fractionne", label: "Pas de fractionné" },
  { id: "sensible-blessure", label: "Sensible aux blessures" },
  { id: "matin", label: "Préfère le matin" },
  { id: "soir", label: "Préfère le soir" },
  { id: "longue-weekend", label: "Sortie longue le week-end" },
  { id: "peu-de-temps", label: "Peu de temps disponible" },
];

const OBJECTIF_SESSIONS = {
  "perte-poids": ["Footing facile régulier", "Fractionné léger (30/30)", "Sortie longue tranquille", "Récupération active + gainage", "Footing avec accélérations"],
  "forme": ["Footing facile", "Fractionné léger", "Sortie longue tranquille", "Récupération active", "Footing + gammes"],
  "5k": ["Footing facile", "VMA courte (200-400m)", "Seuil (allure soutenue)", "Sortie longue modérée", "Footing de récupération"],
  "10k": ["Footing facile", "VMA moyenne (400-1000m)", "Seuil", "Sortie longue", "Footing de récupération"],
  "semi": ["Footing facile", "Seuil", "Sortie longue progressive", "Fractionné long (1000-2000m)", "Footing de récupération"],
  "marathon": ["Footing facile", "Sortie longue avec allure marathon", "Seuil", "Fractionné", "Footing de récupération", "Sortie longue"],
};

const NIVEAU_SUFFIX = {
  debutant: " (intensité douce, échauffement long)",
  intermediaire: "",
  avance: " (intensité soutenue)",
  confirme: " (charge élevée, récupération courte)",
};

function generateProgram(profil) {
  let pool = OBJECTIF_SESSIONS[profil.objectif] || OBJECTIF_SESSIONS.forme;

  // Si le coureur ne veut pas de fractionné/VMA, on retire ce type de séance du pool
  const contraintes = Array.isArray(profil.contraintes) ? profil.contraintes : [];
  if (contraintes.includes("pas-fractionne")) {
    const sansFractionne = pool.filter((s) => !/fractionné|vma/i.test(s));
    if (sansFractionne.length) pool = sansFractionne;
  }

  // Le nombre de séances suit les jours choisis (nouveau format) ou, à défaut,
  // l'ancien champ joursDispo (profils enregistrés avant cette mise à jour).
  const joursSemaine = Array.isArray(profil.joursSemaine) ? profil.joursSemaine : [];
  const joursCount = joursSemaine.length || parseInt(profil.joursDispo, 10) || 3;
  const n = Math.min(joursCount, pool.length);
  const suffix = NIVEAU_SUFFIX[profil.niveau] || "";

  const jourLabels = joursSemaine.length
    ? JOURS_SEMAINE.filter((j) => joursSemaine.includes(j.id)).map((j) => j.label)
    : null;

  const sessions = [];
  for (let i = 0; i < n; i++) {
    sessions.push({
      jour: jourLabels ? jourLabels[i] : `Séance ${i + 1}`,
      type: pool[i] + suffix,
    });
  }
  return sessions;
}

function labelFor(list, id) {
  return list.find((o) => o.id === id)?.label || id;
}

// Carte récapitulative du profil, affichée quand la personnalisation n'est pas en édition
function profilSummaryCard(profil) {
  const niveauLabel = labelFor(NIVEAUX, profil.niveau);
  const experienceLabel = profil.experience ? labelFor(EXPERIENCES, profil.experience) : null;
  const volumeLabel = profil.volumeHebdo ? labelFor(VOLUMES_HEBDO, profil.volumeHebdo) : null;
  const objectifLabel = labelFor(OBJECTIFS, profil.objectif);
  const dureeLabel = profil.dureeSeance ? labelFor(DUREES_SEANCE, profil.dureeSeance) : null;

  const joursSemaine = Array.isArray(profil.joursSemaine) ? profil.joursSemaine : [];
  const joursTags = joursSemaine.length
    ? JOURS_SEMAINE.filter((j) => joursSemaine.includes(j.id)).map((j) => j.label)
    : (profil.joursDispo ? [`${profil.joursDispo} jour(s)/semaine`] : null);

  const terrainList = Array.isArray(profil.terrain) ? profil.terrain : [];
  const terrainTags = terrainList.length
    ? TERRAINS.filter((t) => terrainList.includes(t.id)).map((t) => t.label)
    : null;

  const contraintesList = Array.isArray(profil.contraintes) ? profil.contraintes : [];
  const contraintesTags = contraintesList.length
    ? CONTRAINTES.filter((c) => contraintesList.includes(c.id)).map((c) => c.label)
    : null;

  const objectifExtra = [];
  if (profil.objectifTemps) objectifExtra.push(`temps cible ${profil.objectifTemps}`);
  if (profil.objectifDate) {
    const d = new Date(profil.objectifDate);
    if (!isNaN(d)) objectifExtra.push(`échéance le ${d.toLocaleDateString("fr-FR")}`);
  }
  const objectifValue = objectifExtra.length ? `${objectifLabel} · ${objectifExtra.join(" · ")}` : objectifLabel;

  const rows = [
    { label: "Niveau", value: [niveauLabel, experienceLabel].filter(Boolean).join(" · ") },
    volumeLabel ? { label: "Volume hebdo actuel", value: volumeLabel } : null,
    { label: "Objectif", value: objectifValue },
    joursTags ? { label: "Jours de course", tags: joursTags } : null,
    dureeLabel ? { label: "Temps par séance", value: dureeLabel } : null,
    terrainTags ? { label: "Terrain préféré", tags: terrainTags } : null,
    contraintesTags ? { label: "Contraintes & préférences", tags: contraintesTags } : null,
  ].filter(Boolean);

  const rowsHtml = rows.map((r) => `
    <div class="profil-summary-row">
      <span class="profil-summary-label">${r.label}</span>
      ${
        r.tags
          ? `<div class="profil-tag-list">${r.tags.map((t) => `<span class="profil-tag">${t}</span>`).join("")}</div>`
          : `<span class="profil-summary-value">${r.value}</span>`
      }
    </div>
  `).join("");

  const noteHtml = profil.notes
    ? `<p class="profil-note">« ${profil.notes} »</p>`
    : "";

  return `<div class="profil-summary">${rowsHtml}${noteHtml}</div>`;
}

// Constantes distances

const DISTANCE_ORDER = ["1K", "5K", "10K", "15K", "20K", "Semi", "Marathon"];
const DISTANCE_METERS = {
  "1K": 1000, "5K": 5000, "10K": 10000, "15K": 15000,
  "20K": 20000, "Semi": 21097, "Marathon": 42195,
};

  "Endurance Fondamentale",
  "Fractionné",
  "Sortie longue",
  "Récupération",
  "Seuil / Tempo",
  "Compétition",
  "Sortie libre",
];

const ACTIVITY_TYPE_COLORS = {
  "Endurance Fondamentale": "#57b02e",
  "Fractionné": "#d9483a",
  "Sortie longue": "#3b82c4",
  "Récupération": "#2fb6a8",
  "Seuil / Tempo": "#9b59d0",

function activityTypeColor(type) {

// Nom d'affichage par défaut d'une course sans titre : "Course du 12 juin"
function displayTitre(a) {
  if (a.titre) return a.titre;
  const d = new Date(a.date + "T00:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "long" });
  return `Course du ${d}`;
}

function formatTemps(s) {
  if (!s && s !== 0) return "—";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

// Comme formatTemps, mais renvoie toujours un format saisissable dans un
// champ texte (mm:ss ou hh:mm:ss), utilisé pour préremplir le formulaire
// de modification d'une course.
function formatDureeInput(s) {
  if (!s && s !== 0) return "";
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.round(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function formatDateFr(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
}

// Accepte "mm:ss" ou "hh:mm:ss" → secondes
function parseDuree(str) {
  if (!str) return null;
  const parts = str.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

async function loadAppData() {
  setState({ loading: true, error: null });
  try {
    const { data: prs, error } = await supabase
      .from("personal_records")
      .select("distance_label, meilleur_temps_s, activity_id, date_obtenu")
      .order("distance_label");
    if (error) throw error;

    const { data: activities } = await supabase
      .from("activities")
      .select("*")
      .order("date", { ascending: false })
      .limit(30);

    // Toutes les colonnes sont nécessaires ici : id (pour relier badges/records
    // à l'activité d'origine et permettre la redirection), km_splits (pour le
    // classement des performances par distance) et les autres champs affichés
    // dans la modale de détail lorsqu'elle est ouverte depuis un badge/record
    // portant sur une activité plus ancienne que les 30 dernières.
    const { data: allActivities } = await supabase
      .from("activities")
      .select("*");

    setState({
      prs: prs || [],
      activities: activities || [],
      allActivities: allActivities || [],
      loading: false,
    });
  } catch (e) {
    setState({ prs: [], activities: [], allActivities: [], loading: false, error: "Impossible de charger tes données. Vérifie ta config Supabase." });
  }
}

// ============================================================
// Calcul des PR à partir d'une activité saisie manuellement
// ============================================================

function computeBestEfforts(distanceM, dureeS, kmSplits) {
  const results = [];

  if (kmSplits && kmSplits.length) {
    const wholeKmTargets = [
      [1, "1K"], [5, "5K"], [10, "10K"], [15, "15K"], [20, "20K"],
    ];
    for (const [k, label] of wholeKmTargets) {
      if (kmSplits.length >= k) {
        let best = Infinity;
        for (let i = 0; i + k <= kmSplits.length; i++) {
          const sum = kmSplits.slice(i, i + k).reduce((a, b) => a + b, 0);
          if (sum < best) best = sum;
        }
        // "splits" : ce chrono a été extrait d'un enchaînement de km
        // consécutifs au sein d'une course plus longue (ex. le meilleur 5K
        // trouvé entre le 3e et le 8e km d'un 10K) — pas une course dédiée
        // à cette distance précise.
        results.push({ distance_label: label, temps_s: best, source: "splits" });
      }
    }
  }

  for (const label of DISTANCE_ORDER) {
    const target = DISTANCE_METERS[label];
    if (Math.abs(distanceM - target) / target < 0.03) {
      const existing = results.find((r) => r.distance_label === label);
      if (!existing || dureeS < existing.temps_s) {
        results.splice(results.indexOf(existing), existing ? 1 : 0);
        // "exact" : la course entière correspond directement à cette
        // distance (à ±3% près).
        results.push({ distance_label: label, temps_s: dureeS, source: "exact" });
      }
    }
  }

  return results;
}

// Pour chaque distance de DISTANCE_ORDER, classe TOUTES les activités qui
// couvrent cette distance (une entrée par activité, sa meilleure performance
// sur ce label) plutôt que de ne garder que le record en cours — utilisé par
// l'écran "Records" pour afficher l'historique complet des perfs, pas
// uniquement la meilleure.
function computeAllBestEffortsByLabel(activities) {
  const byLabel = {};
  for (const label of DISTANCE_ORDER) byLabel[label] = [];

  for (const a of activities || []) {
    const efforts = computeBestEfforts(a.distance_m, a.duree_s, a.km_splits);
    for (const eff of efforts) {
      byLabel[eff.distance_label].push({
        temps_s: eff.temps_s,
        activity_id: a.id,
        date: a.date,
        source: eff.source,
        activityDistanceM: a.distance_m,
      });
    }
  }

  for (const label of DISTANCE_ORDER) {
    byLabel[label].sort((a, b) => a.temps_s - b.temps_s);
  }

  return byLabel;
}

const MEDAL_ICONS = { 1: "🥇", 2: "🥈", 3: "🥉" };

// Petites mentions "presque record" : pour chaque distance de course, on
// signale les 2e et 3e meilleures perfs (la 1re est déjà couverte par le
// badge doré "Record personnel" figé sur l'activité). On ajoute aussi un
// classement à part des sorties les plus longues (toutes distances
// confondues), qui n'a rien à voir avec les distances de référence.
// Retourne un objet { activity_id: [{ icon, text, tier }] }.
function computeActivityAccolades(activities) {
  const accolades = {};
  const add = (id, entry) => {
    if (!accolades[id]) accolades[id] = [];
    accolades[id].push(entry);
  };

  const byLabel = computeAllBestEffortsByLabel(activities);
  for (const label of DISTANCE_ORDER) {
    byLabel[label].slice(0, 3).forEach((entry, i) => {
      const place = i + 1;
      if (place === 1) return; // déjà signalé par le badge "Record personnel"
      add(entry.activity_id, {
        icon: MEDAL_ICONS[place],
        text: `${place}e meilleure perf ${label}`,
        tier: place === 2 ? "silver" : "bronze",
      });
    });
  }

  const byDistance = [...(activities || [])]
    .filter((a) => a.distance_m)
    .sort((a, b) => b.distance_m - a.distance_m)
    .slice(0, 3);
  byDistance.forEach((a, i) => {
    const place = i + 1;
    add(a.id, {
      icon: MEDAL_ICONS[place],
      text: place === 1 ? "Sortie la plus longue" : `${place}e sortie la plus longue`,
      tier: place === 1 ? "gold" : place === 2 ? "silver" : "bronze",
    });
  });

  return accolades;
}

async function saveActivity(formData) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;
    const distanceM = Math.round(formData.distanceKm * 1000);
    const dureeS = formData.dureeS;
    const kmSplits = formData.kmSplits.filter((s) => s != null);
    const allureMoyenne = dureeS / (distanceM / 1000);

    // On détermine AVANT l'insertion quels efforts constituent un nouveau record.
    // C'est ce qui permet de figer le résultat (pr_labels) sur l'activité :
    // même si un record plus récent écrase ensuite personal_records, l'activité
    // gardera la trace qu'elle était un PR au moment où elle a été enregistrée.
    const efforts = computeBestEfforts(distanceM, dureeS, kmSplits);
    const prChecks = [];
    for (const effort of efforts) {
      const { data: currentPR } = await supabase
        .from("personal_records")
        .select("meilleur_temps_s")
        .eq("user_id", userId)
        .eq("distance_label", effort.distance_label)
        .maybeSingle();

      const isNewPR = !currentPR || effort.temps_s < currentPR.meilleur_temps_s;
      prChecks.push({ ...effort, isNewPR });
    }
    const prLabels = prChecks.filter((p) => p.isNewPR).map((p) => p.distance_label);

    const { data: activity, error: insertError } = await supabase
      .from("activities")
      .insert({
        user_id: userId,
        titre: formData.titre || null,
        type_activite: formData.typeActivite || null,
        fractionne_effort_s: formData.fractionneEffortS || null,
        fractionne_repos_s: formData.fractionneReposS || null,
        fractionne_reps: formData.fractionneReps || null,
        date: formData.date,
        distance_m: distanceM,
        duree_s: dureeS,
        denivele_m: formData.deniveleM || 0,
        description: formData.description || null,
        allure_moyenne: allureMoyenne,
        km_splits: kmSplits.length ? kmSplits : null,
        source: "manuel",
        pr_labels: prLabels.length ? prLabels : null,
      })
      .select()
      .single();

    if (insertError) throw insertError;

    for (const p of prChecks) {
      if (p.isNewPR) {
        await supabase.from("personal_records").upsert({
          user_id: userId,
          distance_label: p.distance_label,
          meilleur_temps_s: p.temps_s,
          activity_id: activity.id,
          date_obtenu: formData.date,
        });
      }
    }

    const activitiesBefore = state.allActivities;
    await loadAppData();
    const unlocks = detectBadgeUnlocks(activitiesBefore, state.allActivities);
    const prNotifications = prLabels.map((label) => ({
      id: `${Date.now()}-${Math.random()}`,
      icon: "🏆",
      text: `Nouveau record personnel : <strong>${label}</strong> !`,
    }));
    const newNotifications = [
      ...prNotifications,
      ...unlocks.map((u) => ({ id: `${Date.now()}-${Math.random()}`, ...u })),
    ];

    setState({
      loading: false,
      route: "dashboard",
      tab: "activities",
      notifications: [...state.notifications, ...newNotifications],
    });

    newNotifications.forEach((n) => scheduleNotificationDismiss(n.id));
  } catch (e) {
    setState({ loading: false, error: "Erreur lors de l'enregistrement : " + e.message });
  }
}

function scheduleNotificationDismiss(id) {
  setTimeout(() => {
    setState({ notifications: state.notifications.filter((n) => n.id !== id) });
  }, 6000);
}

// ============================================================
// Ajout manuel d'un record déjà existant
// ============================================================

async function saveRecordManual({ distanceLabel, dureeS, dateObtenu }) {
  setState({ recordSaving: true, error: null });
  try {
    const userId = state.session.user.id;

    const { data: currentPR } = await supabase
      .from("personal_records")
      .select("meilleur_temps_s")
      .eq("user_id", userId)
      .eq("distance_label", distanceLabel)
      .maybeSingle();

    if (currentPR && dureeS >= currentPR.meilleur_temps_s) {
      setState({
        recordSaving: false,
        error: `Tu as déjà un meilleur temps sur ${distanceLabel} (${formatTemps(currentPR.meilleur_temps_s)}). Ce nouveau temps n'a pas été conservé.`,
      });
      return;
    }

    const { error } = await supabase.from("personal_records").upsert({
      user_id: userId,
      distance_label: distanceLabel,
      meilleur_temps_s: dureeS,
      date_obtenu: dateObtenu || null,
    });
    if (error) throw error;

    setState({ recordSaving: false, recordFormOpen: false });
    loadAppData();
  } catch (e) {
    setState({ recordSaving: false, error: "Échec de l'enregistrement du record : " + e.message });
  }
}

async function uploadAvatar(file) {
  setState({ avatarUploading: true, error: null });
  try {
    const userId = state.session.user.id;
    const ext = file.name.split(".").pop();
    const path = `${userId}/avatar.${ext}`;

    const { error: uploadError } = await supabase.storage
      .from("avatars")
      .upload(path, file, { upsert: true });
    if (uploadError) throw uploadError;

    const { data: pub } = supabase.storage.from("avatars").getPublicUrl(path);
    const cacheBusted = `${pub.publicUrl}?t=${Date.now()}`;

    const { data: updated, error: updateError } = await supabase.auth.updateUser({
      data: { avatar_url: cacheBusted },
    });
    if (updateError) throw updateError;

    setState({
      avatarUploading: false,
      session: { ...state.session, user: updated.user },
    });
  } catch (e) {
    setState({ avatarUploading: false, error: "Échec de l'upload : " + e.message });
  }
}

      pseudoSaving: false,

    setState({ pseudoSaving: false, error: "Échec de l'enregistrement du pseudo : " + e.message });

// ============================================================
// Objectif (hebdomadaire / mensuel) — module de motivation
// ============================================================
// Stocké dans user_metadata comme le profil : { mode: "hebdo"|"mensuel",
// metric: "distance"|"duree", target: number } — target est en km pour une
// distance, en minutes pour une durée (unités plus naturelles à saisir).

function getGoal() {
  return state.session?.user?.user_metadata?.goal || null;
}

async function saveGoal(goal) {
  setState({ goalSaving: true, error: null });
  try {
    const { data: updated, error } = await supabase.auth.updateUser({
      data: { goal },
    });
    if (error) throw error;
    setState({
      goalSaving: false,
      goalEditing: false,
      session: { ...state.session, user: updated.user },
    });
  } catch (e) {
    setState({ goalSaving: false, error: "Échec de l'enregistrement de l'objectif : " + e.message });
  }
}

// Calcule où on en est sur la période en cours (semaine ou mois glissant
// calendaire) par rapport à l'objectif fixé, à partir des activités déjà
// enregistrées — pas besoin de stocker de progression séparément, elle se
// déduit toujours des activités réelles.
function computeGoalProgress(goal, activities) {
  if (!goal) return null;
  const now = new Date();
  let periodStart, periodEnd;

  if (goal.mode === "hebdo") {
    const start = new Date(now);
    const dow = (start.getDay() + 6) % 7;
    start.setDate(start.getDate() - dow);
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 7);
    periodStart = start;
    periodEnd = end;
  } else {
    periodStart = new Date(now.getFullYear(), now.getMonth(), 1);
    periodEnd = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  }

  let current = 0;
  for (const a of activities || []) {
    const d = new Date(a.date + "T00:00:00");
    if (d >= periodStart && d < periodEnd) {
      current += goal.metric === "distance" ? (a.distance_m || 0) : (a.duree_s || 0);
    }
  }

  const target = goal.metric === "distance" ? goal.target * 1000 : goal.target * 60;
  const pct = target > 0 ? Math.min(100, (current / target) * 100) : 0;
  const daysLeft = Math.max(0, Math.ceil((periodEnd - now) / 86400000));

  return { current, target, pct, daysLeft, reached: current >= target };
}

// ============================================================
// Suppression d'une activité
// ============================================================

async function deleteActivity(activityId) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;

    // Avant de supprimer l'activité, on repère les PR qui sont actuellement
    // basés dessus : ce sont les seuls qu'il faudra recalculer / retirer.
    // (Les badges, eux, sont recalculés à la volée à partir du nombre/de la
    // distance/de la durée des activités restantes : rien à faire côté
    // badges, ils se re-verrouillent automatiquement si le seuil n'est plus atteint.)
    const { data: linkedPRs } = await supabase
      .from("personal_records")
      .select("distance_label")
      .eq("user_id", userId)
      .eq("activity_id", activityId);
    const affectedLabels = (linkedPRs || []).map((p) => p.distance_label);

    // "personal_records" a une clé étrangère vers "activities" (activity_id).
    // Tant qu'un PR pointe encore vers cette activité, Postgres refuse de la
    // supprimer (violation de contrainte de clé étrangère) : il faut donc
    // détacher ces PR d'abord (activity_id → null), supprimer l'activité,
    // puis recalculer ces PR pour qu'ils repointent vers la meilleure
    // activité restante (ou soient retirés s'il n'en reste aucune).
    if (affectedLabels.length) {
      const { error: detachError } = await supabase
        .from("personal_records")
        .update({ activity_id: null })
        .eq("user_id", userId)
        .eq("activity_id", activityId);
      if (detachError) throw detachError;
    }

    // On utilise { count: "exact" } plutôt qu'un .select() après coup : un
    // .select() sur une ligne qui vient d'être supprimée dépend d'une policy
    // RLS "SELECT" pour pouvoir la renvoyer, et remonte un tableau vide si
    // cette policy manque — même quand la suppression a réellement fonctionné.
    // Cela donnait l'impression trompeuse que "supprimer" échouait à chaque
    // fois. Le count, lui, reflète directement le nombre de lignes affectées
    // par le DELETE (gouverné par la policy "DELETE", pas "SELECT").
    const { error, count } = await supabase
      .from("activities")
      .delete({ count: "exact" })
      .eq("id", activityId)
      .eq("user_id", userId);
    if (error) throw error;

    if (!count) {
      throw new Error(
        "Aucune ligne supprimée. Vérifie qu'une policy RLS \"DELETE\" existe sur la table activities dans Supabase (autorisant user_id = auth.uid())."
      );
    }

    // L'activité qui détenait ces records n'existe plus : on recalcule le
    // meilleur temps parmi les activités restantes plutôt que d'effacer
    // purement et simplement le PR (qui pourrait masquer une 2e meilleure
    // perf tout à fait valide).
    if (affectedLabels.length) {
      await recomputeAffectedPRs(userId, affectedLabels);
    }

    await loadAppData();
  } catch (e) {
    setState({ loading: false, error: "Échec de la suppression : " + e.message });
  }
}

// Recalcule, pour chaque distance_label listé, le meilleur temps parmi
// TOUTES les activités restantes de l'utilisateur (courses entières qui
// matchent la distance à ±3%, ou meilleurs enchaînements de km_splits pour
// les distances rondes 1K/5K/10K/15K/20K). Si aucune activité ne peut plus
// justifier le label, le PR est retiré ; sinon il est mis à jour vers la
// nouvelle meilleure performance (avec sa propre activity_id/date).
async function recomputeAffectedPRs(userId, affectedLabels) {
  const { data: allActs } = await supabase
    .from("activities")
    .select("id, date, distance_m, duree_s, km_splits")
    .eq("user_id", userId);

  const bestByLabel = {};
  for (const a of allActs || []) {
    const efforts = computeBestEfforts(a.distance_m, a.duree_s, a.km_splits);
    for (const eff of efforts) {
      if (!affectedLabels.includes(eff.distance_label)) continue;
      const current = bestByLabel[eff.distance_label];
      if (!current || eff.temps_s < current.temps_s) {
        bestByLabel[eff.distance_label] = { temps_s: eff.temps_s, activity_id: a.id, date: a.date };
      }
    }
  }

  for (const label of affectedLabels) {
    const best = bestByLabel[label];
    if (best) {
      await supabase.from("personal_records").upsert({
        user_id: userId,
        distance_label: label,
        meilleur_temps_s: best.temps_s,
        activity_id: best.activity_id,
        date_obtenu: best.date,
      });
    } else {
      // Plus aucune activité ne couvre cette distance : le PR n'a plus
      // aucune preuve derrière lui, on le retire.
      await supabase
        .from("personal_records")
        .delete()
        .eq("user_id", userId)
        .eq("distance_label", label);
    }
  }

  return bestByLabel;
}

// ============================================================
// Modification d'une activité existante
// ============================================================
// Modifier une course change potentiellement ses temps/distance : les records
// personnels doivent donc être recalculés, exactement comme lors d'une
// suppression. Deux cas à couvrir :
//  - l'activité détenait déjà un ou plusieurs PR : si l'édition la rend moins
//    bonne, ces PR doivent être recalculés (peut-être une autre activité
//    prend le relais, ou le PR disparaît s'il n'y a plus aucune activité).
//  - l'activité ne détenait aucun PR mais l'édition la rend désormais
//    meilleure que le record actuel sur une distance : elle doit pouvoir
//    décrocher ce nouveau PR.
// On recalcule donc sur l'union des labels "avant" et "après" l'édition.
async function updateActivity(activityId, formData) {
  setState({ loading: true, error: null });
  try {
    const userId = state.session.user.id;
    const distanceM = Math.round(formData.distanceKm * 1000);
    const dureeS = formData.dureeS;
    const kmSplits = formData.kmSplits.filter((s) => s != null);
    const allureMoyenne = dureeS / (distanceM / 1000);

    const { data: linkedPRs } = await supabase
      .from("personal_records")
      .select("distance_label")
      .eq("user_id", userId)
      .eq("activity_id", activityId);
    const previousLabels = (linkedPRs || []).map((p) => p.distance_label);

    const newEfforts = computeBestEfforts(distanceM, dureeS, kmSplits);
    const newLabels = newEfforts.map((e) => e.distance_label);
    const affectedLabels = Array.from(new Set([...previousLabels, ...newLabels]));

    const { error } = await supabase
      .from("activities")
      .update({
        titre: formData.titre || null,
        type_activite: formData.typeActivite || null,
        fractionne_effort_s: formData.fractionneEffortS || null,
        fractionne_repos_s: formData.fractionneReposS || null,
        fractionne_reps: formData.fractionneReps || null,
        date: formData.date,
        distance_m: distanceM,
        duree_s: dureeS,
        denivele_m: formData.deniveleM || 0,
        description: formData.description || null,
        allure_moyenne: allureMoyenne,
        km_splits: kmSplits.length ? kmSplits : null,
      })
      .eq("id", activityId)
      .eq("user_id", userId);

    if (error) throw error;

    if (affectedLabels.length) {
      const bestByLabel = await recomputeAffectedPRs(userId, affectedLabels);
      // Le badge "🏆 Record personnel" affiché sous une course est figé sur
      // sa ligne (pr_labels) : on le remet à jour pour cette activité afin
      // qu'il reflète sa nouvelle réalité après édition (record gagné, perdu,
      // ou conservé).
      const updatedPrLabels = affectedLabels.filter(
        (label) => bestByLabel[label] && bestByLabel[label].activity_id === activityId
      );
      await supabase
        .from("activities")
        .update({ pr_labels: updatedPrLabels.length ? updatedPrLabels : null })
        .eq("id", activityId)
        .eq("user_id", userId);
    }

    await loadAppData();
    setState({
      loading: false,
      route: "dashboard",
      tab: "activities",
      editingActivityId: null,
    });
  } catch (e) {
    setState({ loading: false, error: "Erreur lors de la modification : " + e.message });
  }
}

// Ouvre le formulaire de course (réutilisé) préchargé avec les valeurs
// existantes de l'activité, prêt à être modifiée puis renvoyé via updateActivity.
function openEditActivity(id) {
  const a = state.allActivities.find((x) => x.id === id) || state.activities.find((x) => x.id === id);
  if (!a) return;
  const splitInputsCount = a.km_splits && a.km_splits.length
    ? a.km_splits.length
    : Math.min(Math.floor(a.distance_m / 1000), 50);
  setState({
    route: "add-activity",
    editingActivityId: id,
    splitInputsCount,
    error: null,
    activityDetailId: null,
  });
}

// ============================================================
// Stats & calendrier (onglet Compte)
// ============================================================

function computeCounts(activities) {
  const now = new Date();
  const startOfWeek = new Date(now);
  const dow = (startOfWeek.getDay() + 6) % 7;
  startOfWeek.setDate(startOfWeek.getDate() - dow);
  startOfWeek.setHours(0, 0, 0, 0);

  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfYear = new Date(now.getFullYear(), 0, 1);

  let week = 0, month = 0, year = 0;
  let distWeek = 0, distMonth = 0, distYear = 0;
  let dureeWeek = 0, dureeMonth = 0, dureeYear = 0;
  for (const a of activities) {
    const d = new Date(a.date + "T00:00:00");
    const dist = a.distance_m || 0;
    const duree = a.duree_s || 0;
    if (d >= startOfYear) { year++; distYear += dist; dureeYear += duree; }
    if (d >= startOfMonth) { month++; distMonth += dist; dureeMonth += duree; }
    if (d >= startOfWeek) { week++; distWeek += dist; dureeWeek += duree; }
  }
  return {
    week, month, year,
    distWeek, distMonth, distYear,
    dureeWeek, dureeMonth, dureeYear,
  };
}

function formatDistanceKm(meters) {
  return `${(meters / 1000).toFixed(1)} km`;
}

// ============================================================
// Streak hebdomadaire
// ============================================================

// Renvoie la date (YYYY-MM-DD) du lundi de la semaine de "date"
function mondayKey(date) {
  const d = new Date(date);
  const dow = (d.getDay() + 6) % 7; // lundi = 0
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

function addDaysKey(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

// Une activité dans la semaine suffit à maintenir le streak.
// La semaine en cours n'étant pas terminée, elle ne casse pas
// le streak tant qu'elle n'est pas passée sans activité.
function computeStreak(dates) {
  const weekKeys = new Set(dates.map((d) => mondayKey(d + "T00:00:00")));
  const thisWeek = mondayKey(new Date());
  const lastWeek = addDaysKey(thisWeek, -7);

  let anchor;
  let atRisk = false;

  if (weekKeys.has(thisWeek)) {
    anchor = thisWeek;
  } else if (weekKeys.has(lastWeek)) {
    anchor = lastWeek;
    atRisk = true;
  } else {
    return { count: 0, atRisk: false };
  }

  let count = 0;
  let cursor = anchor;
  while (weekKeys.has(cursor)) {
    count++;
    cursor = addDaysKey(cursor, -7);
  }
  return { count, atRisk };
}

const ACTIVITY_BADGES = [

// Seuils de palier différenciés par distance : répéter un marathon 30 fois
// n'a rien à voir avec répéter un 5 km 30 fois, donc chaque badge a ses
// propres seuils Bronze / Argent / Or / Platine, plus exigeants pour les
// courtes distances (faciles à répéter) et plus accessibles pour les longues.
const DISTANCE_BADGES = [
  { meters: 5000, label: "5 km", icon: "🎯", tierThresholds: [1, 10, 30, 60] },
  { meters: 10000, label: "10 km", icon: "🔥", tierThresholds: [1, 8, 20, 40] },
  { meters: 15000, label: "15 km", icon: "💪", tierThresholds: [1, 6, 15, 30] },
  { meters: 20000, label: "20 km", icon: "🚀", tierThresholds: [1, 5, 12, 25] },
  { meters: 21097, label: "Semi (21,097 km)", icon: "🥈", tierThresholds: [1, 4, 10, 20] },
  { meters: 42195, label: "42,195 km — Marathon", icon: "👑", tierThresholds: [1, 2, 5, 10] },
];

const DURATION_BADGES = [
  { seconds: 1800, label: "30 min", icon: "⏱️", tierThresholds: [1, 10, 30, 60] },
  { seconds: 3600, label: "1h", icon: "⏳", tierThresholds: [1, 8, 20, 40] },
  { seconds: 5400, label: "1h30", icon: "🕐", tierThresholds: [1, 6, 15, 30] },
  { seconds: 7200, label: "2h", icon: "🕑", tierThresholds: [1, 5, 12, 25] },
  { seconds: 10800, label: "3h", icon: "🕒", tierThresholds: [1, 3, 8, 15] },
  { seconds: 14400, label: "4h", icon: "🕓", tierThresholds: [1, 2, 5, 10] },
];

// Métadonnées visuelles des paliers (communes à tous les badges — seuls les
// seuils numériques varient d'un badge à l'autre, cf. tierThresholds).
const TIER_META = [
  { key: "bronze", label: "Bronze", icon: "🥉" },
  { key: "argent", label: "Argent", icon: "🥈" },
  { key: "or", label: "Or", icon: "🥇" },
  { key: "platine", label: "Platine", icon: "💎" },
];

function computeTierForThresholds(achievedCount, thresholds) {
  let current = null;
  for (let i = 0; i < thresholds.length; i++) {
    if (achievedCount >= thresholds[i]) current = { ...TIER_META[i], threshold: thresholds[i] };
  }
  return current;
}

function nextTierForThresholds(achievedCount, thresholds) {
  for (let i = 0; i < thresholds.length; i++) {
    if (achievedCount < thresholds[i]) return { ...TIER_META[i], threshold: thresholds[i] };
  }
  return null;
}

// Tolérance utilisée pour rattacher une activité à une distance "cible"
// (même logique que le calcul des records personnels).
function matchesDistanceCategory(distanceM, targetM) {
  return Math.abs(distanceM - targetM) / targetM < 0.03;
}

// Paliers de vitesse par distance — "badge combiné vitesse". Des seuils de
// temps réalistes et progressifs, propres à chaque distance.
const SPEED_TIERS_BY_METERS = {
  5000: [
    { label: "Sous les 30:00", seconds: 1800 },
    { label: "Sous les 25:00", seconds: 1500 },
    { label: "Sous les 22:00", seconds: 1320 },
